//  SECTION 4 : Euler Buckling
// ══════════════════════════════════════════════
const bkColCvs = document.getElementById('bucklColumnCanvas');
const bkColCtx = bkColCvs.getContext('2d');
const bkBifCvs = document.getElementById('bucklBifurCanvas');
const bkBifCtx = bkBifCvs.getContext('2d');
const bkModeCvs = document.getElementById('bucklModeCanvas');
const bkModeCtx = bkModeCvs.getContext('2d');
const bkSlider = document.getElementById('bucklSlider');
const bkValSpan = document.getElementById('bucklVal');
const bkStatusSpan = document.getElementById('bucklStatus');
let bucklModeShow = 0; // 0=all, 1,2,3=individual

function drawBucklColumn(){
  const w = bkColCvs.width, h = bkColCvs.height;
  const P = parseFloat(bkSlider.value);
  bkValSpan.textContent = P.toFixed(2);

  bkColCtx.clearRect(0,0,w,h);
  bkColCtx.fillStyle = getCSS('--canvas-bg');
  bkColCtx.fillRect(0,0,w,h);

  const colTop = 60, colBot = h - 50;
  const colLen = colBot - colTop;
  const colX = w / 2;

  // supports (triangles)
  bkColCtx.fillStyle = getCSS('--canvas-axis');
  // top support
  bkColCtx.beginPath();
  bkColCtx.moveTo(colX - 12, colTop); bkColCtx.lineTo(colX + 12, colTop);
  bkColCtx.lineTo(colX, colTop - 14); bkColCtx.fill();
  // bottom support
  bkColCtx.beginPath();
  bkColCtx.moveTo(colX - 12, colBot); bkColCtx.lineTo(colX + 12, colBot);
  bkColCtx.lineTo(colX, colBot + 14); bkColCtx.fill();
  // ground lines
  bkColCtx.strokeStyle = getCSS('--canvas-axis');
  bkColCtx.lineWidth = 1;
  for(let i = -3; i <= 3; i++){
    bkColCtx.beginPath();
    bkColCtx.moveTo(colX + i*8 - 4, colBot + 16);
    bkColCtx.lineTo(colX + i*8 + 4, colBot + 22);
    bkColCtx.stroke();
  }

  // load arrow
  const arrowColor = P >= 1.0 ? getCSS('--accent2') : getCSS('--accent');
  bkColCtx.strokeStyle = arrowColor; bkColCtx.lineWidth = 2.5;
  bkColCtx.fillStyle = arrowColor;
  const arrowLen = 20 + P * 15;
  bkColCtx.beginPath();
  bkColCtx.moveTo(colX, colTop - 14 - arrowLen);
  bkColCtx.lineTo(colX, colTop - 14);
  bkColCtx.stroke();
  bkColCtx.beginPath();
  bkColCtx.moveTo(colX, colTop - 14);
  bkColCtx.lineTo(colX - 6, colTop - 22);
  bkColCtx.lineTo(colX + 6, colTop - 22);
  bkColCtx.fill();
  bkColCtx.font = 'bold 13px sans-serif';
  bkColCtx.fillText('P', colX + 10, colTop - 14 - arrowLen / 2);

  // column shape
  const amplitude = P >= 1.0 ? Math.min((P - 1.0) * 80, 100) : 0;
  const isBuckled = P >= 1.0;

  if(isBuckled){
    // buckled shape: sin curve
    bkColCtx.strokeStyle = getCSS('--accent2');
    bkColCtx.lineWidth = 4;
    bkColCtx.beginPath();
    for(let i = 0; i <= 100; i++){
      const t = i / 100;
      const yPos = colTop + t * colLen;
      const xOff = amplitude * Math.sin(Math.PI * t);
      if(i === 0) bkColCtx.moveTo(colX + xOff, yPos);
      else bkColCtx.lineTo(colX + xOff, yPos);
    }
    bkColCtx.stroke();

    // original straight (ghost)
    bkColCtx.strokeStyle = getCSS('--canvas-axis');
    bkColCtx.lineWidth = 1.5;
    bkColCtx.setLineDash([4,4]);
    bkColCtx.beginPath();
    bkColCtx.moveTo(colX, colTop); bkColCtx.lineTo(colX, colBot);
    bkColCtx.stroke();
    bkColCtx.setLineDash([]);

    // max deflection annotation
    const maxDefX = colX + amplitude;
    const maxDefY = colTop + colLen / 2;
    bkColCtx.strokeStyle = getCSS('--accent4');
    bkColCtx.lineWidth = 1;
    bkColCtx.setLineDash([3,3]);
    bkColCtx.beginPath();
    bkColCtx.moveTo(colX, maxDefY); bkColCtx.lineTo(maxDefX, maxDefY);
    bkColCtx.stroke();
    bkColCtx.setLineDash([]);
    bkColCtx.fillStyle = getCSS('--accent4');
    bkColCtx.font = '12px sans-serif';
    bkColCtx.fillText('y_max', maxDefX + 5, maxDefY - 5);
  } else {
    // straight column
    bkColCtx.strokeStyle = getCSS('--accent');
    bkColCtx.lineWidth = 4;
    bkColCtx.beginPath();
    bkColCtx.moveTo(colX, colTop); bkColCtx.lineTo(colX, colBot);
    bkColCtx.stroke();
  }

  // status
  if(P >= 1.0){
    bkStatusSpan.textContent = 'BUCKLING! (유일성 실패)';
    bkStatusSpan.style.color = getCSS('--accent2');
  } else if(P >= 0.8){
    bkStatusSpan.textContent = '임계하중 접근 중...';
    bkStatusSpan.style.color = getCSS('--accent4');
  } else {
    bkStatusSpan.textContent = '안정 (유일해)';
    bkStatusSpan.style.color = getCSS('--accent3');
  }

  // labels
  bkColCtx.fillStyle = getCSS('--canvas-label');
  bkColCtx.font = '12px sans-serif';
  bkColCtx.fillText('x=0', colX + 20, colTop + 5);
  bkColCtx.fillText('x=L', colX + 20, colBot + 5);
  bkColCtx.fillText('y(x)', w - 45, colTop + colLen/2);

  // title
  bkColCtx.fillStyle = isBuckled ? getCSS('--accent2') : getCSS('--accent');
  bkColCtx.font = 'bold 13px sans-serif';
  bkColCtx.fillText(isBuckled ? '좌굴 발생!' : '안정 상태', 12, 20);
  bkColCtx.fillStyle = getCSS('--canvas-label');
  bkColCtx.font = '12px sans-serif';
  bkColCtx.fillText('P/Pcr = ' + P.toFixed(2), 12, 38);
}

function drawBucklBifur(){
  const w = bkBifCvs.width, h = bkBifCvs.height;
  const P = parseFloat(bkSlider.value);

  bkBifCtx.clearRect(0,0,w,h);
  bkBifCtx.fillStyle = getCSS('--canvas-bg');
  bkBifCtx.fillRect(0,0,w,h);

  const pad = 50, padR = 20, padT = 30;
  const plotW = w - pad - padR, plotH = h - padT - pad;

  // axes
  bkBifCtx.strokeStyle = getCSS('--canvas-axis');
  bkBifCtx.lineWidth = 1.5;
  bkBifCtx.beginPath();
  bkBifCtx.moveTo(pad, padT); bkBifCtx.lineTo(pad, padT + plotH);
  bkBifCtx.lineTo(pad + plotW, padT + plotH);
  bkBifCtx.stroke();

  // axis labels
  bkBifCtx.fillStyle = getCSS('--canvas-label');
  bkBifCtx.font = '12px sans-serif';
  bkBifCtx.fillText('P / Pcr', pad + plotW - 40, padT + plotH + 35);
  bkBifCtx.save();
  bkBifCtx.translate(15, padT + plotH / 2);
  bkBifCtx.rotate(-Math.PI/2);
  bkBifCtx.fillText('y_max (변위)', -30, 0);
  bkBifCtx.restore();

  // tick marks
  const pMax = 2.0;
  for(let tick = 0; tick <= 2; tick += 0.5){
    const tx = pad + (tick / pMax) * plotW;
    bkBifCtx.strokeStyle = getCSS('--canvas-axis');
    bkBifCtx.lineWidth = 1;
    bkBifCtx.beginPath();
    bkBifCtx.moveTo(tx, padT + plotH); bkBifCtx.lineTo(tx, padT + plotH + 6);
    bkBifCtx.stroke();
    bkBifCtx.fillStyle = getCSS('--canvas-label');
    bkBifCtx.font = '11px sans-serif';
    bkBifCtx.fillText(tick.toFixed(1), tx - 8, padT + plotH + 18);
  }

  // Pcr vertical line
  const pcrX = pad + (1.0 / pMax) * plotW;
  bkBifCtx.strokeStyle = getCSS('--accent2') + '44';
  bkBifCtx.lineWidth = 1;
  bkBifCtx.setLineDash([4,4]);
  bkBifCtx.beginPath();
  bkBifCtx.moveTo(pcrX, padT); bkBifCtx.lineTo(pcrX, padT + plotH);
  bkBifCtx.stroke();
  bkBifCtx.setLineDash([]);
  bkBifCtx.fillStyle = getCSS('--accent2');
  bkBifCtx.font = '11px sans-serif';
  bkBifCtx.fillText('Pcr', pcrX - 8, padT - 5);

  // region shading
  // stable region (P < Pcr)
  bkBifCtx.fillStyle = getCSS('--accent3') + '10';
  bkBifCtx.fillRect(pad, padT, pcrX - pad, plotH);
  // unstable region (P >= Pcr)
  bkBifCtx.fillStyle = getCSS('--accent2') + '10';
  bkBifCtx.fillRect(pcrX, padT, pad + plotW - pcrX, plotH);

  // region labels
  bkBifCtx.font = '11px sans-serif';
  bkBifCtx.fillStyle = getCSS('--accent3') + 'aa';
  bkBifCtx.fillText('유일해', pad + 10, padT + 18);
  bkBifCtx.fillStyle = getCSS('--accent2') + 'aa';
  bkBifCtx.fillText('비유일해', pcrX + 8, padT + 18);

  // trivial solution y=0 (horizontal line along P axis)
  bkBifCtx.strokeStyle = getCSS('--accent');
  bkBifCtx.lineWidth = 2.5;
  bkBifCtx.beginPath();
  bkBifCtx.moveTo(pad, padT + plotH);
  bkBifCtx.lineTo(pad + plotW, padT + plotH);
  bkBifCtx.stroke();

  // bifurcation branches (pitchfork): y_max grows after P=Pcr
  // upper branch
  bkBifCtx.strokeStyle = getCSS('--accent2');
  bkBifCtx.lineWidth = 2.5;
  bkBifCtx.beginPath();
  let first = true;
  for(let pp = 1.0; pp <= pMax; pp += 0.01){
    const yNorm = Math.sqrt(pp - 1.0) * 0.7; // normalized
    const sx = pad + (pp / pMax) * plotW;
    const sy = padT + plotH - yNorm * plotH;
    if(first){ bkBifCtx.moveTo(sx, sy); first = false; }
    else bkBifCtx.lineTo(sx, sy);
  }
  bkBifCtx.stroke();
  // lower branch (symmetric)
  bkBifCtx.strokeStyle = getCSS('--accent2');
  bkBifCtx.setLineDash([4,4]);
  bkBifCtx.beginPath();
  first = true;
  for(let pp = 1.0; pp <= pMax; pp += 0.01){
    const yNorm = -Math.sqrt(pp - 1.0) * 0.7;
    const sx = pad + (pp / pMax) * plotW;
    const sy = padT + plotH - yNorm * plotH;
    if(first){ bkBifCtx.moveTo(sx, sy); first = false; }
    else bkBifCtx.lineTo(sx, sy);
  }
  bkBifCtx.stroke();
  bkBifCtx.setLineDash([]);

  // bifurcation point
  bkBifCtx.fillStyle = getCSS('--accent2');
  bkBifCtx.beginPath();
  bkBifCtx.arc(pcrX, padT + plotH, 5, 0, Math.PI*2);
  bkBifCtx.fill();

  // current P dot
  const curX = pad + (P / pMax) * plotW;
  let curY;
  if(P < 1.0){
    curY = padT + plotH;
  } else {
    const yNorm = Math.sqrt(P - 1.0) * 0.7;
    curY = padT + plotH - yNorm * plotH;
  }
  bkBifCtx.fillStyle = P >= 1.0 ? getCSS('--accent2') : getCSS('--accent3');
  bkBifCtx.shadowColor = bkBifCtx.fillStyle;
  bkBifCtx.shadowBlur = 8;
  bkBifCtx.beginPath();
  bkBifCtx.arc(curX, curY, 6, 0, Math.PI*2);
  bkBifCtx.fill();
  bkBifCtx.shadowBlur = 0;

  // legend
  bkBifCtx.font = '11px sans-serif';
  const legX = pad + plotW - 110, legY = padT + 40;
  bkBifCtx.fillStyle = getCSS('--accent');
  bkBifCtx.fillRect(legX, legY, 14, 3);
  bkBifCtx.fillText('y = 0 (곧은 상태)', legX + 20, legY + 4);
  bkBifCtx.fillStyle = getCSS('--accent2');
  bkBifCtx.fillRect(legX, legY + 18, 14, 3);
  bkBifCtx.fillText('좌굴 변위', legX + 20, legY + 22);

  // title
  bkBifCtx.fillStyle = getCSS('--canvas-label');
  bkBifCtx.font = 'bold 13px sans-serif';
  bkBifCtx.fillText('분기 다이어그램', 12, 18);
}

function drawBucklModes(){
  const w = bkModeCvs.width, h = bkModeCvs.height;
  bkModeCtx.clearRect(0,0,w,h);
  bkModeCtx.fillStyle = getCSS('--canvas-bg');
  bkModeCtx.fillRect(0,0,w,h);

  const pad = 50, padR = 30, padT = 25;
  const plotW = w - pad - padR, plotH = h - padT - 40;

  // axes
  bkModeCtx.strokeStyle = getCSS('--canvas-axis');
  bkModeCtx.lineWidth = 1.5;
  bkModeCtx.beginPath();
  bkModeCtx.moveTo(pad, padT + plotH / 2 - plotH / 2 - 5);
  bkModeCtx.lineTo(pad, padT + plotH + 5);
  bkModeCtx.moveTo(pad, padT + plotH / 2);
  bkModeCtx.lineTo(pad + plotW, padT + plotH / 2);
  bkModeCtx.stroke();

  bkModeCtx.fillStyle = getCSS('--canvas-label');
  bkModeCtx.font = '12px sans-serif';
  bkModeCtx.fillText('x / L', pad + plotW - 30, padT + plotH / 2 + 20);
  bkModeCtx.fillText('y', pad - 15, padT + 5);

  // tick marks on x
  for(let t = 0; t <= 1; t += 0.25){
    const tx = pad + t * plotW;
    bkModeCtx.strokeStyle = getCSS('--canvas-axis');
    bkModeCtx.lineWidth = 1;
    bkModeCtx.beginPath();
    bkModeCtx.moveTo(tx, padT + plotH / 2 - 3);
    bkModeCtx.lineTo(tx, padT + plotH / 2 + 3);
    bkModeCtx.stroke();
    if(t === 0 || t === 1){
      bkModeCtx.fillStyle = getCSS('--canvas-label');
      bkModeCtx.font = '10px sans-serif';
      bkModeCtx.fillText(t.toFixed(0), tx - 3, padT + plotH / 2 + 16);
    }
  }

  // supports at x=0 and x=L
  [0, 1].forEach(t => {
    const sx = pad + t * plotW;
    const sy = padT + plotH / 2;
    bkModeCtx.fillStyle = getCSS('--canvas-axis');
    bkModeCtx.beginPath();
    bkModeCtx.moveTo(sx, sy); bkModeCtx.lineTo(sx - 6, sy + 10); bkModeCtx.lineTo(sx + 6, sy + 10);
    bkModeCtx.fill();
  });

  const modeColors = [getCSS('--accent'), getCSS('--accent2'), getCSS('--accent4')];
  const modeLabels = ['1st: P₁ = Pcr', '2nd: P₂ = 4Pcr', '3rd: P₃ = 9Pcr'];
  const amplitude = plotH / 2 * 0.8;

  for(let n = 1; n <= 3; n++){
    if(bucklModeShow !== 0 && bucklModeShow !== n) continue;

    bkModeCtx.strokeStyle = modeColors[n-1];
    bkModeCtx.lineWidth = 2.5;
    bkModeCtx.beginPath();
    for(let i = 0; i <= 200; i++){
      const t = i / 200;
      const sx = pad + t * plotW;
      const sy = padT + plotH / 2 - (amplitude / n) * Math.sin(n * Math.PI * t);
      if(i === 0) bkModeCtx.moveTo(sx, sy);
      else bkModeCtx.lineTo(sx, sy);
    }
    bkModeCtx.stroke();

    // label
    bkModeCtx.fillStyle = modeColors[n-1];
    bkModeCtx.font = 'bold 12px sans-serif';
    const labY = padT + plotH + 15;
    const labX = pad + (n - 1) * (plotW / 3) + 10;
    bkModeCtx.fillRect(labX, labY - 6, 14, 3);
    bkModeCtx.font = '11px sans-serif';
    bkModeCtx.fillText(modeLabels[n-1], labX + 20, labY);
  }

  // title
  bkModeCtx.fillStyle = getCSS('--canvas-label');
  bkModeCtx.font = 'bold 13px sans-serif';
  bkModeCtx.fillText('좌굴 모드 형상', 12, 16);
}

function setBucklMode(n){
  bucklModeShow = n;
  drawBucklModes();
}

function drawBucklAll(){
  drawBucklColumn();
  drawBucklBifur();
  drawBucklModes();
}

bkSlider.addEventListener('input', () => { drawBucklColumn(); drawBucklBifur(); });
drawBucklAll();

let verifyStep = 1;
function advanceVerify(){
  verifyStep++;
  if(verifyStep > 4) verifyStep = 1;
  for(let i = 1; i <= 4; i++){
    const el = document.getElementById('vs' + i);
    if(i <= verifyStep) el.classList.add('active');
    else el.classList.remove('active');
  }
  if(verifyStep === 4){
    document.getElementById('verifyBtn').textContent = '처음부터';
  } else {
    document.getElementById('verifyBtn').textContent = '다음 단계';
  }
  if(verifyStep === 1){
    for(let i = 2; i <= 4; i++) document.getElementById('vs'+i).classList.remove('active');
  }
}

// ── Exponential Decay ──
const decCvs = document.getElementById('decayCanvas');
const decCtx = decCvs.getContext('2d');
function drawDecay(tMax){
  const w = decCvs.width, h = decCvs.height;
  const pad = 30;
  decCtx.clearRect(0,0,w,h);
  decCtx.fillStyle = getCSS('--canvas-physics-bg');
  decCtx.fillRect(0,0,w,h);
  // axes
  decCtx.strokeStyle = getCSS('--canvas-axis'); decCtx.lineWidth = 1;
  decCtx.beginPath();
  decCtx.moveTo(pad, h - pad); decCtx.lineTo(w - 10, h - pad);
  decCtx.moveTo(pad, h - pad); decCtx.lineTo(pad, 10);
  decCtx.stroke();
  decCtx.fillStyle = getCSS('--canvas-label'); decCtx.font = '11px sans-serif';
  decCtx.fillText('t', w - 18, h - pad - 5);
  decCtx.fillText('N', pad + 5, 18);

  const N0 = 1, k = 0.5;
  const tEnd = 6;
  decCtx.strokeStyle = getCSS('--accent3'); decCtx.lineWidth = 2.5;
  decCtx.beginPath();
  for(let t = 0; t <= Math.min(tMax, tEnd); t += 0.05){
    const N = N0 * Math.exp(-k * t);
    const sx = pad + t / tEnd * (w - pad - 15);
    const sy = (h - pad) - N * (h - pad - 15);
    if(t === 0) decCtx.moveTo(sx, sy);
    else decCtx.lineTo(sx, sy);
  }
  decCtx.stroke();

  // dot at end
  if(tMax <= tEnd){
    const N = N0 * Math.exp(-k * tMax);
    const sx = pad + tMax / tEnd * (w - pad - 15);
    const sy = (h - pad) - N * (h - pad - 15);
    decCtx.fillStyle = getCSS('--accent3');
    decCtx.beginPath(); decCtx.arc(sx, sy, 4, 0, Math.PI*2); decCtx.fill();
  }
}

// ── Spring ──
const sprCvs = document.getElementById('springCanvas');
const sprCtx = sprCvs.getContext('2d');
function drawSpring(tMax){
  const w = sprCvs.width, h = sprCvs.height;
  const pad = 30;
  sprCtx.clearRect(0,0,w,h);
  sprCtx.fillStyle = getCSS('--canvas-physics-bg');
  sprCtx.fillRect(0,0,w,h);
  sprCtx.strokeStyle = getCSS('--canvas-axis'); sprCtx.lineWidth = 1;
  sprCtx.beginPath();
  sprCtx.moveTo(pad, h/2); sprCtx.lineTo(w - 10, h/2);
  sprCtx.moveTo(pad, h - 10); sprCtx.lineTo(pad, 10);
  sprCtx.stroke();
  sprCtx.fillStyle = getCSS('--canvas-label'); sprCtx.font = '11px sans-serif';
  sprCtx.fillText('t', w - 18, h/2 - 5);
  sprCtx.fillText('x', pad + 5, 18);

  const omega = 2, A = 0.85;
  const tEnd = 6;
  sprCtx.strokeStyle = getCSS('--accent'); sprCtx.lineWidth = 2.5;
  sprCtx.beginPath();
  for(let t = 0; t <= Math.min(tMax, tEnd); t += 0.03){
    const x = A * Math.cos(omega * t);
    const sx = pad + t / tEnd * (w - pad - 15);
    const sy = h/2 - x * (h/2 - 20);
    if(t === 0) sprCtx.moveTo(sx, sy);
    else sprCtx.lineTo(sx, sy);
  }
  sprCtx.stroke();

  if(tMax <= tEnd){
    const x = A * Math.cos(omega * tMax);
    const sx = pad + tMax / tEnd * (w - pad - 15);
    const sy = h/2 - x * (h/2 - 20);
    sprCtx.fillStyle = getCSS('--accent');
    sprCtx.beginPath(); sprCtx.arc(sx, sy, 4, 0, Math.PI*2); sprCtx.fill();

    // draw spring on left side
    const baseX = 8, baseY = h/2;
    const blockY = h/2 - x * (h/2 - 20);
    sprCtx.strokeStyle = getCSS('--accent') + '55'; sprCtx.lineWidth = 1.5;
    sprCtx.beginPath();
    const nCoils = 8;
    for(let i = 0; i <= nCoils * 4; i++){
      const frac = i / (nCoils * 4);
      const cy = baseY + (blockY - baseY) * frac;
      const cx = baseX + 10 + Math.sin(i * Math.PI / 2) * 5;
      if(i === 0) sprCtx.moveTo(cx, cy);
      else sprCtx.lineTo(cx, cy);
    }
    sprCtx.stroke();
  }
}

// ── Logistic ──
const logCvs = document.getElementById('logisticCanvas');
const logCtx = logCvs.getContext('2d');
function drawLogistic(tMax){
  const w = logCvs.width, h = logCvs.height;
  const pad = 30;
  logCtx.clearRect(0,0,w,h);
  logCtx.fillStyle = getCSS('--canvas-physics-bg');
  logCtx.fillRect(0,0,w,h);
  logCtx.strokeStyle = getCSS('--canvas-axis'); logCtx.lineWidth = 1;
  logCtx.beginPath();
  logCtx.moveTo(pad, h - pad); logCtx.lineTo(w - 10, h - pad);
  logCtx.moveTo(pad, h - pad); logCtx.lineTo(pad, 10);
  logCtx.stroke();
  logCtx.fillStyle = getCSS('--canvas-label'); logCtx.font = '11px sans-serif';
  logCtx.fillText('t', w - 18, h - pad - 5);
  logCtx.fillText('P', pad + 5, 18);

  const K = 1, r = 1.5, C = 9; // P0 = K/(1+C) ≈ 0.1
  const tEnd = 6;
  // carrying capacity line
  logCtx.strokeStyle = getCSS('--accent2') + '44'; logCtx.lineWidth = 1;
  logCtx.setLineDash([4,4]);
  const Ky = (h - pad) - K * (h - pad - 20);
  logCtx.beginPath(); logCtx.moveTo(pad, Ky); logCtx.lineTo(w-10, Ky); logCtx.stroke();
  logCtx.setLineDash([]);
  logCtx.fillStyle = getCSS('--accent2') + '88'; logCtx.fillText('K', w - 18, Ky - 5);

  logCtx.strokeStyle = getCSS('--accent4'); logCtx.lineWidth = 2.5;
  logCtx.beginPath();
  for(let t = 0; t <= Math.min(tMax, tEnd); t += 0.05){
    const P = K / (1 + C * Math.exp(-r * t));
    const sx = pad + t / tEnd * (w - pad - 15);
    const sy = (h - pad) - P * (h - pad - 20);
    if(t === 0) logCtx.moveTo(sx, sy);
    else logCtx.lineTo(sx, sy);
  }
  logCtx.stroke();

  if(tMax <= tEnd){
    const P = K / (1 + C * Math.exp(-r * tMax));
    const sx = pad + tMax / tEnd * (w - pad - 15);
    const sy = (h - pad) - P * (h - pad - 20);
    logCtx.fillStyle = getCSS('--accent4');
    logCtx.beginPath(); logCtx.arc(sx, sy, 4, 0, Math.PI*2); logCtx.fill();
  }
}

// ── Free Fall ──
const falCvs = document.getElementById('fallCanvas');
const falCtx = falCvs.getContext('2d');
function drawFall(tMax){
  const w = falCvs.width, h = falCvs.height;
  const pad = 30;
  falCtx.clearRect(0,0,w,h);
  falCtx.fillStyle = getCSS('--canvas-physics-bg');
  falCtx.fillRect(0,0,w,h);
  falCtx.strokeStyle = getCSS('--canvas-axis'); falCtx.lineWidth = 1;
  falCtx.beginPath();
  falCtx.moveTo(pad, h - pad); falCtx.lineTo(w - 10, h - pad);
  falCtx.moveTo(pad, h - pad); falCtx.lineTo(pad, 10);
  falCtx.stroke();
  falCtx.fillStyle = getCSS('--canvas-label'); falCtx.font = '11px sans-serif';
  falCtx.fillText('t', w - 18, h - pad - 5);
  falCtx.fillText('v', pad + 5, 18);

  const vt = 1; // terminal velocity (normalized)
  const tau = 1;
  const tEnd = 6;
  // terminal velocity line
  falCtx.strokeStyle = getCSS('--accent3') + '44'; falCtx.lineWidth = 1;
  falCtx.setLineDash([4,4]);
  const vtY = (h - pad) - vt * (h - pad - 20);
  falCtx.beginPath(); falCtx.moveTo(pad, vtY); falCtx.lineTo(w-10, vtY); falCtx.stroke();
  falCtx.setLineDash([]);
  falCtx.fillStyle = getCSS('--accent3') + '88'; falCtx.fillText('v_t', w - 22, vtY - 5);

  falCtx.strokeStyle = '#9b59b6'; falCtx.lineWidth = 2.5;
  falCtx.beginPath();
  for(let t = 0; t <= Math.min(tMax, tEnd); t += 0.05){
    const v = vt * (1 - Math.exp(-t / tau));
    const sx = pad + t / tEnd * (w - pad - 15);
    const sy = (h - pad) - v * (h - pad - 20);
    if(t === 0) falCtx.moveTo(sx, sy);
    else falCtx.lineTo(sx, sy);
  }
  falCtx.stroke();

  if(tMax <= tEnd){
    const v = vt * (1 - Math.exp(-tMax / tau));
    const sx = pad + tMax / tEnd * (w - pad - 15);
    const sy = (h - pad) - v * (h - pad - 20);
    falCtx.fillStyle = '#9b59b6';
    falCtx.beginPath(); falCtx.arc(sx, sy, 4, 0, Math.PI*2); falCtx.fill();
  }
}

// ── Animate all physics ──
let physT = 0;
function animatePhysics(){
  physT += 0.04;
  if(physT > 8) physT = 0;
  drawDecay(physT);
  drawSpring(physT);
  drawLogistic(physT);
  drawFall(physT);
  requestAnimationFrame(animatePhysics);
}

<!-- ═══════════════════ 1. 제1법칙 ═══════════════════ -->
<section class="section" id="law1">
  <h2 class="section-title">제1법칙: 관성의 법칙</h2>
  <p class="section-subtitle">외부 힘이 없으면 물체는 현재 운동 상태를 유지한다</p>

  <div class="grid-2">
    <div class="card">
      <h3>물리적 관점</h3>
      <p>
        정지한 물체는 계속 정지해 있고, 운동 중인 물체는 등속 직선운동을 계속한다.
        이것은 물체가 자신의 운동 상태를 바꾸려는 시도에 <strong>저항</strong>하는 성질,
        즉 <strong>관성(inertia)</strong>을 가지고 있음을 선언한다.
      </p>
      <p style="margin-top:1rem;">
        질량 \(m\)은 바로 이 관성의 크기를 나타내는 양이다.
        질량이 클수록 운동 상태를 바꾸기 어렵다.
      </p>
    </div>
    <div class="card card-accent2">
      <h3>미분방정식 관점</h3>
      <p>
        외부 힘이 없다는 조건 \(\vec{F} = 0\)을 제2법칙에 대입하면:
      </p>
      <p style="text-align:center; font-size:1.2rem; margin: 1rem 0;">
        \(m\dfrac{d\vec{v}}{dt} = 0 \quad \Longrightarrow \quad \dfrac{d\vec{v}}{dt} = 0\)
      </p>
      <p>
        이것은 가장 간단한 1차 ODE이다. 해는:
      </p>
      <p style="text-align:center; font-size:1.2rem; margin: 1rem 0;">
        \(\vec{v}(t) = \vec{v}_0 = \text{const}\)
      </p>
      <p>
        즉 속도가 상수, 등속 직선운동이다. 적분하면 위치는
        \(\vec{r}(t) = \vec{r}_0 + \vec{v}_0 t\) — 시간에 대한 1차 함수.
      </p>
    </div>
  </div>

  <div class="analogy-box" data-label="ANALOGY">
    <p>
      <strong>우주 공간의 야구공:</strong> 우주에서 공을 던지면 마찰도, 중력도 없으므로
      공은 영원히 같은 방향, 같은 속도로 날아간다. "멈추는 것"이 아니라 "멈추지 않는 것"이 자연의 기본 상태다.
    </p>
  </div>

  <div class="analogy-box insight" data-label="INSIGHT">
    <p>
      <strong>관성 기준틀의 정의:</strong> 제1법칙은 단순한 제2법칙의 특수한 경우가 아니다.
      제1법칙은 <strong>관성 기준틀(inertial frame)</strong>의 존재를 선언하는 법칙이다.
      "힘이 작용하지 않을 때 등속 직선운동을 하는 기준틀이 존재한다"는 것이 핵심이며,
      제2법칙과 제3법칙은 이 관성 기준틀 안에서만 성립한다.
    </p>
  </div>
</section>

<!-- ═══════════════════ 2. 제2법칙 ═══════════════════ -->
<section class="section" id="law2">
  <h2 class="section-title">제2법칙: 가속도의 법칙</h2>
  <p class="section-subtitle">힘은 질량과 가속도의 곱이다 — 역학의 핵심 방정식</p>

  <div class="card" style="border-color: var(--accent2); border-width: 2px;">
    <h3 style="color: var(--accent2); font-size:1.5rem; text-align:center;">핵심 공식</h3>
    <p style="text-align:center; font-size:1.8rem; margin: 1.5rem 0;">
      \(\vec{F} = m\vec{a} = m\dfrac{d^2\vec{r}}{dt^2}\)
    </p>
  </div>

  <div class="grid-2">
    <div class="card">
      <h3>물리적 관점</h3>
      <p>
        물체에 알짜힘 \(\vec{F}\)가 작용하면, 물체는 힘의 방향으로 가속도 \(\vec{a}\)를 가진다.
        같은 힘이라도 질량이 크면 가속도가 작고, 질량이 작으면 가속도가 크다.
      </p>
      <p style="margin-top:1rem;">
        <strong>인과관계:</strong> 힘(원인) → 가속도(결과). 힘은 운동 상태의 <em>변화율</em>을 결정한다.
        위치나 속도를 직접 결정하는 것이 아니라, 속도의 변화율(=가속도)을 결정한다는 점이 핵심이다.
      </p>
    </div>
    <div class="card card-accent2">
      <h3>미분방정식 관점</h3>
      <p>
        \(\vec{F} = m\ddot{\vec{r}}\)은 <strong>2차 상미분방정식(ODE)</strong>의 프레임워크이다.
      </p>
      <p style="margin-top:1rem;">
        위치 \(\vec{r}(t)\)가 미지함수이고, 그 2차 도함수가 우변의 힘에 의해 결정된다.
        2차 ODE이므로 일반해에는 <strong>두 개의 적분상수</strong>가 나타나며,
        이를 결정하기 위해 <strong>두 개의 초기조건</strong>이 필요하다:
      </p>
      <p style="text-align:center; font-size:1.1rem; margin: 1rem 0;">
        \(\vec{r}(0) = \vec{r}_0, \quad \dot{\vec{r}}(0) = \vec{v}_0\)
      </p>
      <p>
        초기 위치와 초기 속도 — 이것이 "어디서, 어떤 속도로 출발했는가"에 해당한다.
      </p>
    </div>
  </div>

  <div class="analogy-box warning" data-label="CRITICAL QUESTION">
    <p>
      <strong>그런데 잠깐 — 이것만으로 충분한가?</strong><br>
      \(m\ddot{\vec{r}} = \vec{F}\)라는 방정식과 초기조건 \(\vec{r}(0), \dot{\vec{r}}(0)\)이 있다.
      하지만 우변의 \(\vec{F}\)가 무엇인지 모르면 방정식을 풀 수 없다!
      제2법칙은 <em>"힘이 주어지면 운동을 결정할 수 있다"</em>는 <strong>프레임워크</strong>일 뿐,
      <strong>힘 자체가 무엇인지는 알려주지 않는다.</strong>
    </p>
  </div>
</section>

<!-- ═══════════════════ 3. 완전한 세트 ═══════════════════ -->
<section class="key-insight-section" id="complete-set">
<div class="section">
  <h2 class="section-title" style="background: linear-gradient(135deg, var(--accent2), var(--accent4)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
    완전한 운동 기술의 조건
  </h2>
  <p class="section-subtitle" style="border-color: var(--accent2);">
    운동법칙 + 힘의 법칙 + 초기조건 = 풀 수 있는 미분방정식
  </p>

  <div class="card" style="border-color: var(--accent2); border-width: 2px;">
    <h3 style="color: var(--accent2);">핵심 통찰: 왜 만유인력 법칙이 필요한가</h3>
    <p>
      뉴턴의 제2법칙 \(m\ddot{\vec{r}} = \vec{F}\)는 물체의 운동을 기술하는 <strong>미분방정식의 틀</strong>이다.
      하지만 이것은 마치 "\(y'' = f(x, y)\)를 풀어라"라고 했는데 \(f\)가 무엇인지 안 알려준 것과 같다.
    </p>
    <p style="margin-top:1rem;">
      우변의 힘 \(\vec{F}\)를 <strong>미지함수(물체의 위치 \(\vec{r}\))에 대한 구체적인 함수</strong>로
      표현해야만 비로소 풀 수 있는 미분방정식이 된다. 이 역할을 하는 것이 바로
      <strong>힘의 법칙(Force Law)</strong>이다.
    </p>
  </div>

  <!-- Triad Diagram -->
  <div class="triad-diagram">
    <div class="triad-box box-ode">
      <h4>운동법칙 (ODE 틀)</h4>
      <div class="formula">\(m\ddot{\vec{r}} = \vec{F}\)</div>
      <div class="desc">"힘이 가속도를 결정한다"<br>— 방정식의 <strong>구조</strong></div>
    </div>
    <div class="plus-sign">+</div>
    <div class="triad-box box-force">
      <h4>힘의 법칙 (Force Law)</h4>
      <div class="formula">\(\vec{F} = -\dfrac{GMm}{|\vec{r}|^2}\hat{r}\)</div>
      <div class="desc">"힘은 위치의 함수이다"<br>— 방정식의 <strong>내용</strong></div>
    </div>
    <div class="plus-sign">+</div>
    <div class="triad-box box-ic">
      <h4>초기조건 (IC)</h4>
      <div class="formula">\(\vec{r}(0),\; \dot{\vec{r}}(0)\)</div>
      <div class="desc">"어디서, 어떻게 출발했나"<br>— <strong>유일한 해</strong> 결정</div>
    </div>
    <div class="equals-sign">=</div>
    <div class="result-box">
      <h4>완전한 초기값 문제</h4>
      <div class="desc">물체의 과거·현재·미래<br>운동을 완전히 결정</div>
    </div>
  </div>

  <div class="card">
    <h3>구체적으로 비교해보자</h3>
    <p>제2법칙만 있을 때 vs. 힘의 법칙까지 있을 때:</p>

    <div class="grid-2" style="margin-top:1.5rem;">
      <div style="background:var(--code-bg); padding:1.5rem; border-radius:12px; border-left:3px solid var(--accent);">
        <p style="color:var(--accent); font-weight:700; margin-bottom:0.5rem;">제2법칙만 (불완전)</p>
        <p style="font-size:1.1rem; margin:0.5rem 0;">
          \(m\ddot{\vec{r}} = \vec{F}(\;?\;)\)
        </p>
        <p style="color:var(--text-dim); font-size:0.9rem;">
          \(\vec{F}\)가 뭔지 모른다. <br>
          "어떤 함수의 2차 도함수가 어떤 값과 같다"<br>
          — 풀 수 없다!
        </p>
      </div>
      <div style="background:var(--code-bg); padding:1.5rem; border-radius:12px; border-left:3px solid var(--accent3);">
        <p style="color:var(--accent3); font-weight:700; margin-bottom:0.5rem;">운동법칙 + 만유인력 (완전)</p>
        <p style="font-size:1.1rem; margin:0.5rem 0;">
          \(m\ddot{\vec{r}} = -\dfrac{GMm}{|\vec{r}|^2}\hat{r}\)
        </p>
        <p style="color:var(--text-dim); font-size:0.9rem;">
          우변이 \(\vec{r}\)의 함수로 명확히 표현됨.<br>
          초기조건과 함께 유일한 해가 존재.<br>
          — 궤도를 완전히 결정할 수 있다!
        </p>
      </div>
    </div>
  </div>

  <div class="card card-accent4">
    <h3>다른 힘의 법칙들도 마찬가지다</h3>
    <p>만유인력 외에도, 힘의 법칙이 바뀌면 같은 제2법칙 틀에서 전혀 다른 ODE가 된다:</p>
    <table class="summary-table" style="margin-top:1rem;">
      <thead>
        <tr>
          <th>힘의 법칙</th>
          <th>완성된 ODE</th>
          <th>물리적 상황</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>\(F = -mg\)</td>
          <td>\(m\ddot{y} = -mg\)</td>
          <td>지표면 근처 자유낙하</td>
        </tr>
        <tr>
          <td>\(F = -kx\)</td>
          <td>\(m\ddot{x} + kx = 0\)</td>
          <td>용수철 진동 (훅의 법칙)</td>
        </tr>
        <tr>
          <td>\(F = -\dfrac{GMm}{r^2}\)</td>
          <td>\(m\ddot{\vec{r}} = -\dfrac{GMm}{r^2}\hat{r}\)</td>
          <td>행성 궤도 운동</td>
        </tr>
        <tr>
          <td>\(F = mg - bv\)</td>
          <td>\(m\dot{v} = mg - bv\)</td>
          <td>공기저항이 있는 낙하</td>
        </tr>
      </tbody>
    </table>
    <p style="margin-top:1rem; color:var(--text-dim);">
      제2법칙은 <strong>모든 역학 문제의 공통 프레임워크</strong>이고,
      힘의 법칙이 각 물리적 상황의 <strong>고유한 내용</strong>을 제공한다.
      이 둘이 결합해야 비로소 <strong>풀 수 있는 미분방정식</strong>이 완성된다.
    </p>
  </div>

  <div class="analogy-box key" data-label="KEY TAKEAWAY">
    <p style="font-size:1.1rem;">
      <strong>뉴턴 역학의 완전한 세트:</strong>
    </p>
    <p style="text-align:center; font-size:1.3rem; margin: 1rem 0;">
      <span style="color:var(--accent);">운동법칙</span> (ODE의 구조) +
      <span style="color:var(--accent2);">힘의 법칙</span> (ODE의 내용) +
      <span style="color:var(--accent3);">초기조건</span> (유일해 결정)
    </p>
    <p>
      이 세 가지가 모여야 물체의 운동을 <strong>과거에서 미래까지 완전히 기술</strong>할 수 있다.
      만유인력 법칙은 단순히 "중력의 크기 공식"이 아니라,
      제2법칙이라는 ODE 프레임워크를 <strong>풀 수 있는 구체적 방정식으로 완성</strong>시키는 핵심 요소이다.
    </p>
  </div>

  <!-- Interactive ODE Builder -->
  <div class="sim-container" style="margin-top:3rem;">
    <h4 style="font-size:1.15rem; margin-bottom:0.3rem;">체험: 운동 방정식 조립 과정</h4>
    <p style="color:var(--text-dim); font-size:0.88rem; margin-bottom:1.5rem;">세 요소를 조합하여 완전한 초기값 문제가 만들어지는 과정을 직접 확인하세요</p>

    <!-- Three panels -->
    <div class="builder-panels">
      <!-- Panel 1: 운동법칙 -->
      <div class="builder-panel panel-ode">
        <h5>운동법칙 (ODE 틀)</h5>
        <div class="panel-formula">\(m\ddot{x} = F\)</div>
        <div class="panel-lock">항상 동일한 프레임워크</div>
      </div>
      <!-- Panel 2: 힘의 법칙 -->
      <div class="builder-panel panel-force">
        <h5>힘의 법칙 선택</h5>
        <div class="force-btns">
          <button class="force-btn active" id="forceBtn1" onclick="setForcelaw('gravity')">균일중력 \(F = mg\)</button>
          <button class="force-btn" id="forceBtn2" onclick="setForcelaw('spring')">스프링 \(F = -kx\)</button>
          <button class="force-btn" id="forceBtn3" onclick="setForcelaw('drag')">중력+저항 \(F = mg - bv\)</button>
        </div>
      </div>
      <!-- Panel 3: 초기조건 -->
      <div class="builder-panel panel-ic">
        <h5>초기조건 설정</h5>
        <div class="ic-slider-group">
          <label><span id="ic1Label">\(x(0)\)</span> <span id="ic1Val">0</span></label>
          <input type="range" id="ic1Slider" min="-2" max="2" step="0.1" value="0" oninput="updateIC()">
        </div>
        <div class="ic-slider-group">
          <label><span id="ic2Label">\(\dot{x}(0)\)</span> <span id="ic2Val">5</span></label>
          <input type="range" id="ic2Slider" min="-5" max="10" step="0.5" value="5" oninput="updateIC()">
        </div>
      </div>
    </div>

    <!-- Assembled equation -->
    <div class="assembled-eq" id="assembledEq">
      <div class="eq-label">조립된 초기값 문제 (IVP)</div>
      <div class="eq-main" id="eqDisplay"></div>
    </div>

    <!-- Canvas -->
    <canvas id="builderCanvas" width="700" height="320"></canvas>
  </div>

</div>
</section>

<!-- ═══════════════════ 4. 제3법칙 ═══════════════════ -->
<section class="section" id="law3">
  <h2 class="section-title">제3법칙: 작용-반작용의 법칙</h2>
  <p class="section-subtitle">모든 힘은 쌍으로 나타난다</p>

  <div class="grid-2">
    <div class="card">
      <h3>물리적 관점</h3>
      <p>
        물체 A가 물체 B에 힘 \(\vec{F}_{AB}\)를 가하면,
        B는 A에 크기가 같고 방향이 반대인 힘 \(\vec{F}_{BA} = -\vec{F}_{AB}\)를 가한다.
      </p>
      <p style="margin-top:1rem;">
        <strong>주의:</strong> 작용과 반작용은 <em>서로 다른 물체</em>에 작용한다.
        같은 물체에 작용하는 것이 아니므로 서로 상쇄되지 않는다.
      </p>
      <p style="margin-top:1rem;">
        예: 지구가 사과를 당기면(\(mg\) 아래), 사과도 지구를 같은 크기로 당긴다(\(mg\) 위).
        단, 지구의 질량이 거대하므로 지구의 가속도는 무시할 만큼 작다.
      </p>
    </div>
    <div class="card card-accent3">
      <h3>미분방정식 관점: 운동량 보존</h3>
      <p>
        두 물체 계에서 제3법칙을 적용하면:
      </p>
      <p style="text-align:center; font-size:1.1rem; margin: 1rem 0;">
        \(\vec{F}_{12} = -\vec{F}_{21}\)
      </p>
      <p>
        뉴턴의 제2법칙을 각각 적용:
      </p>
      <p style="text-align:center; font-size:1.1rem; margin: 0.5rem 0;">
        \(m_1\ddot{\vec{r}}_1 = \vec{F}_{21}, \quad m_2\ddot{\vec{r}}_2 = \vec{F}_{12}\)
      </p>
      <p>
        양변을 더하면:
      </p>
      <p style="text-align:center; font-size:1.2rem; margin: 0.5rem 0;">
        \(\dfrac{d}{dt}(m_1\dot{\vec{r}}_1 + m_2\dot{\vec{r}}_2) = 0\)
      </p>
      <p style="text-align:center; font-size:1.3rem; margin: 1rem 0; color:var(--accent3);">
        \(\boxed{\vec{p}_{\text{total}} = m_1\vec{v}_1 + m_2\vec{v}_2 = \text{const}}\)
      </p>
      <p>
        제3법칙으로부터 <strong>운동량 보존법칙</strong>이 수학적으로 유도된다!
      </p>
    </div>
  </div>

  <div class="analogy-box" data-label="ANALOGY">
    <p>
      <strong>아이스링크 위의 두 사람:</strong> A가 B를 밀면, A도 뒤로 밀려난다.
      두 사람의 총 운동량은 밀기 전이나 후나 같다.
      로켓의 원리도 동일하다 — 연소 가스를 뒤로 밀면(작용), 로켓은 앞으로 나간다(반작용).
    </p>
  </div>
</section>

<!-- ═══════════════════ 7. 만유인력의 법칙 ═══════════════════ -->
<section class="section" id="gravity">
  <h2 class="section-title">만유인력의 법칙</h2>
  <p class="section-subtitle">모든 질량은 서로 끌어당긴다 — 중력의 수학적 표현</p>

  <div class="card" style="border-color: var(--accent4); border-width: 2px;">
    <h3 style="color: var(--accent4); font-size:1.4rem; text-align:center;">만유인력 공식</h3>
    <p style="text-align:center; font-size:1.8rem; margin: 1.5rem 0;">
      \(\vec{F} = -\dfrac{Gm_1 m_2}{|\vec{r}|^2}\hat{r}\)
    </p>
    <p style="text-align:center; color:var(--text-dim);">
      \(G = 6.674 \times 10^{-11}\; \text{N}\cdot\text{m}^2/\text{kg}^2\) (만유인력 상수)
    </p>
  </div>

  <div class="grid-2">
    <div class="card">
      <h3>물리적 관점</h3>
      <p>
        질량을 가진 모든 물체는 서로를 끌어당기는 인력을 가진다.
      </p>
      <p style="margin-top:0.8rem;"><strong>핵심 특성:</strong></p>
      <p>
        <span style="color:var(--accent4);">1.</span> <strong>역제곱 법칙:</strong> 거리의 제곱에 반비례. 거리가 2배 → 힘은 1/4<br>
        <span style="color:var(--accent4);">2.</span> <strong>질량에 비례:</strong> 두 질량의 곱에 비례<br>
        <span style="color:var(--accent4);">3.</span> <strong>항상 인력:</strong> 전기력과 달리 항상 끌어당김 (음의 부호)<br>
        <span style="color:var(--accent4);">4.</span> <strong>보편적:</strong> 사과와 지구, 지구와 달, 태양과 행성 — 모두 같은 법칙
      </p>
    </div>
    <div class="card card-accent4">
      <h3>미분방정식 관점: ODE의 완성</h3>
      <p>
        만유인력을 제2법칙에 대입하면 <strong>완전한 ODE</strong>가 된다:
      </p>
      <p style="text-align:center; font-size:1.2rem; margin: 1rem 0;">
        \(m\ddot{\vec{r}} = -\dfrac{GMm}{|\vec{r}|^2}\hat{r}\)
      </p>
      <p>
        \(m\)이 양변에서 소거된다:
      </p>
      <p style="text-align:center; font-size:1.2rem; margin: 0.5rem 0;">
        \(\ddot{\vec{r}} = -\dfrac{GM}{|\vec{r}|^2}\hat{r}\)
      </p>
      <p style="margin-top:1rem; color:var(--accent3);">
        놀라운 결과: 궤도는 물체의 질량 \(m\)에 무관하다!<br>
        이것이 <strong>등가원리</strong> — 관성질량과 중력질량의 동등성이다.
      </p>
    </div>
  </div>

  <!-- Historical Timeline -->
  <h3 style="color:var(--accent); margin: 2rem 0 1rem;">역사적 맥락</h3>
  <div class="timeline">
    <div class="timeline-item">
      <div class="year">1609-1619</div>
      <h4>케플러의 법칙</h4>
      <p>티코 브라헤의 관측 데이터로부터 행성 운동의 세 가지 패턴을 발견.
        타원 궤도, 면적 속도 일정, 주기-장반경 관계.</p>
    </div>
    <div class="timeline-item">
      <div class="year">1687</div>
      <h4>뉴턴의 프린키피아</h4>
      <p>만유인력 법칙 + 운동법칙으로 케플러의 모든 법칙을 <strong>수학적으로 유도</strong>.
        경험법칙이 보편법칙의 필연적 결과임을 증명한 역사적 성과.</p>
    </div>
    <div class="timeline-item">
      <div class="year">1798</div>
      <h4>캐번디시 실험</h4>
      <p>비틀림 저울을 사용하여 만유인력 상수 \(G\)를 최초로 측정.
        "지구의 무게를 잰 남자"라 불림.</p>
    </div>
  </div>

  <div class="analogy-box insight" data-label="DEEP INSIGHT">
    <p>
      <strong>지표면 근처 중력의 근사:</strong> 지구 표면에서 높이 \(h \ll R\) (지구 반지름)이면,
      \(F = \frac{GMm}{(R+h)^2} \approx \frac{GMm}{R^2} = mg\) 로 근사된다.
      여기서 \(g = \frac{GM}{R^2} \approx 9.8\;\text{m/s}^2\).
      즉 "일정한 중력 \(mg\)"는 만유인력의 <strong>근거리 근사</strong>에 불과하다.
    </p>
  </div>
</section>

<!-- ═══════════════════ 8. 궤도 운동 ═══════════════════ -->
<section class="section" id="orbit">
  <h2 class="section-title">만유인력의 미분방정식: 궤도 운동</h2>
  <p class="section-subtitle">극좌표에서 펼쳐지는 아름다운 수학</p>

  <div class="card">
    <h3>극좌표 운동방정식</h3>
    <p>
      중심력 문제는 극좌표 \((r, \theta)\)가 자연스럽다.
      극좌표에서의 가속도 성분을 사용하면 운동방정식은 두 개의 연립 ODE가 된다:
    </p>
    <p style="text-align:center; font-size:1.2rem; margin: 1.5rem 0;">
      \(\ddot{r} - r\dot{\theta}^2 = -\dfrac{GM}{r^2}\) &nbsp; (반지름 방향)
    </p>
    <p style="text-align:center; font-size:1.2rem; margin: 0.5rem 0;">
      \(r\ddot{\theta} + 2\dot{r}\dot{\theta} = 0\) &nbsp; (접선 방향)
    </p>

    <span class="derivation-toggle" onclick="toggleDerivation(this)">각운동량 보존 유도</span>
    <div class="derivation-content">
      <div class="step">
        <div class="step-label">접선 방향 방정식 변형</div>
        \(r\ddot{\theta} + 2\dot{r}\dot{\theta} = 0\)의 좌변은 \(\frac{1}{r}\frac{d}{dt}(r^2\dot{\theta})\)이다.
      </div>
      <div class="step">
        <div class="step-label">적분</div>
        \(\frac{d}{dt}(r^2\dot{\theta}) = 0\) → \(r^2\dot{\theta} = L = \text{const}\)
      </div>
      <div class="step">
        <div class="step-label">물리적 의미</div>
        \(L = r^2\dot{\theta}\)는 <strong>단위질량당 각운동량</strong>이다.
        중심력은 토크를 만들지 않으므로 각운동량이 보존된다.
        이것은 케플러의 제2법칙(면적 속도 일정)과 동치이다!
      </div>
    </div>
  </div>

  <div class="card card-accent5">
    <h3>궤도 방정식 유도</h3>
    <p>
      \(u = 1/r\)로 치환하고, 독립변수를 \(t\)에서 \(\theta\)로 바꾸면
      (비네 방정식, Binet's equation):
    </p>
    <p style="text-align:center; font-size:1.2rem; margin: 1.5rem 0;">
      \(\dfrac{d^2u}{d\theta^2} + u = \dfrac{GM}{L^2}\)
    </p>

    <span class="derivation-toggle" onclick="toggleDerivation(this)">풀이 과정 보기</span>
    <div class="derivation-content">
      <div class="step">
        <div class="step-label">Step 1: 상수항 비제차 ODE</div>
        이것은 상수 계수 2차 ODE이다. 제차해: \(u_h = A\cos(\theta - \theta_0)\)
      </div>
      <div class="step">
        <div class="step-label">Step 2: 특수해</div>
        특수해: \(u_p = \frac{GM}{L^2}\)
      </div>
      <div class="step">
        <div class="step-label">Step 3: 일반해</div>
        \(u = \frac{GM}{L^2} + A\cos(\theta - \theta_0)\)
      </div>
      <div class="step">
        <div class="step-label">Step 4: r로 되돌리기</div>
        \(r = \frac{1}{u} = \frac{L^2/GM}{1 + e\cos(\theta - \theta_0)}\)
        <p style="margin-top:0.5rem;">여기서 이심률 \(e = \frac{AL^2}{GM}\)</p>
      </div>
      <div class="step">
        <div class="step-label">최종 궤도 방정식</div>
        <p style="font-size:1.3rem; margin:0.5rem 0;">
          \(\boxed{r = \frac{p}{1 + e\cos\theta}, \quad p = \frac{L^2}{GM}}\)
        </p>
        <p>이것은 <strong>원뿔곡선(conic section)</strong>의 극좌표 방정식이다!</p>
      </div>
    </div>
  </div>

  <!-- Orbit types -->
  <h3 style="color:var(--accent5); margin:2rem 0 1rem;">이심률에 따른 궤도 분류</h3>
  <div class="orbit-types">
    <div class="orbit-type-card">
      <h5>원 (Circle)</h5>
      <div class="ecc">\(e = 0\)</div>
      <div class="energy">\(E < 0\) (최소)</div>
    </div>
    <div class="orbit-type-card">
      <h5>타원 (Ellipse)</h5>
      <div class="ecc">\(0 < e < 1\)</div>
      <div class="energy">\(E < 0\) (속박)</div>
    </div>
    <div class="orbit-type-card">
      <h5>포물선 (Parabola)</h5>
      <div class="ecc">\(e = 1\)</div>
      <div class="energy">\(E = 0\) (탈출 경계)</div>
    </div>
    <div class="orbit-type-card">
      <h5>쌍곡선 (Hyperbola)</h5>
      <div class="ecc">\(e > 1\)</div>
      <div class="energy">\(E > 0\) (탈출)</div>
    </div>
  </div>

  <!-- Orbit Simulation -->
  <div class="sim-container">
    <h4>궤도 운동 시뮬레이션 (초기 속도에 따른 궤도 변화)</h4>
    <canvas id="orbitCanvas" width="700" height="500"></canvas>
    <div class="sim-controls">
      <button class="sim-btn" id="orbitBtn1" onclick="setOrbit('circle')">원 궤도</button>
      <button class="sim-btn active" id="orbitBtn2" onclick="setOrbit('ellipse')">타원 궤도</button>
      <button class="sim-btn" id="orbitBtn3" onclick="setOrbit('hyperbola')">쌍곡선 궤도</button>
      <button class="sim-btn" onclick="restartOrbit()">재시작</button>
    </div>
  </div>
</section>

<!-- ═══════════════════ 9. 탈출속도 ═══════════════════ -->
<section class="section" id="escape">
  <h2 class="section-title">탈출속도</h2>
  <p class="section-subtitle">만유인력을 이기고 무한히 멀어지기 위한 최소 속도</p>

  <div class="card">
    <h3>에너지 보존으로 유도</h3>
    <p>
      만유인력은 보존력이므로, 역학적 에너지가 보존된다:
    </p>
    <p style="text-align:center; font-size:1.2rem; margin:1rem 0;">
      \(E = \frac{1}{2}mv^2 - \frac{GMm}{r} = \text{const}\)
    </p>
    <p>
      탈출 조건: \(r \to \infty\)에서 \(v \to 0\) (겨우 탈출) → \(E = 0\)
    </p>

    <span class="derivation-toggle" onclick="toggleDerivation(this)">유도 과정 보기</span>
    <div class="derivation-content">
      <div class="step">
        <div class="step-label">Step 1: 에너지 보존 (지표면 출발)</div>
        \(\frac{1}{2}mv_e^2 - \frac{GMm}{R} = 0\)
      </div>
      <div class="step">
        <div class="step-label">Step 2: 탈출속도 구하기</div>
        \(v_e = \sqrt{\frac{2GM}{R}}\)
      </div>
      <div class="step">
        <div class="step-label">Step 3: \(g = GM/R^2\) 이용</div>
        <p style="font-size:1.3rem;">\(\boxed{v_e = \sqrt{2gR}}\)</p>
        <p style="margin-top:0.5rem;">지구: \(v_e = \sqrt{2 \times 9.8 \times 6.37 \times 10^6} \approx 11.2\;\text{km/s}\)</p>
      </div>
    </div>
  </div>

  <div class="card card-accent2">
    <h3>ODE 관점: 미분방정식으로 유도</h3>
    <p>
      반지름 방향 1차원 운동방정식으로 출발:
    </p>
    <p style="text-align:center; font-size:1.1rem; margin:1rem 0;">
      \(m\dfrac{dv}{dt} = -\dfrac{GMm}{r^2}\)
    </p>
    <p>
      연쇄법칙으로 변수를 변환: \(\frac{dv}{dt} = \frac{dv}{dr}\frac{dr}{dt} = v\frac{dv}{dr}\)
    </p>
    <span class="derivation-toggle" onclick="toggleDerivation(this)">풀이 과정 보기</span>
    <div class="derivation-content">
      <div class="step">
        <div class="step-label">Step 1: 변수 변환 후 ODE</div>
        \(v\,dv = -\frac{GM}{r^2}\,dr\)
      </div>
      <div class="step">
        <div class="step-label">Step 2: 양변 적분</div>
        \(\int_{v_e}^{0} v\,dv = -GM\int_{R}^{\infty} \frac{dr}{r^2}\)
        <br>\(-\frac{v_e^2}{2} = -GM\left[-\frac{1}{r}\right]_R^\infty = -\frac{GM}{R}\)
      </div>
      <div class="step">
        <div class="step-label">Step 3: 결과</div>
        \(v_e = \sqrt{\frac{2GM}{R}} = \sqrt{2gR}\)
        <p style="margin-top:0.5rem;">에너지 보존과 정확히 같은 결과! ODE 풀이가 에너지 보존을 자동으로 내포하고 있다.</p>
      </div>
    </div>
  </div>
</section>

<!-- ═══════════════════ 10. 케플러 법칙 ═══════════════════ -->
<section class="section" id="kepler">
  <h2 class="section-title">케플러의 법칙: 만유인력의 결과</h2>
  <p class="section-subtitle">경험법칙이 미분방정식의 해로 증명되다</p>

  <div class="grid-2" style="margin-bottom: 2rem;">
    <div class="card" style="border-left: 4px solid var(--accent4);">
      <h3 style="color:var(--accent4);">케플러의 관점 (1609-1619)</h3>
      <p>
        관측 데이터에서 <strong>패턴을 발견</strong>.
        "행성은 타원 궤도를 그린다"는 것을 알았지만,
        <em>왜</em> 타원인지는 설명할 수 없었다.
      </p>
    </div>
    <div class="card" style="border-left: 4px solid var(--accent3);">
      <h3 style="color:var(--accent3);">뉴턴의 관점 (1687)</h3>
      <p>
        만유인력 + 제2법칙의 <strong>미분방정식을 풀어서 유도</strong>.
        역제곱 법칙 → 원뿔곡선 궤도가 <strong>수학적 필연</strong>임을 증명.
      </p>
    </div>
  </div>

  <div class="card">
    <h3>제1법칙: 타원 궤도의 법칙</h3>
    <p>
      <strong>진술:</strong> 행성은 태양을 한 초점으로 하는 타원 궤도를 그린다.
    </p>
    <p style="margin-top:1rem;">
      <strong>미분방정식으로부터의 증명:</strong>
      위에서 유도한 궤도 방정식 \(r = \frac{p}{1 + e\cos\theta}\)는 원뿔곡선이다.
      속박 궤도(\(E < 0\))에서 \(0 \le e < 1\)이므로 <strong>타원</strong>이 된다.
      역제곱 힘 → 비네 방정식 → 원뿔곡선. 이것은 만유인력 법칙의 수학적 필연이다.
    </p>
  </div>

  <div class="card card-accent3">
    <h3>제2법칙: 면적 속도 일정의 법칙</h3>
    <p>
      <strong>진술:</strong> 태양과 행성을 잇는 선분은 같은 시간 동안 같은 면적을 쓸고 지나간다.
    </p>
    <p style="margin-top:1rem;">
      <strong>미분방정식으로부터의 증명:</strong>
      면적 속도 \(\frac{dA}{dt} = \frac{1}{2}r^2\dot{\theta} = \frac{L}{2} = \text{const}\)
    </p>
    <p style="margin-top:0.5rem;">
      이것은 접선 방향 방정식에서 유도한 <strong>각운동량 보존</strong>과 정확히 동치이다.
      중심력이면 항상 성립하며, 역제곱에 국한되지 않는 더 일반적인 결과이다.
    </p>
  </div>

  <div class="card card-accent4">
    <h3>제3법칙: 조화의 법칙</h3>
    <p>
      <strong>진술:</strong> 공전 주기의 제곱은 장반경의 세제곱에 비례한다: \(T^2 \propto a^3\)
    </p>
    <span class="derivation-toggle" onclick="toggleDerivation(this)">유도 과정 보기</span>
    <div class="derivation-content">
      <div class="step">
        <div class="step-label">Step 1: 면적 속도로부터</div>
        1주기 동안 쓸린 면적 = 타원의 넓이: \(\frac{L}{2}T = \pi a b\)
      </div>
      <div class="step">
        <div class="step-label">Step 2: 타원의 성질</div>
        \(b = a\sqrt{1-e^2}\), 그리고 \(p = a(1-e^2) = \frac{L^2}{GM}\)
      </div>
      <div class="step">
        <div class="step-label">Step 3: 정리</div>
        \(T = \frac{2\pi a b}{L} = \frac{2\pi a \cdot a\sqrt{1-e^2}}{L}\)
        <br>
        \(L^2 = GMa(1-e^2)\)를 대입하고 정리하면:
      </div>
      <div class="step">
        <div class="step-label">최종 결과</div>
        <p style="font-size:1.3rem;">\(\boxed{T^2 = \frac{4\pi^2}{GM}a^3}\)</p>
        <p style="margin-top:0.5rem;">비례상수가 \(\frac{4\pi^2}{GM}\)으로 태양의 질량 \(M\)에만 의존.
        모든 행성에 대해 같은 비례상수 — 이것이 "조화"의 의미이다.</p>
      </div>
    </div>
  </div>
</section>

// ═══ HERO CANVAS: Orbital Animation ═══
(function() {
  const canvas = document.getElementById('heroCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const particles = [];
  const NUM = 60;
  const centerX = () => W * 0.5;
  const centerY = () => H * 0.5;

  for (let i = 0; i < NUM; i++) {
    const a = 100 + Math.random() * Math.min(W, H) * 0.35;
    const e = Math.random() * 0.6;
    const b = a * Math.sqrt(1 - e * e);
    particles.push({
      a, b, e,
      angle: Math.random() * Math.PI * 2,
      speed: (0.002 + Math.random() * 0.004) * (Math.random() < 0.5 ? 1 : -1),
      tilt: Math.random() * 0.3 - 0.15,
      size: 1 + Math.random() * 2,
      alpha: 0.2 + Math.random() * 0.5,
      color: ['108,159,255', '255,108,180', '92,255,138', '255,207,92', '192,132,252'][Math.floor(Math.random() * 5)]
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const cx = centerX();
    const cy = centerY();

    // Central glow
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
    grad.addColorStop(0, 'rgba(255,207,92,0.6)');
    grad.addColorStop(1, 'rgba(255,207,92,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, 30, 0, Math.PI * 2);
    ctx.fill();

    // Central dot
    ctx.fillStyle = 'rgba(255,207,92,0.9)';
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fill();

    particles.forEach(p => {
      p.angle += p.speed;
      const x = cx + p.a * Math.cos(p.angle);
      const y = cy + p.b * Math.sin(p.angle) + p.tilt * p.a * Math.cos(p.angle);

      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.beginPath();
      ctx.arc(x, y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══ ODE BUILDER SIMULATION ═══
(function() {
  const canvas = document.getElementById('builderCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  let forceType = 'gravity';
  let ic1 = 0, ic2 = 0; // x(0), v(0)

  // Physics constants (gravity/drag: positive = downward)
  const g = 9.8;
  const omega0 = 2.5;
  const b_m = 2; // b/m ratio for drag

  // Analytic solutions
  function solve(t) {
    if (forceType === 'gravity') {
      // positive-down: x'' = g → x(t) = x0 + v0*t + 0.5*g*t^2
      return ic1 + ic2 * t + 0.5 * g * t * t;
    } else if (forceType === 'spring') {
      // x(t) = x0*cos(w*t) + (v0/w)*sin(w*t)
      return ic1 * Math.cos(omega0 * t) + (ic2 / omega0) * Math.sin(omega0 * t);
    } else {
      // drag: v' = g - (b/m)v
      // v(t) = g/β + (v0 - g/β)*e^{-βt},  β = b/m
      // x(t) = x0 + (g/β)*t + (v0 - g/β)/β * (1 - e^{-βt})
      const vt = g / b_m;
      return ic1 + vt * t + (ic2 - vt) / b_m * (1 - Math.exp(-b_m * t));
    }
  }

  function solveV(t) {
    if (forceType === 'gravity') {
      return ic2 + g * t;
    } else if (forceType === 'spring') {
      return -ic1 * omega0 * Math.sin(omega0 * t) + ic2 * Math.cos(omega0 * t);
    } else {
      const vt = g / b_m;
      return vt + (ic2 - vt) * Math.exp(-b_m * t);
    }
  }

  // Determine good time range and y range
  function getTimeRange() {
    if (forceType === 'gravity') return 3;
    if (forceType === 'spring') return 8;
    return 5;
  }

  function updateEquation() {
    const eq = document.getElementById('eqDisplay');
    let ode, force, ics;
    if (forceType === 'gravity') {
      ode = 'm\\ddot{x}'; force = 'mg';
      ics = `x(0)=${ic1},\\; \\dot{x}(0)=${ic2}`;
    } else if (forceType === 'spring') {
      ode = 'm\\ddot{x}'; force = '-kx';
      ics = `x(0)=${ic1},\\; \\dot{x}(0)=${ic2}`;
    } else {
      ode = 'm\\dot{v}'; force = 'mg - bv';
      ics = `x(0)=${ic1},\\; v(0)=${ic2}`;
    }
    eq.innerHTML =
      '<span style="color:var(--accent)">' + katex.renderToString(ode) + '</span>' +
      katex.renderToString('\\;=\\;') +
      '<span style="color:var(--accent2)">' + katex.renderToString(force) + '</span>' +
      katex.renderToString(',\\quad') +
      '<span style="color:var(--accent3)">' + katex.renderToString(ics) + '</span>';
  }

  // Slider defaults per force type
  const sliderConfigs = {
    gravity: { ic1: {min:-5,max:5,step:0.5,val:0,label:'x(0)'}, ic2: {min:0,max:10,step:0.5,val:0,label:'\\dot{x}(0)'} },
    spring:  { ic1: {min:-3,max:3,step:0.1,val:1,label:'x(0)'}, ic2: {min:-5,max:5,step:0.5,val:0,label:'\\dot{x}(0)'} },
    drag:    { ic1: {min:-5,max:5,step:0.5,val:0,label:'x(0)'}, ic2: {min:-5,max:10,step:0.5,val:0,label:'v(0)'} }
  };

  function configureSliders() {
    const cfg = sliderConfigs[forceType];
    const s1 = document.getElementById('ic1Slider');
    const s2 = document.getElementById('ic2Slider');
    s1.min = cfg.ic1.min; s1.max = cfg.ic1.max; s1.step = cfg.ic1.step; s1.value = cfg.ic1.val;
    s2.min = cfg.ic2.min; s2.max = cfg.ic2.max; s2.step = cfg.ic2.step; s2.value = cfg.ic2.val;
    ic1 = cfg.ic1.val; ic2 = cfg.ic2.val;
    document.getElementById('ic1Val').textContent = ic1;
    document.getElementById('ic2Val').textContent = ic2;
    // Update labels
    const l1 = document.getElementById('ic1Label');
    const l2 = document.getElementById('ic2Label');
    l1.innerHTML = '\\(' + cfg.ic1.label + '\\)';
    l2.innerHTML = '\\(' + cfg.ic2.label + '\\)';
    if (window.renderMathInElement) {
      renderMathInElement(l1, { delimiters: [{left:'\\(',right:'\\)',display:false}] });
      renderMathInElement(l2, { delimiters: [{left:'\\(',right:'\\)',display:false}] });
    }
  }

  window.setForcelaw = function(type) {
    forceType = type;
    document.querySelectorAll('#forceBtn1,#forceBtn2,#forceBtn3').forEach(b => b.classList.remove('active'));
    if (type === 'gravity') document.getElementById('forceBtn1').classList.add('active');
    else if (type === 'spring') document.getElementById('forceBtn2').classList.add('active');
    else document.getElementById('forceBtn3').classList.add('active');
    configureSliders();
    updateEquation();
  };

  window.updateIC = function() {
    ic1 = parseFloat(document.getElementById('ic1Slider').value);
    ic2 = parseFloat(document.getElementById('ic2Slider').value);
    document.getElementById('ic1Val').textContent = ic1;
    document.getElementById('ic2Val').textContent = ic2;
    updateEquation();
  };

  // Initial render
  configureSliders();
  updateEquation();

  // Graph layout
  const graphL = { x: 60, y: 30, w: 350, h: 260 };
  // Physical animation area (right side)
  const animArea = { x: 460, y: 30, w: 220, h: 260 };

  function draw() {
    const cc = getCanvasColors();
    ctx.fillStyle = cc.bg;
    ctx.fillRect(0, 0, W, H);

    const T = getTimeRange();
    const dt = T / 300;

    // Compute y-range for auto-scaling
    let yMin = Infinity, yMax = -Infinity;
    for (let t = 0; t <= T; t += dt) {
      const y = solve(t);
      if (y < yMin) yMin = y;
      if (y > yMax) yMax = y;
    }
    const yPad = (yMax - yMin) * 0.15 || 1;
    yMin -= yPad; yMax += yPad;

    // ── Left: x(t) graph ──
    const gx = graphL.x, gy = graphL.y, gw = graphL.w, gh = graphL.h;

    // Grid
    ctx.strokeStyle = cc.grid;
    ctx.lineWidth = 1;
    ctx.strokeRect(gx, gy, gw, gh);

    // Axes labels
    ctx.fillStyle = cc.text;
    ctx.font = '11px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('x(t) 그래프', gx + gw / 2, gy - 10);
    ctx.textAlign = 'left';
    ctx.fillText('x', gx - 18, gy + 10);
    ctx.textAlign = 'center';
    ctx.fillText('t', gx + gw + 14, gy + gh + 5);

    // Zero line if visible
    if (yMin < 0 && yMax > 0) {
      const zeroY = gy + (0 - yMin) / (yMax - yMin) * gh;
      ctx.strokeStyle = cc.text;
      ctx.globalAlpha = 0.15;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(gx, zeroY);
      ctx.lineTo(gx + gw, zeroY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      ctx.fillStyle = cc.text;
      ctx.font = '9px Segoe UI, sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('0', gx - 4, zeroY + 3);
    }

    // Tick marks for t axis
    ctx.fillStyle = cc.text;
    ctx.font = '9px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    const tStep = T <= 4 ? 1 : 2;
    for (let tt = tStep; tt <= T; tt += tStep) {
      const px = gx + (tt / T) * gw;
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = cc.text;
      ctx.beginPath(); ctx.moveTo(px, gy); ctx.lineTo(px, gy + gh); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.fillText(tt, px, gy + gh + 14);
    }

    // Curve (clip to graph)
    ctx.save();
    ctx.beginPath();
    ctx.rect(gx, gy, gw, gh);
    ctx.clip();

    // Force-type colors
    const curveColor = forceType === 'gravity' ? '#6c9fff' : forceType === 'spring' ? '#c084fc' : '#ff6cb4';

    ctx.strokeStyle = curveColor;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let t = 0; t <= T; t += dt) {
      const px = gx + (t / T) * gw;
      const py = gy + (solve(t) - yMin) / (yMax - yMin) * gh;
      if (t === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    ctx.restore();

    // Y-axis range labels
    ctx.fillStyle = cc.text;
    ctx.font = '9px Segoe UI, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(yMin.toFixed(1), gx - 4, gy + 10);
    ctx.fillText(yMax.toFixed(1), gx - 4, gy + gh);

    // ── Right: 1D physical animation ──
    const ax = animArea.x, ay = animArea.y, aw = animArea.w, ah = animArea.h;
    const midY = ay + ah / 2;

    // Animated time (looping)
    const now = performance.now() / 1000;
    const tAnim = (now % (T * 1.2)) ; // loop with a small pause
    const tClamped = Math.min(tAnim, T);
    const xNow = solve(tClamped);
    const vNow = solveV(tClamped);

    // Map x to pixel (positive x = downward on screen)
    const xRange = yMax - yMin;
    const ballY = midY + ((xNow - (yMin + yMax) / 2) / xRange) * (ah - 40);

    // Track line (vertical)
    ctx.strokeStyle = cc.grid;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ax + aw / 2, ay + 10);
    ctx.lineTo(ax + aw / 2, ay + ah - 10);
    ctx.stroke();

    // Zero mark
    if (yMin < 0 && yMax > 0) {
      const zMarkY = midY - ((yMin + yMax) / 2 / xRange) * (ah - 40);
      ctx.strokeStyle = cc.text;
      ctx.globalAlpha = 0.3;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(ax + aw / 2 - 15, zMarkY);
      ctx.lineTo(ax + aw / 2 + 15, zMarkY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }

    // Ball
    const ballX = ax + aw / 2;
    const ballClampedY = Math.max(ay + 15, Math.min(ay + ah - 15, ballY));

    ctx.fillStyle = curveColor;
    ctx.beginPath();
    ctx.arc(ballX, ballClampedY, 12, 0, Math.PI * 2);
    ctx.fill();

    // Glow
    const r = parseInt(curveColor.slice(1,3),16);
    const gr = parseInt(curveColor.slice(3,5),16);
    const bl = parseInt(curveColor.slice(5,7),16);
    const glow = ctx.createRadialGradient(ballX, ballClampedY, 0, ballX, ballClampedY, 25);
    glow.addColorStop(0, `rgba(${r},${gr},${bl},0.25)`);
    glow.addColorStop(1, `rgba(${r},${gr},${bl},0)`);
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(ballX, ballClampedY, 25, 0, Math.PI * 2);
    ctx.fill();

    // Velocity arrow
    const arrowScale = 8;
    const arrowLen = vNow * arrowScale; // positive v = downward on screen
    if (Math.abs(arrowLen) > 2) {
      ctx.strokeStyle = '#5cff8a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ballX + 20, ballClampedY);
      ctx.lineTo(ballX + 20, ballClampedY + arrowLen);
      ctx.stroke();
      // Arrow head
      const dir = arrowLen > 0 ? 1 : -1;
      ctx.fillStyle = '#5cff8a';
      ctx.beginPath();
      ctx.moveTo(ballX + 20, ballClampedY + arrowLen);
      ctx.lineTo(ballX + 16, ballClampedY + arrowLen - 6 * dir);
      ctx.lineTo(ballX + 24, ballClampedY + arrowLen - 6 * dir);
      ctx.closePath();
      ctx.fill();
    }

    // Time indicator on graph
    if (tClamped <= T) {
      const indX = gx + (tClamped / T) * gw;
      const indY = gy + (xNow - yMin) / (yMax - yMin) * gh;
      const clampedIndY = Math.max(gy, Math.min(gy + gh, indY));

      // Vertical time line
      ctx.strokeStyle = cc.text;
      ctx.globalAlpha = 0.2;
      ctx.beginPath();
      ctx.moveTo(indX, gy);
      ctx.lineTo(indX, gy + gh);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Dot on curve
      ctx.fillStyle = curveColor;
      ctx.beginPath();
      ctx.arc(indX, clampedIndY, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Info text
    ctx.fillStyle = cc.textBright;
    ctx.font = '11px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`t = ${tClamped.toFixed(1)}`, ax + aw / 2, ay + ah + 5);

    ctx.font = '10px Segoe UI, sans-serif';
    ctx.fillStyle = cc.text;
    ctx.fillText(`x = ${xNow.toFixed(2)}`, ax + aw / 2 - 45, ay);
    ctx.fillStyle = '#5cff8a';
    ctx.fillText(`v = ${vNow.toFixed(2)}`, ax + aw / 2 + 45, ay);

    // Force type label
    const typeNames = { gravity: '균일중력', spring: '스프링', drag: '중력+저항' };
    ctx.fillStyle = curveColor;
    ctx.font = 'bold 12px Segoe UI, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(typeNames[forceType], gx, gy + gh + 14);

    requestAnimationFrame(draw);
  }
  draw();
})();

// ═══ ORBIT SIMULATION ═══
(function() {
  const canvas = document.getElementById('orbitCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W * 0.45, cy = H * 0.5;

  const GM = 50000;
  let orbitType = 'ellipse';
  let body = {};
  let trail = [];

  const initConfigs = {
    circle: { x: 150, y: 0, vx: 0, vy: Math.sqrt(GM / 150) },
    ellipse: { x: 180, y: 0, vx: 0, vy: Math.sqrt(GM / 180) * 0.75 },
    hyperbola: { x: 200, y: -200, vx: -3, vy: Math.sqrt(GM / 200) * 1.6 }
  };

  function reset() {
    const cfg = initConfigs[orbitType];
    body = { x: cfg.x, y: cfg.y, vx: cfg.vx, vy: cfg.vy };
    trail = [];
  }
  reset();

  window.setOrbit = function(type) {
    orbitType = type;
    reset();
    document.querySelectorAll('#orbitBtn1,#orbitBtn2,#orbitBtn3').forEach(b => b.classList.remove('active'));
    if (type === 'circle') document.getElementById('orbitBtn1').classList.add('active');
    else if (type === 'ellipse') document.getElementById('orbitBtn2').classList.add('active');
    else document.getElementById('orbitBtn3').classList.add('active');
  };
  window.restartOrbit = reset;

  function draw() {
    const cc = getCanvasColors();
    ctx.fillStyle = cc.bg;
    ctx.fillRect(0, 0, W, H);

    // Physics update (Symplectic Euler integration)
    const steps = 4;
    for (let s = 0; s < steps; s++) {
      const dt = 0.15;
      const r2 = body.x * body.x + body.y * body.y;
      const r = Math.sqrt(r2);
      if (r < 10) { reset(); break; }
      const acc = -GM / r2;
      const ax = acc * body.x / r;
      const ay = acc * body.y / r;
      body.vx += ax * dt;
      body.vy += ay * dt;
      body.x += body.vx * dt;
      body.y += body.vy * dt;
    }

    // If body goes too far, reset for hyperbola
    if (Math.abs(body.x) > 800 || Math.abs(body.y) > 800) {
      if (orbitType === 'hyperbola') reset();
    }

    trail.push({ x: body.x, y: body.y });
    if (trail.length > 2000) trail.shift();

    // Central body (Sun)
    const sunGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 25);
    sunGrad.addColorStop(0, 'rgba(255,207,92,0.9)');
    sunGrad.addColorStop(0.5, 'rgba(255,207,92,0.3)');
    sunGrad.addColorStop(1, 'rgba(255,207,92,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 25, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffcf5c';
    ctx.beginPath();
    ctx.arc(cx, cy, 6, 0, Math.PI * 2);
    ctx.fill();

    // Trail
    ctx.strokeStyle = 'rgba(108,159,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    trail.forEach((p, i) => {
      const sx = cx + p.x, sy = cy + p.y;
      if (i === 0) ctx.moveTo(sx, sy);
      else ctx.lineTo(sx, sy);
    });
    ctx.stroke();

    // Planet
    const sx = cx + body.x, sy = cy + body.y;
    ctx.fillStyle = '#6c9fff';
    ctx.beginPath();
    ctx.arc(sx, sy, 8, 0, Math.PI * 2);
    ctx.fill();

    // Glow
    const plGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 20);
    plGrad.addColorStop(0, 'rgba(108,159,255,0.3)');
    plGrad.addColorStop(1, 'rgba(108,159,255,0)');
    ctx.fillStyle = plGrad;
    ctx.beginPath();
    ctx.arc(sx, sy, 20, 0, Math.PI * 2);
    ctx.fill();

    // Velocity vector
    const vScale = 3;
    ctx.strokeStyle = 'rgba(92,255,138,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx + body.vx * vScale, sy + body.vy * vScale);
    ctx.stroke();

    // Force vector (towards center)
    const r = Math.sqrt(body.x*body.x + body.y*body.y);
    const fScale = 8000 / (r * r) * 50;
    ctx.strokeStyle = 'rgba(255,108,180,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx - body.x/r * fScale, sy - body.y/r * fScale);
    ctx.stroke();

    // Labels
    ctx.fillStyle = cc.text;
    ctx.font = '12px Segoe UI, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('M (중심체)', cx + 15, cy - 15);

    ctx.fillStyle = 'rgba(92,255,138,0.8)';
    ctx.fillText('→ v (속도)', 20, H - 40);
    ctx.fillStyle = 'rgba(255,108,180,0.8)';
    ctx.fillText('→ F (인력)', 20, H - 20);

    // Orbit type label
    const typeLabels = { circle: '원 궤도 (e = 0)', ellipse: '타원 궤도 (0 < e < 1)', hyperbola: '쌍곡선 궤도 (e > 1)' };
    ctx.fillStyle = '#c084fc';
    ctx.font = 'bold 14px Segoe UI, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(typeLabels[orbitType], W - 20, 30);

    // Energy info
    const v2 = body.vx*body.vx + body.vy*body.vy;
    const E = 0.5 * v2 - GM / r;
    ctx.fillStyle = cc.text;
    ctx.font = '11px Segoe UI, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`E = ${E.toFixed(1)} (${E < 0 ? '속박' : E === 0 ? '경계' : '탈출'})`, W - 20, 50);
    ctx.fillText(`r = ${r.toFixed(1)}, |v| = ${Math.sqrt(v2).toFixed(1)}`, W - 20, 68);

    requestAnimationFrame(draw);
  }
  draw();
})();

<div class="hero">
  <h1>선형 Linearity</h1>
  <p class="subtitle">
    수학에서 가장 근본적인 구조적 성질 — 미분방정식, 선형대수, 신호처리, 물리학을 관통하는 하나의 원리
  </p>

<!-- ===================== SECTION 1: 정의 ===================== -->
<section id="definition">
  <h2><span class="num">01</span>선형의 정의</h2>
  <p class="section-desc">연산자 또는 함수 L이 "선형"이라 함은 딱 두 가지 조건을 동시에 만족하는 것이다.</p>

  <div class="two-col">
    <div class="card">
      <h3>조건 1: 가법성 (Additivity)</h3>
      <div class="math-block" id="def-add"></div>
      <p>두 입력의 합에 대한 출력은, 각각의 출력을 더한 것과 같다. 즉, "합을 보존"한다.</p>
    </div>
    <div class="card">
      <h3>조건 2: 동차성 (Homogeneity)</h3>
      <div class="math-block" id="def-homo"></div>
      <p>입력에 상수를 곱한 것의 출력은, 출력에 같은 상수를 곱한 것과 같다. 즉, "스케일을 보존"한다.</p>
    </div>
  </div>

  <div class="highlight-box success">
    <strong>통합: 중첩 원리 (Superposition Principle)</strong>
    <div class="math-block" id="def-super"></div>
    <p>위 두 조건을 하나로 합치면, 임의의 선형결합이 보존된다는 것이다. 이것이 <strong>선형성의 본질</strong>이다.</p>
  </div>

  <div class="card">
    <h3>형식적 정의</h3>
    <p>벡터공간 V, W 위에서 정의된 사상(map) <span id="def-formal-L"></span>이 <strong>선형사상(linear map)</strong>이란:</p>
    <div class="math-block" id="def-formal"></div>
    <p style="color:var(--text-dim); margin-top:0.5rem;">여기서 <span id="def-formal-c"></span>는 스칼라(scalar), <span id="def-formal-xy"></span>는 V의 원소이다.</p>
  </div>
</section>

<!-- ===================== SECTION 2: 직관적 이해 ===================== -->
<section id="intuition">
  <h2><span class="num">02</span>직관적 이해</h2>
  <p class="section-desc">구체적 숫자로 "선형 vs 비선형"을 체감해 보자.</p>

  <div class="two-col">
    <div class="card">
      <h3><span class="tag linear">선형</span> \(f(x) = 2x\)</h3>
      <div class="steps">
        <div class="step">
          <strong>가법성 확인:</strong> \(f(3+5) = f(8) = 16\)<br>
          \(f(3) + f(5) = 6 + 10 = 16\) &nbsp; <span class="yes">&#10003; 일치!</span>
        </div>
        <div class="step">
          <strong>동차성 확인:</strong> \(f(4 \times 3) = f(12) = 24\)<br>
          \(4 \times f(3) = 4 \times 6 = 24\) &nbsp; <span class="yes">&#10003; 일치!</span>
        </div>
        <div class="step">
          <strong>중첩 확인:</strong> \(f(2\cdot 3 + 5\cdot 4) = f(26) = 52\)<br>
          \(2\cdot f(3) + 5\cdot f(4) = 12 + 40 = 52\) &nbsp; <span class="yes">&#10003;</span>
        </div>
      </div>
    </div>
    <div class="card">
      <h3><span class="tag nonlinear">비선형</span> \(g(x) = x^2\)</h3>
      <div class="steps">
        <div class="step">
          <strong>가법성 확인:</strong> \(g(3+5) = g(8) = 64\)<br>
          \(g(3) + g(5) = 9 + 25 = 34\) &nbsp; <span class="no">&#10007; 불일치! (\(64 \neq 34\))</span>
        </div>
        <div class="step">
          <strong>동차성 확인:</strong> \(g(4 \times 3) = g(12) = 144\)<br>
          \(4 \times g(3) = 4 \times 9 = 36\) &nbsp; <span class="no">&#10007; 불일치! (\(144 \neq 36\))</span>
        </div>
        <div class="step">
          <strong>핵심:</strong> 제곱은 교차항 <span id="cross-term"></span>을 만든다.<br>
          이 교차항이 선형성을 파괴한다.
        </div>
      </div>
    </div>
  </div>

  <!-- Interactive Linearity Checker -->
  <div class="card">
    <h3>인터랙티브: 선형성 검증기</h3>
    <p style="color:var(--text-dim); margin-bottom:1rem;">x, y, c 값을 입력하고 함수를 선택하여 선형 조건을 실시간 검증하세요.</p>
    <div class="controls">
      <div class="control-group">
        <label>함수 선택</label>
        <select id="checkerFunc">
          <option value="2x">f(x) = 2x (선형)</option>
          <option value="x2">f(x) = x&sup2; (비선형)</option>
          <option value="3x+1">f(x) = 3x+1 (아핀)</option>
          <option value="sinx">f(x) = sin(x) (비선형)</option>
          <option value="ex">f(x) = e&#739; (비선형)</option>
        </select>
      </div>
      <div class="control-group">
        <label>x = </label>
        <input type="number" id="chkX" value="3" style="width:80px;background:var(--code-bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;">
      </div>
      <div class="control-group">
        <label>y = </label>
        <input type="number" id="chkY" value="5" style="width:80px;background:var(--code-bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;">
      </div>
      <div class="control-group">
        <label>c = </label>
        <input type="number" id="chkC" value="4" style="width:80px;background:var(--code-bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;">
      </div>
      <button class="ctrl-btn" onclick="runChecker()">검증</button>
    </div>
    <div id="checkerResult" style="margin-top:1rem;"></div>
  </div>
</section>

  </div>

  <div class="highlight-box">

<!-- ===================== SECTION 4: 선형대수 ===================== -->
<section id="linear-algebra">
  <h2><span class="num">04</span>선형대수에서의 선형</h2>
  <p class="section-desc">선형변환은 공간의 격자 구조를 보존한다: 직선은 직선으로, 원점은 원점에 머문다.</p>

  <div class="controls">
    <div class="control-group">
      <label>변환 선택</label>
      <select id="transformSelect" onchange="updateTransform()">
        <option value="rotate">회전 (45&deg;)</option>
        <option value="shear">전단 (Shear)</option>
        <option value="scale">스케일 (2x, 0.5y)</option>
        <option value="reflect">반사 (y축)</option>
        <option value="project">사영 (x축)</option>
      </select>
    </div>
    <button class="ctrl-btn" onclick="animateTransform()">변환 실행</button>
    <button class="ctrl-btn" onclick="resetTransform()">초기화</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="transformCanvas" width="800" height="500"></canvas>
    <div class="caption" id="transformCaption">격자의 각 점에 행렬 변환을 적용합니다. 직선은 직선으로, 원점은 원점에 유지됩니다.</div>
  </div>

  <div class="two-col">
    <div class="card">
      <h3>행렬 = 선형변환</h3>
      <p>모든 유한차원 선형변환은 행렬로 표현할 수 있다:</p>
      <div class="math-block" id="mat-transform"></div>
      <p style="margin-top:0.5rem;">행렬-벡터 곱 자체가 선형성을 내장하고 있다:</p>
      <div class="math-block" id="mat-linearity"></div>
    </div>
    <div class="card">
      <h3>선형변환이 보존하는 것</h3>
      <ul style="list-style:none; padding:0;">
        <li style="margin-bottom:0.5rem;"><span class="yes">&#10003;</span> 직선 &rarr; 직선</li>
        <li style="margin-bottom:0.5rem;"><span class="yes">&#10003;</span> 원점 &rarr; 원점</li>
        <li style="margin-bottom:0.5rem;"><span class="yes">&#10003;</span> 평행선 &rarr; 평행선</li>
        <li style="margin-bottom:0.5rem;"><span class="yes">&#10003;</span> 등간격 &rarr; 등간격</li>
      </ul>
      <div class="sep"></div>
      <p style="color:var(--text-dim);font-size:0.9rem;">비선형 변환(예: \(f(x,y)=(x^2,\, \sin y)\))은 격자를 구부러뜨린다.</p>
    </div>
  </div>
</section>

<!-- ===================== SECTION 5: 미분방정식 ===================== -->
<section id="diff-eq">
  <h2><span class="num">05</span>미분방정식에서의 선형</h2>
  <p class="section-desc">미분방정식의 풀이 가능성은 "선형인가 비선형인가"에 의해 결정적으로 갈린다.</p>

  <div class="card">
    <h3>선형 미분 연산자</h3>
    <p>미분 연산자 L을 다음과 같이 정의하자:</p>
    <div class="math-block" id="diff-operator"></div>
    <p>이 연산자 L은 <strong>선형</strong>이다. 즉:</p>
    <div class="math-block" id="diff-linearity"></div>
    <p style="margin-top:0.8rem;">이것은 미분 자체가 선형 연산이기 때문이다:</p>
    <div class="math-block" id="diff-deriv"></div>
  </div>

  <div class="card">
    <h3>선형 ODE vs 비선형 ODE</h3>

          <td>동차해 + 특수해 (\(y_h + y_p\))</td>
          <td>체계적 방법 없음</td>
        </tr>
        <tr>
          <td>해의 존재/유일성</td>

<!-- ===================== SECTION 7: 비선형 반례 ===================== -->
<section id="nonlinear">
  <h2><span class="num">07</span>비선형이면 왜 안 되는가</h2>

  <div class="card">
    <h3>분해-풀이-재조합 전략</h3>
    <p>선형성이 보장되면 다음 전략이 가능하다:</p>
    <div class="flow">
      <div class="flow-box">복잡한 문제</div>
      <span class="flow-arrow">&rarr;</span>
      <div class="flow-box" style="border-color:var(--accent);">분해<br><small style="color:var(--text-dim)">Decompose</small></div>

      <div class="flow-box" style="border-color:var(--accent3);">개별 풀이<br><small style="color:var(--text-dim)">Solve each</small></div>

      <div class="flow-box">전체 해</div>
    </div>
    <p style="color:var(--text-dim);margin-top:1rem;">이것이 가능한 이유는 <strong>오직 선형성 때문</strong>이다. 비선형 시스템에서는 부분의 합이 전체가 되지 않는다.</p>

document.addEventListener('DOMContentLoaded', () => {

  K('def-homo', 'L(c\\,x) = c\\,L(x)');
  K('def-super', 'L(\\alpha\\, x + \\beta\\, y) = \\alpha\\, L(x) + \\beta\\, L(y) \\quad \\text{(임의의 스칼라 } \\alpha, \\beta \\text{에 대해)}');
  K('def-formal-L', 'L: V \\to W', false);
  K('def-formal', '\\forall\\, \\mathbf{u}, \\mathbf{v} \\in V,\\; \\forall\\, \\alpha, \\beta \\in \\mathbb{R}: \\quad L(\\alpha\\mathbf{u} + \\beta\\mathbf{v}) = \\alpha\\,L(\\mathbf{u}) + \\beta\\,L(\\mathbf{v})');

  // Section 5
  K('diff-operator', 'L[y] = y^{\\prime\\prime} + p(x)\\,y^{\\prime} + q(x)\\,y');
  K('diff-linearity', 'L[\\alpha y_1 + \\beta y_2] = \\alpha\\, L[y_1] + \\beta\\, L[y_2]');
  K('diff-deriv', '\\frac{d}{dx}[\\alpha f + \\beta g] = \\alpha\\frac{df}{dx} + \\beta\\frac{dg}{dx}');
  K('ode-linear-form', "y'' + p(x)y' + q(x)y = r(x)", false);
  K('ode-nonlinear-form', "y'' + y^2 = 0,\\; yy' = x", false);
  K('ode-linear-ex', "y'' + 3y' + 2y = e^x", false);
  K('ode-nonlinear-ex', "y'' + \\sin y = 0", false);

  K('super-c1c2', 'c_1, c_2', false);
  K('super-combo', 'y = c_1 y_1 + c_2 y_2', false);
  K('pf1', 'L[y_1] = 0', false);
  K('pf2', 'L[y_2] = 0', false);
  K('pf3', 'y = c_1 y_1 + c_2 y_2', false);
  K('pf4', 'L[c_1 y_1 + c_2 y_2] = c_1 L[y_1] + c_2 L[y_2] = c_1 \\cdot 0 + c_2 \\cdot 0 = 0', false);
  K('pf5', 'L[y] = 0', false);

  // Section 7
  K('nl-ode', "y'' + y^2 = 0");
  K('nl-s1', 'y_1', false);

  K('nl-expand', "(y_1 + y_2)'' + (y_1 + y_2)^2 = y_1'' + y_2'' + y_1^2 + 2y_1 y_2 + y_2^2");
  K('nl-cross', '= \\underbrace{(y_1\'\' + y_1^2)}_{=0} + \\underbrace{(y_2\'\' + y_2^2)}_{=0} + \\underbrace{2y_1 y_2}_{\\neq 0 \\text{ (교차항!)}}', false);

// ============================================================
//  Section 2: Interactive Checker
// ============================================================
function getCheckerFunc(name) {
  const fns = {
    '2x': x => 2*x,
    'x2': x => x*x,
    '3x+1': x => 3*x+1,
    'sinx': x => Math.sin(x),
    'ex': x => Math.exp(x),
  };
  return fns[name];
}
function getCheckerLabel(name) {
  const labels = {
    '2x': '\\(f(x)=2x\\)',
    'x2': '\\(f(x)=x^2\\)',
    '3x+1': '\\(f(x)=3x+1\\)',
    'sinx': '\\(f(x)=\\sin(x)\\)',
    'ex': '\\(f(x)=e^x\\)',
  };
  return labels[name];
}

function runChecker() {
  const fname = document.getElementById('checkerFunc').value;
  const f = getCheckerFunc(fname);
  const label = getCheckerLabel(fname);
  const x = parseFloat(document.getElementById('chkX').value) || 0;
  const y = parseFloat(document.getElementById('chkY').value) || 0;
  const c = parseFloat(document.getElementById('chkC').value) || 0;
  const eps = 1e-9;

  const addL = f(x + y);
  const addR = f(x) + f(y);
  const addOk = Math.abs(addL - addR) < eps;

  const homL = f(c * x);
  const homR = c * f(x);
  const homOk = Math.abs(homL - homR) < eps;

  const isLinear = addOk && homOk;

  let html = `<div style="background:var(--code-bg);border:1px solid var(--border);border-radius:12px;padding:1.5rem;">`;
  html += `<p style="font-weight:600;margin-bottom:1rem;">${label} 검증 결과:</p>`;

  html += `<p><strong>가법성:</strong> \\(f(${x}+${y}) = f(${x+y}) = \\mathbf{${addL.toFixed(4)}}\\)</p>`;
  html += `<p style="margin-left:5.5rem;">\\(f(${x})+f(${y}) = ${f(x).toFixed(4)}+${f(y).toFixed(4)} = \\mathbf{${addR.toFixed(4)}}\\)`;
  html += addOk ? ` <span class="yes"> &#10003; 일치</span>` : ` <span class="no"> &#10007; 불일치 (차이: ${Math.abs(addL-addR).toFixed(4)})</span>`;
  html += `</p>`;

  html += `<div class="sep"></div>`;

  html += `<p><strong>동차성:</strong> \\(f(${c} \\times ${x}) = f(${c*x}) = \\mathbf{${homL.toFixed(4)}}\\)</p>`;
  html += `<p style="margin-left:5.5rem;">\\(${c} \\times f(${x}) = ${c} \\times ${f(x).toFixed(4)} = \\mathbf{${homR.toFixed(4)}}\\)`;
  html += homOk ? ` <span class="yes"> &#10003; 일치</span>` : ` <span class="no"> &#10007; 불일치 (차이: ${Math.abs(homL-homR).toFixed(4)})</span>`;
  html += `</p>`;

  html += `<div class="sep"></div>`;
  html += `<p style="font-size:1.1rem;font-weight:700;text-align:center;margin-top:0.5rem;">`;
  if (isLinear) {
    html += `<span class="yes">&#10003; 이 값들에 대해 선형 조건이 성립합니다</span>`;
  } else {
    html += `<span class="no">&#10007; 선형 조건이 성립하지 않습니다 &mdash; 비선형!</span>`;
  }
  html += `</p>`;

  if (fname === '3x+1' && !isLinear) {
    html += `<p style="color:var(--text-dim);font-size:0.85rem;margin-top:0.5rem;">&#8505; \\(f(x)=3x+1\\)은 직선이지만 원점을 지나지 않는 아핀(affine) 함수로, 선형이 아닙니다. \\(f(0)=1 \\neq 0\\)</p>`;
  }

  html += `</div>`;
  const resEl = document.getElementById('checkerResult');
  resEl.innerHTML = html;
  if (typeof renderMathInElement === 'function') renderMathInElement(resEl, {delimiters:[{left:'\\(',right:'\\)',display:false}],throwOnError:false});
}
