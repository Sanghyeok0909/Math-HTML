  <h1>미분방정식 완벽 가이드</h1>
  <p>변화를 기술하는 수학의 언어, 미분방정식의 세계를 인터랙티브하게 탐험합니다.</p>

<!-- INTRO -->
<section class="fade-in">
  <h2>미분방정식이란?</h2>
  <div class="card">
    <p>미분방정식(Differential Equation)은 <strong style="color:var(--accent2)">미지의 함수와 그 도함수(미분) 사이의 관계</strong>를 나타내는 방정식입니다.</p>
    <div class="math-block">
      $$\frac{dy}{dx} = f(x, y)$$
    </div>
    <p>일반 대수 방정식이 "어떤 <em>수</em>를 찾아라"라는 문제라면, 미분방정식은 "어떤 <em>함수</em>를 찾아라"라는 문제입니다.</p>

    <div class="highlight-box">
      <h3>직관적 이해</h3>
      <p>한 물체의 속도가 현재 위치에 따라 달라진다고 합시다. 속도는 위치의 변화율(미분)이므로:</p>
      <div class="math-block">
        $$\frac{dx}{dt} = v(x)$$
      </div>
      <p>이것이 바로 미분방정식입니다. "위치 \(x(t)\)가 시간에 따라 어떻게 변하는가?"를 기술합니다.</p>
    </div>
  </div>

  <div class="card">
    <h3>대수 방정식 vs 미분방정식</h3>
    <table>
      <tr><th>구분</th><th>대수 방정식</th><th>미분방정식</th></tr>
      <tr><td>미지수</td><td>수 (number)</td><td>함수 (function)</td></tr>
      <tr><td>예시</td><td>\(x^2 - 3x + 2 = 0\)</td><td>\(y'' + 3y' + 2y = 0\)</td></tr>
      <tr><td>해</td><td>\(x = 1,\; x = 2\)</td><td>\(y = C_1 e^{-x} + C_2 e^{-2x}\)</td></tr>
      <tr><td>해의 특성</td><td>유한개의 값</td><td>함수족 (무한히 많은 곡선)</td></tr>
    </table>
  </div>
</section>

<!-- WHY -->
<section id="why" class="fade-in">
  <h2>왜 미분방정식이 중요한가</h2>
  <p>자연 현상의 대부분은 <strong style="color:var(--accent2)">변화율</strong>로 기술됩니다. 미분방정식은 물리학, 공학, 생물학, 경제학 등 거의 모든 과학 분야의 근간입니다.</p>

  <div class="card-grid">
    <div class="card app-card">
      <div class="icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="20" r="6" stroke="var(--accent2)" stroke-width="2.5"/><line x1="24" y1="26" x2="24" y2="42" stroke="var(--accent2)" stroke-width="2.5"/><path d="M24 42 L20 36 M24 42 L28 36" stroke="var(--accent2)" stroke-width="2.5" stroke-linecap="round"/><path d="M18 8 Q24 2 30 8" stroke="var(--text2)" stroke-width="1.5" stroke-dasharray="3 2" fill="none"/></svg></div>
      <h4>물리학</h4>
      <p>뉴턴의 운동 법칙<br>\(F = ma = m\ddot{x}\)</p>

<!-- CLASSIFICATION -->
<section id="classification" class="fade-in">
  <h2>미분방정식의 분류</h2>

  <div class="card">
    <div class="tree">
      <ul>
        <li><span class="node highlight">미분방정식</span>
          <ul>
            <li><span class="node" style="border-color:var(--accent)">ODE (상미분방정식)</span> <span class="tag ode">독립변수 1개</span>
              <ul>
                <li><span class="node">1차 ODE</span>
                  <ul>
                    <li>변수분리형</li>
                    <li>선형</li>
                    <li>완전미분형</li>
                    <li>베르누이형</li>
                  </ul>
                </li>
                <li><span class="node">2차 ODE</span>
                  <ul>
                    <li>상수계수 동차</li>
                    <li>상수계수 비동차</li>
                    <li>코시-오일러형</li>
                  </ul>
                </li>
                <li><span class="node">고차 ODE / 연립 ODE</span></li>
              </ul>
            </li>
            <li><span class="node" style="border-color:var(--cyan)">PDE (편미분방정식)</span> <span class="tag pde">독립변수 2개+</span>
              <ul>
                <li>열 방정식 (포물선형)</li>
                <li>파동 방정식 (쌍곡선형)</li>
                <li>라플라스 방정식 (타원형)</li>
              </ul>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>

  <div class="card-grid">
    <div class="card">
      <h3>차수 (Order)</h3>
      <p>방정식에 나타나는 <strong>최고 도함수의 차수</strong> (몇 번 미분했는가)</p>
      <div class="math-block">
        $$\underbrace{y'}_{1\text{차}}, \quad \underbrace{y''}_{2\text{차}}, \quad \underbrace{y'''}_{3\text{차}}$$
      </div>
    </div>
    <div class="card">
      <h3>선형 vs 비선형</h3>
      <p>미지 함수와 도함수가 1차식이면 <span class="tag linear">선형</span>, 아니면 <span class="tag nonlinear">비선형</span></p>
      <div class="math-block">
        $$\underbrace{y'' + 3y' + 2y = 0}_{\text{선형}} \quad vs \quad \underbrace{y'' + y^2 = 0}_{\text{비선형}}$$
      </div>
    </div>
  </div>

  <!-- First Order -->
  <div id="first-order">
    <h3>주요 1차 미분방정식</h3>
    <div class="card">
      <table>
        <tr><th>유형</th><th>일반형</th><th>예시</th></tr>
        <tr>
          <td><strong>변수분리형</strong></td>
          <td>\(\frac{dy}{dx} = g(x)h(y)\)</td>
          <td>\(\frac{dy}{dx} = xy\)</td>
        </tr>
        <tr>
          <td><strong>1차 선형</strong></td>
          <td>\(y' + P(x)y = Q(x)\)</td>
          <td>\(y' + 2y = e^{-x}\)</td>
        </tr>
        <tr>
          <td><strong>완전미분형</strong></td>
          <td>\(M\,dx + N\,dy = 0\),  \(M_y = N_x\)</td>
          <td>\((2xy)dx + (x^2)dy = 0\)</td>
        </tr>
        <tr>
          <td><strong>베르누이형</strong></td>
          <td>\(y' + P(x)y = Q(x)y^n\)</td>
          <td>\(y' + y = y^3\)</td>
        </tr>
      </table>
    </div>
  </div>

  <!-- Second Order -->
  <div id="second-order">
    <h3>주요 2차 미분방정식</h3>
    <div class="card">
      <p>일반적인 2차 상수계수 선형 ODE:</p>
      <div class="math-block">
        $$ay'' + by' + cy = 0 \quad \text{(동차)}$$
      </div>
      <p><strong>특성방정식:</strong> \(ar^2 + br + c = 0\)의 근 \(r_1, r_2\)에 따라 동차 일반해의 형태가 결정됩니다.</p>
      <p style="font-size:13px; color:var(--text2);">비동차 \(ay'' + by' + cy = f(x)\)의 경우, 전체 해 = 동차 일반해 + 특수해 \(y_p\)입니다.</p>
      <table>
        <tr><th>판별식</th><th>근의 형태</th><th>동차 일반해</th></tr>
        <tr>
          <td>\(b^2 - 4ac > 0\)</td>
          <td>서로 다른 실근 \(r_1 \neq r_2\)</td>
          <td>\(y = C_1 e^{r_1 x} + C_2 e^{r_2 x}\)</td>
        </tr>
        <tr>
          <td>\(b^2 - 4ac = 0\)</td>
          <td>중근 \(r_1 = r_2 = r\)</td>
          <td>\(y = (C_1 + C_2 x)e^{rx}\)</td>
        </tr>
        <tr>
          <td>\(b^2 - 4ac < 0\)</td>
          <td>복소근 \(\alpha \pm \beta i\)</td>
          <td>\(y = e^{\alpha x}(C_1\cos\beta x + C_2\sin\beta x)\)</td>
        </tr>
      </table>
    </div>
  </div>
</section>

<!-- POPULATION GROWTH -->

  <div class="card">
    <div class="card-grid">
      <div>
        <h3>지수 성장 (Malthus)</h3>

<!-- SOLVING METHODS -->
<section id="solving" class="fade-in">
  <h2>풀이 방법 상세</h2>

  <!-- Separation of Variables -->
  <h3>1. 변수분리법</h3>
  <div class="card">
    <p>가장 기본적인 풀이 방법. \(\frac{dy}{dx} = g(x)h(y)\) 형태일 때 사용합니다.</p>
    <p><strong>예제:</strong> \(\frac{dy}{dx} = xy\), \(y(0) = 1\) 을 풀어보겠습니다.</p>
    <div class="steps">
      <div class="step open" onclick="this.classList.toggle('open')">
        <div class="step-title">변수 분리</div>
        <div class="step-content">
          <div class="math-block">$$\frac{dy}{dx} = xy \implies \frac{1}{y}\,dy = x\,dx$$</div>
          <p>\(y\)와 관련된 항은 좌변에, \(x\)와 관련된 항은 우변에 모읍니다.</p>
        </div>
      </div>
      <div class="step" onclick="this.classList.toggle('open')">
        <div class="step-title">양변 적분</div>
        <div class="step-content">
          <div class="math-block">$$\int \frac{1}{y}\,dy = \int x\,dx$$</div>
          <div class="math-block">$$\ln|y| = \frac{x^2}{2} + C$$</div>
        </div>
      </div>
      <div class="step" onclick="this.classList.toggle('open')">
        <div class="step-title">y에 대해 풀기</div>
        <div class="step-content">
          <div class="math-block">$$y = e^{x^2/2 + C} = Ae^{x^2/2} \quad (A = e^C)$$</div>
        </div>
      </div>
      <div class="step" onclick="this.classList.toggle('open')">
        <div class="step-title">초기조건 적용</div>
        <div class="step-content">
          <p>\(y(0) = 1\)이므로:</p>
          <div class="math-block">$$1 = Ae^0 \implies A = 1$$</div>
          <div class="math-block" style="border-left-color:var(--green)">$$\boxed{y = e^{x^2/2}}$$</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Integrating Factor -->
  <h3>2. 적분인자법</h3>
  <div class="card">
    <p>1차 선형 미분방정식 \(y' + P(x)y = Q(x)\)에 적용합니다.</p>
    <p><strong>예제:</strong> \(y' + 2y = e^{-x}\)를 풀어보겠습니다.</p>
    <div class="steps">
      <div class="step open" onclick="this.classList.toggle('open')">
        <div class="step-title">적분인자 구하기</div>
        <div class="step-content">
          <div class="math-block">$$\mu(x) = e^{\int P(x)\,dx} = e^{\int 2\,dx} = e^{2x}$$</div>
        </div>
      </div>
      <div class="step" onclick="this.classList.toggle('open')">
        <div class="step-title">양변에 적분인자 곱하기</div>
        <div class="step-content">
          <div class="math-block">$$e^{2x}y' + 2e^{2x}y = e^{2x} \cdot e^{-x} = e^x$$</div>
          <p>좌변은 곱의 미분:</p>
          <div class="math-block">$$\frac{d}{dx}\left[e^{2x}y\right] = e^x$$</div>
        </div>
      </div>
      <div class="step" onclick="this.classList.toggle('open')">
        <div class="step-title">양변 적분</div>
        <div class="step-content">
          <div class="math-block">$$e^{2x}y = \int e^x\,dx = e^x + C$$</div>
        </div>
      </div>
      <div class="step" onclick="this.classList.toggle('open')">
        <div class="step-title">y에 대해 풀기</div>
        <div class="step-content">
          <div class="math-block" style="border-left-color:var(--green)">$$\boxed{y = e^{-x} + Ce^{-2x}}$$</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Characteristic Equation -->
  <h3>3. 특성방정식법 (2차 선형)</h3>
  <div class="card">
    <p><strong>예제:</strong> \(y'' - 5y' + 6y = 0\)을 풀어보겠습니다.</p>
    <div class="steps">
      <div class="step open" onclick="this.classList.toggle('open')">
        <div class="step-title">특성방정식 세우기</div>
        <div class="step-content">
          <p>\(y = e^{rx}\)를 대입하면:</p>
          <div class="math-block">$$r^2 - 5r + 6 = 0$$</div>
        </div>
      </div>
      <div class="step" onclick="this.classList.toggle('open')">
        <div class="step-title">근 구하기</div>
        <div class="step-content">
          <div class="math-block">$$(r-2)(r-3) = 0 \implies r_1 = 2,\; r_2 = 3$$</div>
          <p>서로 다른 두 실근입니다.</p>
        </div>
      </div>
      <div class="step" onclick="this.classList.toggle('open')">
        <div class="step-title">일반해 작성</div>
        <div class="step-content">
          <div class="math-block" style="border-left-color:var(--green)">$$\boxed{y = C_1 e^{2x} + C_2 e^{3x}}$$</div>
        </div>
      </div>
    </div>
  </div>
</section>

      자연의 거의 모든 법칙은 미분방정식으로 표현되며,<br>

<script>

    bg3: s.getPropertyValue('--bg3').trim(),

    text2: s.getPropertyValue('--text2').trim(),

    yellow: s.getPropertyValue('--yellow').trim(),
    cyan: s.getPropertyValue('--cyan').trim(),
    border: s.getPropertyValue('--border').trim(),

}

// ============ SCROLL ANIMATIONS ============
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });

// Active nav
const sections = document.querySelectorAll('section[id]');
window.addEventListener('scroll', () => {

  sections.forEach(s => {
    if(window.scrollY >= s.offsetTop - 100) cur = s.getAttribute('id');

// ============ SLOPE FIELD ============
const slopeEquations = [
  (x,y) => { const ay = Math.abs(y) < 1e-9 ? (y >= 0 ? 1e-9 : -1e-9) : y; return -x/ay; },
  (x,y) => x - y,
  (x,y) => Math.sin(x)*Math.cos(y),
  (x,y) => x*y,
  (x,y) => y*(1-y),
];
let slopeCurves = [];

function drawSlopeField() {
  const canvas = document.getElementById('slopeCanvas');
  const ctx = canvas.getContext('2d');
  const C = getColors();
  const W = canvas.width, H = canvas.height;
  const eq = slopeEquations[document.getElementById('slopeEq').value];

  const xmin = -5, xmax = 5, ymin = -3.5, ymax = 3.5;
  const toX = x => (x - xmin)/(xmax-xmin)*W;
  const toY = y => H - (y - ymin)/(ymax-ymin)*H;
  const fromX = px => xmin + px/W*(xmax-xmin);
  const fromY = py => ymax - py/H*(ymax-ymin);

  ctx.fillStyle = C.bg;
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = C.border;
  ctx.lineWidth = 0.5;
  for(let x = Math.ceil(xmin); x <= xmax; x++) {
    ctx.beginPath(); ctx.moveTo(toX(x),0); ctx.lineTo(toX(x),H); ctx.stroke();
  }
  for(let y = Math.ceil(ymin); y <= ymax; y++) {
    ctx.beginPath(); ctx.moveTo(0,toY(y)); ctx.lineTo(W,toY(y)); ctx.stroke();
  }
  // Axes
  ctx.strokeStyle = C.text2;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(toX(0),0); ctx.lineTo(toX(0),H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,toY(0)); ctx.lineTo(W,toY(0)); ctx.stroke();

  // Slope lines
  const step = 0.4;
  const len = 0.15;
  for(let x = xmin+step/2; x <= xmax; x += step) {
    for(let y = ymin+step/2; y <= ymax; y += step) {
      const s = eq(x,y);
      const angle = Math.atan(s);
      const dx = len*Math.cos(angle);
      const dy = len*Math.sin(angle);

      const mag = Math.min(Math.abs(s), 5)/5;
      const r = Math.round(99 + mag*156);
      const g = Math.round(102 + (1-mag)*109);
      const b = Math.round(241);
      ctx.strokeStyle = `rgba(${r},${g},${b},0.7)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(toX(x-dx), toY(y-dy));
      ctx.lineTo(toX(x+dx), toY(y+dy));
      ctx.stroke();
    }
  }

  // Draw solution curves (arc-length parameterization for robust tracing)
  slopeCurves.forEach((curve, ci) => {
    const hue = (ci * 67) % 360;
    const color = `hsl(${hue}, 80%, 60%)`;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    const ds = 0.015;
    const maxSteps = 6000;
    const margin = 1;

    function traceCurve(startX, startY, initDirSign) {
      ctx.beginPath();
      let cx = startX, cy = startY;
      ctx.moveTo(toX(cx), toY(cy));
      let prevDx = initDirSign, prevDy = initDirSign * eq(cx, cy);
      let pNorm = Math.sqrt(prevDx*prevDx + prevDy*prevDy);
      if(pNorm > 0) { prevDx /= pNorm; prevDy /= pNorm; }
      for(let i = 0; i < maxSteps; i++) {
        const s = eq(cx, cy);
        let tx = 1, ty = s;
        let norm = Math.sqrt(tx*tx + ty*ty);
        tx /= norm; ty /= norm;
        // Ensure consistent direction via dot product
        if(tx*prevDx + ty*prevDy < 0) { tx = -tx; ty = -ty; }
        // RK4-like: half-step to get midpoint slope
        const mx = cx + 0.5*ds*tx, my = cy + 0.5*ds*ty;
        const ms = eq(mx, my);
        let mtx = 1, mty = ms;
        norm = Math.sqrt(mtx*mtx + mty*mty);
        mtx /= norm; mty /= norm;
        if(mtx*tx + mty*ty < 0) { mtx = -mtx; mty = -mty; }
        cx += ds * mtx;
        cy += ds * mty;
        prevDx = mtx; prevDy = mty;
        if(!isFinite(cx) || !isFinite(cy)) break;
        if(cx > xmax+margin || cx < xmin-margin || cy > ymax+margin+1 || cy < ymin-margin-1) break;
        ctx.lineTo(toX(cx), toY(cy));
        // Detect closed curve (returned near start)
        if(i > 50 && Math.abs(cx - startX) < 0.04 && Math.abs(cy - startY) < 0.04) break;
      }
      ctx.stroke();
    }
    traceCurve(curve.x, curve.y, 1);
    traceCurve(curve.x, curve.y, -1);

    // dot
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(toX(curve.x), toY(curve.y), 5, 0, Math.PI*2);
    ctx.fill();
  });
}

document.getElementById('slopeCanvas').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (this.width / rect.width);
  const py = (e.clientY - rect.top) * (this.height / rect.height);
  const x = -5 + px/this.width*10;
  const y = 3.5 - py/this.height*7;
  slopeCurves.push({x, y});
  drawSlopeField();
});

function clearSlopeCurves() {
  slopeCurves = [];
  drawSlopeField();
}

// ============ SPRING-MASS ============
let springAnim = null;
let springTime = 0;

function updateSpring() {
  const m = parseFloat(document.getElementById('massSlider').value);
  const c = parseFloat(document.getElementById('dampSlider').value);
  const k = parseFloat(document.getElementById('stiffSlider').value);
  document.getElementById('massVal').textContent = m.toFixed(1);
  document.getElementById('dampVal').textContent = c.toFixed(1);
  document.getElementById('stiffVal').textContent = k.toFixed(1);

  const disc = c*c - 4*m*k;
  let typeText = '';
  if(c === 0) typeText = '비감쇠 (Undamped) - 영원히 진동';
  else if(disc < 0) typeText = '부족감쇠 (Underdamped) - 진동하며 감소';
  else if(disc === 0) typeText = '임계감쇠 (Critically Damped) - 가장 빠르게 정지';
  else typeText = '과감쇠 (Overdamped) - 진동 없이 천천히 정지';
  document.getElementById('springType').textContent = typeText;

  springTime = 0;
  if(springAnim) cancelAnimationFrame(springAnim);
  animateSpring(m, c, k);
}

function animateSpring(m, c, k) {
  const animCanvas = document.getElementById('springAnim');
  const graphCanvas = document.getElementById('springGraph');
  const actx = animCanvas.getContext('2d');
  const gctx = graphCanvas.getContext('2d');
  const C = getColors();

  // Simulate with RK4
  const dt = 0.02;
  const tmax = 12;
  const data = [];
  let x = 1.0, v = 0;
  for(let t = 0; t <= tmax; t += dt) {
    data.push({t, x});
    // RK4
    const f = (x,v) => [v, (-c*v - k*x)/m];
    const k1 = f(x, v);
    const k2 = f(x+dt/2*k1[0], v+dt/2*k1[1]);
    const k3 = f(x+dt/2*k2[0], v+dt/2*k2[1]);
    const k4 = f(x+dt*k3[0], v+dt*k3[1]);
    x += dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]);
    v += dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]);
  }

  const totalFrames = data.length;
  let frame = 0;

  function render() {
    frame = (frame + 1) % totalFrames;
    const cur = data[frame];

    // Animation canvas
    const AW = animCanvas.width, AH = animCanvas.height;
    actx.fillStyle = C.bg;
    actx.fillRect(0,0,AW,AH);

    // Wall
    actx.fillStyle = C.border;
    actx.fillRect(20, 40, 10, AH-80);

    // Spring (zigzag)
    const bx = 150 + cur.x * 80;
    const by = AH/2;
    actx.strokeStyle = C.text2;
    actx.lineWidth = 2;
    actx.beginPath();
    actx.moveTo(30, by);
    const coils = 12;
    const springLen = bx - 30;
    const segLen = springLen / coils;
    for(let i = 0; i < coils; i++) {
      const sx = 30 + (i+0.25)*segLen;
      const sy = by + (i%2===0 ? -15 : 15);
      actx.lineTo(sx, sy);
    }
    actx.lineTo(bx, by);
    actx.stroke();

    // Mass
    actx.fillStyle = C.accent;
    actx.fillRect(bx-15, by-20, 30, 40);
    actx.fillStyle = '#fff';
    actx.font = 'bold 12px sans-serif';
    actx.fillText('m', bx-6, by+5);

    // Equilibrium line
    actx.setLineDash([4,4]);
    actx.strokeStyle = C.text2;
    actx.beginPath();
    actx.moveTo(150, 40); actx.lineTo(150, AH-40);
    actx.stroke();
    actx.setLineDash([]);
    actx.fillStyle = C.text2;
    actx.font = '11px sans-serif';
    actx.fillText('평형점', 135, 35);

    // Graph canvas
    const GW = graphCanvas.width, GH = graphCanvas.height;
    gctx.fillStyle = C.bg;
    gctx.fillRect(0,0,GW,GH);

    const gxmin = 0, gxmax = tmax, gymin = -1.5, gymax = 1.5;
    const toGX = t => 40 + (t-gxmin)/(gxmax-gxmin)*(GW-60);
    const toGY = x => GH/2 - x/(gymax-gymin)*(GH-60);

    // Axes
    gctx.strokeStyle = C.text2;
    gctx.lineWidth = 1;
    gctx.beginPath(); gctx.moveTo(toGX(0),toGY(0)); gctx.lineTo(toGX(gxmax),toGY(0)); gctx.stroke();
    gctx.beginPath(); gctx.moveTo(toGX(0),toGY(gymin)); gctx.lineTo(toGX(0),toGY(gymax)); gctx.stroke();
    gctx.fillStyle = C.text2;
    gctx.font = '11px sans-serif';
    gctx.fillText('t', toGX(gxmax)+4, toGY(0)+4);
    gctx.fillText('x(t)', toGX(0)+4, toGY(gymax)-4);

    // Curve
    gctx.strokeStyle = C.accent;
    gctx.lineWidth = 2;
    gctx.beginPath();
    for(let i = 0; i <= frame; i++) {
      const d = data[i];
      if(i===0) gctx.moveTo(toGX(d.t), toGY(d.x));
      else gctx.lineTo(toGX(d.t), toGY(d.x));
    }
    gctx.stroke();

    // Current point
    gctx.fillStyle = C.red;
    gctx.beginPath();
    gctx.arc(toGX(cur.t), toGY(cur.x), 4, 0, Math.PI*2);
    gctx.fill();

    springAnim = requestAnimationFrame(render);
  }
  render();
}

// ============ POPULATION ============
function updatePopulation() {
  const r = parseFloat(document.getElementById('rSlider').value);
  const K = parseFloat(document.getElementById('kSlider').value);
  const P0 = parseFloat(document.getElementById('p0Slider').value);
  document.getElementById('rVal').textContent = r.toFixed(1);
  document.getElementById('kVal').textContent = K;
  document.getElementById('p0Val').textContent = P0;
  drawPopulation(r, K, P0);
}

function drawPopulation(r, K, P0) {
  const canvas = document.getElementById('popCanvas');
  const ctx = canvas.getContext('2d');
  const C = getColors();
  const W = canvas.width, H = canvas.height;

  const tmax = 30;
  const pmax = Math.max(K * 1.3, P0 * 2);
  const toX = t => 60 + t/tmax*(W-80);
  const toY = p => H-40 - p/pmax*(H-60);

  ctx.fillStyle = C.bg;
  ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle = C.border;
  ctx.lineWidth = 0.5;
  for(let t = 0; t<=tmax; t+=5) {
    ctx.beginPath(); ctx.moveTo(toX(t),toY(0)); ctx.lineTo(toX(t),toY(pmax)); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = C.text2;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(toX(0),toY(0)); ctx.lineTo(toX(tmax),toY(0)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(toX(0),toY(0)); ctx.lineTo(toX(0),toY(pmax)); ctx.stroke();
  ctx.fillStyle = C.text2;
  ctx.font = '12px sans-serif';
  ctx.fillText('t', toX(tmax)+8, toY(0)+4);
  ctx.fillText('P(t)', toX(0)-10, toY(pmax)-10);
  for(let t=0; t<=tmax; t+=5) ctx.fillText(t, toX(t)-6, toY(0)+16);

  // Carrying capacity line
  ctx.setLineDash([6,4]);
  ctx.strokeStyle = C.orange;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(toX(0),toY(K)); ctx.lineTo(toX(tmax),toY(K)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = C.orange;
  ctx.fillText(`K = ${K}`, toX(tmax)-60, toY(K)-8);

  // Exponential growth
  ctx.strokeStyle = C.red;
  ctx.lineWidth = 2;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  let p = P0;
  const dt = 0.05;
  for(let t=0; t<=tmax; t+=dt) {
    p = P0 * Math.exp(r*t);
    if(p > pmax) break;
    if(t===0) ctx.moveTo(toX(t),toY(p));
    else ctx.lineTo(toX(t),toY(p));
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Logistic growth
  ctx.strokeStyle = C.green;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for(let t=0; t<=tmax; t+=dt) {
    const pl = K / (1 + ((K-P0)/P0)*Math.exp(-r*t));
    if(t===0) ctx.moveTo(toX(t),toY(pl));
    else ctx.lineTo(toX(t),toY(pl));
  }
  ctx.stroke();

  // Legend
  ctx.font = '13px sans-serif';
  ctx.fillStyle = C.red;
  ctx.fillRect(W-220, 16, 20, 3);
  ctx.fillStyle = C.text2;
  ctx.fillText('지수 성장', W-190, 22);
  ctx.fillStyle = C.green;
  ctx.fillRect(W-220, 36, 20, 3);
  ctx.fillStyle = C.text2;
  ctx.fillText('로지스틱 성장', W-190, 42);
}

// ============ INIT ============
window.addEventListener('DOMContentLoaded', () => {
  renderMathInElement(document.body, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\(', right: '\\)', display: false},
    ]
  });

  drawSlopeField();
  updateSpring();
  updatePopulation();
});

.section-header{text-align:center;margin-bottom:48px;}
.section-number{display:inline-block;background:var(--primary);color:#fff;width:36px;height:36px;border-radius:50%;font-size:.9rem;font-weight:700;line-height:36px;margin-bottom:12px;}
.section-header h2{font-size:clamp(1.5rem,3vw,2rem);margin-bottom:8px;}
.section-header p{color:var(--text-light);max-width:600px;margin:0 auto;}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;transition:transform .3s,box-shadow .3s;}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}

/* CONCEPT SECTION */
.concept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-top:32px;}
.concept-card{text-align:center;padding:32px 24px;}
.concept-card .icon{font-size:2.5rem;margin-bottom:16px;}
.concept-card h3{font-size:1.1rem;margin-bottom:8px;color:var(--primary);}
.concept-card p{font-size:.92rem;color:var(--text-light);}
.definition-box{background:linear-gradient(135deg,#1e3a5f,var(--primary));color:#fff;border-radius:var(--radius);padding:36px;text-align:center;font-size:1.15rem;margin-bottom:32px;position:relative;overflow:hidden;text-shadow:0 1px 3px rgba(0,0,0,.2);}
.definition-box::before{content:'"';position:absolute;top:-20px;left:20px;font-size:8rem;opacity:.25;font-family:Georgia,serif;}
.definition-box strong{font-size:1.3rem;display:block;margin-bottom:12px;}

/* FLOWCHART */
.flowchart-container{max-width:900px;margin:0 auto;position:relative;}
.flow-steps{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;align-items:center;}
.flow-step{background:var(--card);border:2px solid var(--border);border-radius:var(--radius);padding:16px 24px;text-align:center;cursor:pointer;transition:all .3s;min-width:140px;position:relative;}
.flow-step:hover,.flow-step.active{border-color:var(--primary);background:rgba(37,99,235,.05);transform:scale(1.05);}
.flow-step.active{box-shadow:0 0 0 3px rgba(37,99,235,.2);}
.flow-step h4{font-size:.95rem;color:var(--primary);margin-bottom:4px;}
.flow-step p{font-size:.8rem;color:var(--text-light);}
.flow-arrow{color:var(--primary);font-size:1.5rem;font-weight:bold;}
.flow-detail{margin-top:24px;background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);min-height:100px;transition:all .3s;}
.flow-detail h4{color:var(--primary);margin-bottom:8px;}
.flow-feedback-arrow{display:flex;justify-content:center;margin-top:16px;}
.flow-feedback-arrow .arrow-back{display:inline-block;padding:8px 24px;background:#92400e;color:#fff;border-radius:20px;font-size:.85rem;font-weight:600;}

/* METAPHOR CARDS */
.metaphor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;}
.metaphor-card{overflow:hidden;position:relative;}
.metaphor-card .metaphor-icon{font-size:3rem;margin-bottom:16px;display:block;}
.metaphor-card h3{font-size:1.1rem;color:var(--primary);margin-bottom:12px;}
.metaphor-card .mapping{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-top:12px;font-size:.88rem;}
.mapping .arrow-map{color:var(--primary);font-weight:bold;text-align:center;}
.mapping .real{background:rgba(245,158,11,.1);padding:6px 12px;border-radius:6px;text-align:center;}
.mapping .model{background:rgba(37,99,235,.1);padding:6px 12px;border-radius:6px;text-align:center;}

/* INTERACTIVE EXAMPLES */
.example-section{margin-bottom:60px;}
.example-header{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.example-header h3{font-size:1.3rem;}
.example-badge{background:var(--primary);color:#fff;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:500;}
.example-content{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
.example-info{padding:20px 0;}
.example-info .equation-box{background:var(--bg-alt);border-left:4px solid var(--primary);padding:16px 20px;border-radius:0 8px 8px 0;margin:16px 0;font-size:1.05rem;}
.controls-panel{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);}
.slider-group{margin-bottom:20px;}
.slider-group label{display:flex;justify-content:space-between;font-size:.9rem;font-weight:500;margin-bottom:6px;}
.slider-group input[type=range]{width:100%;accent-color:var(--primary);height:6px;cursor:pointer;}
.chart-container{position:relative;height:300px;background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
canvas.sim-canvas{display:block;width:100%;border-radius:var(--radius);background:#1a1a2e;}

/* THERMOMETER */
.thermo-container{display:flex;align-items:center;justify-content:center;gap:24px;padding:20px;}
.thermometer{width:40px;height:200px;background:#e2e8f0;border-radius:20px;position:relative;overflow:hidden;border:2px solid #cbd5e1;}
.thermo-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,var(--danger),var(--accent));transition:height .5s;border-radius:0 0 18px 18px;}
.thermo-label{font-size:1.5rem;font-weight:700;color:var(--primary);}

/* SPRING CANVAS */
.spring-sim{display:flex;flex-direction:column;align-items:center;}

/* TANK ANIMATION */
.tank-container{position:relative;width:200px;height:200px;margin:0 auto;}
.tank-body{width:100%;height:100%;border:3px solid #475569;border-radius:0 0 12px 12px;position:relative;overflow:hidden;background:#e0f2fe;}
.tank-water{position:absolute;bottom:0;left:0;right:0;transition:height .5s,background .5s;background:rgba(37,99,235,.3);}
.tank-pipe-in,.tank-pipe-out{position:absolute;height:4px;background:#475569;}
.tank-pipe-in{top:20px;left:-30px;width:30px;}
.tank-pipe-out{bottom:20px;right:-30px;width:30px;}

/* TABS */
.tabs-container{max-width:900px;margin:0 auto;}
.tab-buttons{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;border-bottom:2px solid var(--border);margin-bottom:24px;}
.tab-btn{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:.88rem;font-weight:500;color:var(--text-light);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;font-family:inherit;}
.tab-btn:hover{color:var(--primary);}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700;}
.tab-panel{display:none;animation:fadeIn .3s;}
.tab-panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* COMPARISON TABLE */
.table-wrapper{overflow-x:auto;}
table.compare-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.compare-table th{background:var(--primary);color:#fff;padding:14px 16px;font-size:.85rem;text-align:left;white-space:nowrap;}
.compare-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.88rem;vertical-align:top;}
.compare-table tr:hover td{background:rgba(37,99,235,.03);}
.compare-table tr:last-child td{border-bottom:none;}

/* TIMELINE */
.timeline{position:relative;max-width:800px;margin:0 auto;padding:20px 0;}
.timeline::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:3px;background:var(--primary);transform:translateX(-50%);}
.timeline-item{position:relative;padding:20px 0;display:flex;align-items:center;}
.timeline-item:nth-child(odd){flex-direction:row;padding-right:50%;}
.timeline-item:nth-child(even){flex-direction:row-reverse;padding-left:50%;}
.timeline-dot{position:absolute;left:50%;transform:translateX(-50%);width:16px;height:16px;background:var(--primary);border-radius:50%;border:3px solid var(--card);box-shadow:var(--shadow);z-index:1;}
.timeline-content{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin:0 30px;flex:1;}
.timeline-content h4{color:var(--primary);margin-bottom:4px;}
.timeline-content .year{font-size:.85rem;color:#b45309;font-weight:700;}
.timeline-content p{font-size:.88rem;color:var(--text-light);margin-top:4px;}

/* QUIZ */
.quiz-container{max-width:700px;margin:0 auto;}
.quiz-question{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);}
.quiz-question h4{margin-bottom:12px;font-size:1rem;}
.quiz-options{display:flex;flex-direction:column;gap:8px;}
.quiz-option{display:flex;align-items:center;gap:10px;padding:10px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;font-size:.92rem;}
.quiz-option:hover{border-color:var(--primary-light);background:rgba(37,99,235,.03);}
.quiz-option.selected{border-color:var(--primary);background:rgba(37,99,235,.08);}
.quiz-option.correct{border-color:var(--success);background:rgba(16,185,129,.1);}
.quiz-option.wrong{border-color:var(--danger);background:rgba(239,68,68,.1);}
.quiz-option input{display:none;}
.quiz-radio{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;position:relative;transition:all .2s;}
.quiz-option.selected .quiz-radio{border-color:var(--primary);background:var(--primary);}
.quiz-option.selected .quiz-radio::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:#fff;border-radius:50%;}
.quiz-feedback{margin-top:12px;padding:12px;border-radius:var(--radius-sm);font-size:.88rem;display:none;}
.quiz-feedback.show{display:block;}
.quiz-feedback.correct-fb{background:rgba(16,185,129,.1);color:#065f46;border:1px solid rgba(16,185,129,.3);}
.quiz-feedback.wrong-fb{background:rgba(239,68,68,.1);color:#991b1b;border:1px solid rgba(239,68,68,.3);}
.quiz-submit{display:block;margin:24px auto 0;padding:12px 36px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;font-family:inherit;}
.quiz-submit:hover{background:var(--primary-dark);}
.quiz-result{text-align:center;margin-top:20px;font-size:1.2rem;font-weight:700;color:var(--primary);display:none;}
.quiz-fill{width:140px;border:none;border-bottom:3px solid var(--primary);padding:6px 8px;font-size:1rem;text-align:center;background:rgba(37,99,235,.05);font-family:inherit;outline:none;color:var(--text);font-weight:500;}

/* FORMULA CARDS */
.formula-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.formula-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border-top:4px solid var(--primary);}
.formula-card h4{font-size:.95rem;color:var(--primary);margin-bottom:8px;}
.formula-card .formula{font-size:1.1rem;margin-bottom:8px;padding:8px;background:var(--bg-alt);border-radius:6px;text-align:center;}
.formula-card p{font-size:.82rem;color:var(--text-light);}

/* FOOTER */
footer{background:#1e293b;color:#cbd5e1;text-align:center;padding:32px 24px;font-size:.85rem;}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .6s,transform .6s;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* RESPONSIVE */
@media(max-width:768px){
.nav-links{display:none;}
.nav-links.open{display:flex;position:absolute;top:60px;left:0;right:0;background:var(--card);flex-direction:column;padding:16px;border-bottom:1px solid var(--border);box-shadow:var(--shadow);}
.nav-toggle{display:block;}
.example-content{grid-template-columns:1fr;}
.flow-steps{flex-direction:column;}
.flow-arrow{transform:rotate(90deg);}
.timeline::before{left:20px;}
.timeline-item,.timeline-item:nth-child(odd),.timeline-item:nth-child(even){flex-direction:row;padding-left:50px;padding-right:0;}
.timeline-dot{left:20px;}
.timeline-content{margin:0;}
.hero h1{font-size:2rem;}
}

@media print{
nav,.scroll-indicator,.controls-panel,canvas.sim-canvas,.quiz-submit{display:none!important;}
section{padding:20px 0;break-inside:avoid;}
.card{box-shadow:none;border:1px solid #ddd;}
}

.btn-toggle{display:inline-block;padding:6px 16px;margin:4px;border:2px solid var(--primary);background:transparent;color:var(--primary);border-radius:20px;cursor:pointer;font-size:.85rem;transition:all .2s;font-family:inherit;}
.btn-toggle.active,.btn-toggle:hover{background:var(--primary);color:#fff;}
</style>
</head>

<!-- 1. CONCEPT DEFINITION -->
<section id="concept">
<div class="container">
<div class="section-header">
<div class="section-number">1</div>
<h2>모형화란 무엇인가?</h2>
<p>수학적 모형화의 정의와 핵심 개념</p>
</div>
<div class="definition-box reveal">
<strong>모형화(Modeling)의 정의</strong>
현실 세계의 문제를 <em>수학적 언어</em>로 번역하는 과정이다.<br>
관찰 대상의 본질적 특성을 포착하여 미분방정식 등의 수학적 구조로 표현하고,<br>
그 해를 통해 현상을 이해, 예측, 제어하는 체계적 접근법이다.
</div>
<div class="concept-grid">
<div class="card concept-card reveal">
<div class="icon">&#x1f4d0;</div>
<h3>모형 (Model)</h3>
<p>현실 현상의 수학적 표현. 주로 미분방정식 형태로 나타낸다. 완벽한 복제가 아닌 핵심 특성의 추상화이다.</p>
</div>
<div class="card concept-card reveal">
<div class="icon">&#x1f4ca;</div>
<h3>변수 (Variable)</h3>
<p>모형에서 변화하는 양. 독립변수(시간 t 등)와 종속변수(온도 T, 개체수 y 등)로 구분한다.</p>
</div>
<div class="card concept-card reveal">
<div class="icon">&#x2699;</div>
<h3>매개변수 (Parameter)</h3>
<p>모형 내에서 고정된 상수. 성장률 k, 감쇠계수 c 등 현상의 특성을 결정하는 값이다.</p>
</div>
<div class="card concept-card reveal">
<div class="icon">&#x1f4dd;</div>
<h3>가정 (Assumption)</h3>
<p>모형을 단순화하기 위한 전제 조건. "공기 저항 무시", "균일한 혼합" 등 현실을 이상화한다.</p>
</div>
<div class="card concept-card reveal">
<div class="icon">&#x2705;</div>
<h3>검증 (Verification)</h3>
<p>모형의 결과를 실측 데이터와 비교하여 타당성을 확인하는 단계. 모형 개선의 기초가 된다.</p>
</div>
<div class="card concept-card reveal">
<div class="icon">&#x1f504;</div>
<h3>반복 개선 (Iteration)</h3>
<p>검증 결과에 따라 가정을 수정하고 모형을 개선하는 순환 과정. 더 정확한 모형으로 발전시킨다.</p>
</div>
</div>
</div>
</section>

<div class="container">
<div class="section-header">
<div class="section-number">2</div>
<h2>모형화의 순환 과정</h2>
<p>각 단계를 클릭하여 상세 설명을 확인하세요</p>
</div>

<div class="flow-arrow">&rarr;</div>
<div class="flow-step" data-step="1"><h4>가정 & 단순화</h4><p>이상화</p></div>
<div class="flow-arrow">&rarr;</div>
<div class="flow-step" data-step="2"><h4>수학적 정식화</h4><p>방정식 수립</p></div>
<div class="flow-arrow">&rarr;</div>
<div class="flow-step" data-step="3"><h4>수학적 풀이</h4><p>해 구하기</p></div>
<div class="flow-arrow">&rarr;</div>

<div class="flow-arrow">&rarr;</div>

</div>
<div class="flow-feedback-arrow"><span class="arrow-back">&#x21A9; 피드백: 가정 수정 후 반복</span></div>
<div class="flow-detail" id="flowDetail">
<h4>현실 문제 인식</h4>
<p>자연 현상이나 공학 문제를 관찰하고, 해결이 필요한 핵심 질문을 명확히 정의한다. 예: "커피가 식는 속도는 어떻게 되는가?", "인구는 어떤 패턴으로 증가하는가?"</p>

<!-- 4. STEP-BY-STEP GUIDE (TABS) -->
<section id="guide">
<div class="container">
<div class="section-header">
<div class="section-number">3</div>
<h2>단계별 모형화 가이드</h2>
<p>인구 성장 문제를 예시로 전체 과정을 따라가 봅시다</p>
</div>
<div class="tabs-container reveal">
<div class="tab-buttons">
<button class="tab-btn active" data-tab="step1">1. 문제 파악</button>
<button class="tab-btn" data-tab="step2">2. 가정 설정</button>
<button class="tab-btn" data-tab="step3">3. 변수 정의</button>
<button class="tab-btn" data-tab="step4">4. 방정식 수립</button>
<button class="tab-btn" data-tab="step5">5. 풀이</button>
<button class="tab-btn" data-tab="step6">6. 해석</button>
<button class="tab-btn" data-tab="step7">7. 검증</button>
</div>
<div class="tab-panel active" id="step1">
<div class="card">
<h3>Step 1: 문제 파악</h3>
<p style="margin-top:12px;"><strong>질문:</strong> "어떤 도시의 인구가 시간에 따라 어떻게 변하는가?"</p>
<p style="margin-top:8px;">관찰 사실: 인구는 시간이 지남에 따라 증가하는 경향이 있다. 현재 인구와 증가율에 대한 데이터가 존재한다.</p>
<p style="margin-top:8px;"><strong>핵심:</strong> 해결하려는 문제를 명확하고 구체적으로 진술한다.</p>
</div>
</div>
<div class="tab-panel" id="step2">
<div class="card">
<h3>Step 2: 가정 설정</h3>
<ul style="margin-top:12px;list-style:none;">
<li style="padding:6px 0;">&#x2022; 인구 증가율은 현재 인구에 비례한다</li>
<li style="padding:6px 0;">&#x2022; 이민/이출은 무시한다</li>
<li style="padding:6px 0;">&#x2022; 자원은 무한하다고 가정한다 (단순 모형)</li>
<li style="padding:6px 0;">&#x2022; 성장률 k는 상수이다</li>
</ul>
<p style="margin-top:12px;color:var(--text-light);font-size:.9rem;">가정은 모형의 정확도와 복잡도 사이의 균형을 결정합니다.</p>
</div>
</div>
<div class="tab-panel" id="step3">
<div class="card">
<h3>Step 3: 변수 정의</h3>
<div style="margin-top:12px;">
<p><strong>독립변수:</strong> \(t\) = 시간 (년)</p>
<p style="margin-top:8px;"><strong>종속변수:</strong> \(y(t)\) = 시각 t에서의 인구</p>
<p style="margin-top:8px;"><strong>매개변수:</strong> \(k\) = 비례 성장률 (상수), \(y_0\) = 초기 인구</p>
</div>
</div>
</div>
<div class="tab-panel" id="step4">
<div class="card">
<h3>Step 4: 방정식 수립</h3>
<p style="margin-top:12px;">"인구 증가율은 현재 인구에 비례한다"를 수식으로:</p>
<div class="equation-box" style="background:var(--bg-alt);padding:16px;border-radius:8px;text-align:center;margin:16px 0;font-size:1.1rem;">
$$\frac{dy}{dt} = ky$$
</div>
<p>초기 조건: \(y(0) = y_0\)</p>
<p style="margin-top:8px;color:var(--text-light);">이것은 1차 선형 상미분방정식(ODE)이다.</p>
</div>
</div>
<div class="tab-panel" id="step5">
<div class="card">
<h3>Step 5: 풀이</h3>
<p style="margin-top:12px;">변수분리법을 적용:</p>
<div class="equation-box" style="background:var(--bg-alt);padding:16px;border-radius:8px;text-align:center;margin:16px 0;">
$$\frac{dy}{y} = k\,dt \;\Rightarrow\; \ln|y| = kt + C \;\Rightarrow\; y = Ce^{kt}$$
</div>
<p>초기 조건 \(y(0) = y_0\)을 적용하면 \(C = y_0\):</p>
<div class="equation-box" style="background:var(--bg-alt);padding:16px;border-radius:8px;text-align:center;margin:16px 0;font-size:1.15rem;">
$$\boxed{y(t) = y_0 e^{kt}}$$
</div>
</div>
</div>
<div class="tab-panel" id="step6">
<div class="card">
<h3>Step 6: 해석</h3>
<ul style="margin-top:12px;list-style:none;">
<li style="padding:6px 0;">&#x2022; \(k > 0\): 인구가 지수적으로 증가 (성장)</li>
<li style="padding:6px 0;">&#x2022; \(k < 0\): 인구가 지수적으로 감소 (쇠퇴)</li>
<li style="padding:6px 0;">&#x2022; \(k = 0\): 인구 불변</li>
<li style="padding:6px 0;">&#x2022; 배증 시간(doubling time): \(t_d = \frac{\ln 2}{k}\)</li>
</ul>
<p style="margin-top:12px;color:var(--text-light);">해의 의미를 물리적 상황과 연결하여 해석하는 것이 중요하다.</p>
</div>
</div>
<div class="tab-panel" id="step7">
<div class="card">
<h3>Step 7: 검증</h3>
<p style="margin-top:12px;">실제 인구 데이터와 모형의 예측값을 비교한다.</p>
<p style="margin-top:8px;">만약 오차가 크다면:</p>
<ul style="margin-top:8px;list-style:none;">
<li style="padding:4px 0;">&#x2022; 가정을 재검토 (예: 자원 제한 고려)</li>
<li style="padding:4px 0;">&#x2022; 로지스틱 모형으로 개선: \(\frac{dy}{dt} = ky\left(1-\frac{y}{K}\right)\)</li>
<li style="padding:4px 0;">&#x2022; 여기서 K는 환경수용력(carrying capacity)</li>
</ul>
<p style="margin-top:12px;color:var(--accent);font-weight:600;">모형화는 일회성이 아닌 반복적 개선 과정이다!</p>
</div>
</div>
</div>
</div>
</section>

function initFallAnimation(){
const canvas=document.getElementById('fallCanvas');
const ctx=canvas.getContext('2d');
let lastTime=0;
function draw(timestamp){
if(!lastTime)lastTime=timestamp;
const dt=(timestamp-lastTime)/1000;
lastTime=timestamp;
fallAnimTime+=dt;
if(fallAnimTime>8)fallAnimTime=0;
const m=parseFloat(document.getElementById('fallM').value);
const b=parseFloat(document.getElementById('fallB').value);
const g=9.81;
const vt=m*g/b;
const v=vt*(1-Math.exp(-b/m*fallAnimTime));
const W=canvas.width,H=canvas.height;
ctx.clearRect(0,0,W,H);
// background gradient
const bg=ctx.createLinearGradient(0,0,0,H);
bg.addColorStop(0,'#0f172a');bg.addColorStop(1,'#1e293b');
ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
// ground
ctx.fillStyle='#334155';ctx.fillRect(0,H-20,W,20);
// ball position (y based on integrated v)
const yPos=vt*(fallAnimTime+m/b*(Math.exp(-b/m*fallAnimTime)-1));
const maxY=H-40;
const ballY=Math.min(20+yPos*2,maxY);
const ballX=W/2;
// trail
ctx.strokeStyle='rgba(59,130,246,0.6)';ctx.lineWidth=2.5;
ctx.beginPath();ctx.moveTo(ballX,20);ctx.lineTo(ballX,ballY);ctx.stroke();
// ball
ctx.beginPath();ctx.arc(ballX,ballY,12,0,Math.PI*2);
ctx.fillStyle='#3b82f6';ctx.fill();
ctx.strokeStyle='#60a5fa';ctx.lineWidth=2;ctx.stroke();
// arrow (velocity)
const arrowLen=Math.min(v*2,80);
ctx.strokeStyle='#f59e0b';ctx.lineWidth=3;
ctx.beginPath();ctx.moveTo(ballX+25,ballY);ctx.lineTo(ballX+25,ballY+arrowLen);ctx.stroke();
ctx.beginPath();ctx.moveTo(ballX+20,ballY+arrowLen-5);ctx.lineTo(ballX+25,ballY+arrowLen);ctx.lineTo(ballX+30,ballY+arrowLen-5);ctx.stroke();
// text
ctx.fillStyle='#ffffff';ctx.font='bold 14px Noto Sans KR,sans-serif';
ctx.fillText('v = '+v.toFixed(1)+' m/s',ballX+40,ballY+10);
ctx.fillText('t = '+fallAnimTime.toFixed(1)+' s',20,25);
ctx.fillText('v_term = '+vt.toFixed(1)+' m/s',20,45);
fallAnimId=requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
}

let sprChart,sprAnimId,sprAnimTime=0;
function initSpringChart(){
const ctx=document.getElementById('sprChart').getContext('2d');
sprChart=new Chart(ctx,{type:'line',data:{labels:[],datasets:[]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{title:{display:true,text:'시간 t (s)'}},y:{title:{display:true,text:'변위 x(t)'}}},plugins:{legend:{display:true}},animation:{duration:300}}});

document.getElementById(id).addEventListener('input',()=>{updateSprChart();sprAnimTime=0;});
});
updateSprChart();
initSpringAnim();
}
function getSpringX(t,m,c,k){
const disc=c*c-4*m*k;
const x0=1;// initial displacement
if(disc<-0.001){// underdamped
const alpha=c/(2*m),omega=Math.sqrt(-disc)/(2*m);
return x0*Math.exp(-alpha*t)*(Math.cos(omega*t)+alpha/omega*Math.sin(omega*t));
}else if(Math.abs(disc)<0.001){// critical (with tolerance)
const r=-c/(2*m);
return x0*(1-r*t)*Math.exp(r*t);
}else{// overdamped
const r1=(-c+Math.sqrt(disc))/(2*m),r2=(-c-Math.sqrt(disc))/(2*m);
const c2=(x0*r1)/(r1-r2);// from x(0)=x0,x'(0)=0
const c1=x0-c2;
return c1*Math.exp(r1*t)+c2*Math.exp(r2*t);
}
}
function updateSprChart(){
const m=parseFloat(document.getElementById('sprM').value);
const c=parseFloat(document.getElementById('sprC').value);
const k=parseFloat(document.getElementById('sprK').value);
document.getElementById('sprMVal').textContent=m;
document.getElementById('sprCVal').textContent=c;
document.getElementById('sprKVal').textContent=k;
const disc=c*c-4*m*k;
const zeta=c/(2*Math.sqrt(m*k));
const typeEl=document.getElementById('sprDampType');
if(disc<-0.001)typeEl.textContent='부족감쇠 (ζ='+zeta.toFixed(2)+')';
else if(Math.abs(disc)<0.001)typeEl.textContent='임계감쇠 (ζ='+zeta.toFixed(2)+')';
else typeEl.textContent='과감쇠 (ζ='+zeta.toFixed(2)+')';
const labels=[],data=[];
for(let t=0;t<=10;t+=0.05){
labels.push(t.toFixed(2));
data.push(getSpringX(t,m,c,k));
}
let color=disc<-0.001?'#2563eb':(Math.abs(disc)<0.001?'#10b981':'#f59e0b');
sprChart.data.labels=labels;
sprChart.data.datasets=[{label:'변위 x(t)',data:data,borderColor:color,tension:.2,pointRadius:0,fill:false}];
sprChart.update();
}
function initSpringAnim(){
const canvas=document.getElementById('springCanvas');
const ctx=canvas.getContext('2d');
let lastT=0;
function draw(ts){
if(!lastT)lastT=ts;
const dt=(ts-lastT)/1000;
lastT=ts;
sprAnimTime+=dt;
if(sprAnimTime>10)sprAnimTime=0;
const m=parseFloat(document.getElementById('sprM').value);
const c=parseFloat(document.getElementById('sprC').value);
const k=parseFloat(document.getElementById('sprK').value);
const x=getSpringX(sprAnimTime,m,c,k);
const W=canvas.width,H=canvas.height;
ctx.clearRect(0,0,W,H);
const bg=ctx.createLinearGradient(0,0,0,H);
bg.addColorStop(0,'#0f172a');bg.addColorStop(1,'#1e293b');
ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
// wall
ctx.fillStyle='#475569';ctx.fillRect(0,H/2-40,10,80);
// spring coils
const anchorX=10,ballCx=250+x*100;
const coils=12,segLen=(ballCx-anchorX-20)/coils;
ctx.strokeStyle='#cbd5e1';ctx.lineWidth=2.5;
ctx.beginPath();ctx.moveTo(anchorX,H/2);
for(let i=0;i<coils;i++){
const sx=anchorX+10+i*segLen;
const dy=(i%2===0)?-15:15;
ctx.lineTo(sx+segLen/2,H/2+dy);
}
ctx.lineTo(ballCx-15,H/2);ctx.stroke();
// mass block
ctx.fillStyle='#3b82f6';
ctx.fillRect(ballCx-15,H/2-20,30,40);
ctx.strokeStyle='#60a5fa';ctx.lineWidth=2;
ctx.strokeRect(ballCx-15,H/2-20,30,40);
// equilibrium line
ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(255,255,255,0.5)';
ctx.beginPath();ctx.moveTo(250,H/2-50);ctx.lineTo(250,H/2+50);ctx.stroke();
ctx.setLineDash([]);
// labels
ctx.fillStyle='#ffffff';ctx.font='bold 13px Noto Sans KR,sans-serif';
ctx.fillText('x='+x.toFixed(3),ballCx+20,H/2);
ctx.fillText('t='+sprAnimTime.toFixed(1)+'s',W-80,20);
sprAnimId=requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
}


// ===== TANK MIXING CHART =====
let tankChart;
function initTankChart(){
const ctx=document.getElementById('tankChart').getContext('2d');
tankChart=new Chart(ctx,{type:'line',data:{labels:[],datasets:[]},options:{responsive:true,maintainAspectRatio:false,scales:{x:{title:{display:true,text:'시간 t (min)'}},y:{title:{display:true,text:'용질량 A(t) (g)'}}},plugins:{legend:{display:true}},animation:{duration:300}}});
['tankRin','tankCin','tankRout','tankA0','tankV0'].forEach(id=>{
document.getElementById(id).addEventListener('input',updateTankChart);
});
updateTankChart();
}
function updateTankChart(){
const rin=parseFloat(document.getElementById('tankRin').value);
const cin=parseFloat(document.getElementById('tankCin').value);
const rout=parseFloat(document.getElementById('tankRout').value);
const A0=parseFloat(document.getElementById('tankA0').value);
const V0=parseFloat(document.getElementById('tankV0').value);
document.getElementById('tankRinVal').textContent=rin;
document.getElementById('tankCinVal').textContent=cin;
document.getElementById('tankRoutVal').textContent=rout;
document.getElementById('tankA0Val').textContent=A0;
document.getElementById('tankV0Val').textContent=V0;
// Euler method for dA/dt = cin*rin - A/V*rout, V=V0+(rin-rout)*t
const dt=0.1;
const labels=[],data=[];
let A=A0;
const tMax=60;
for(let t=0;t<=tMax;t+=dt){
if(t%1<dt){labels.push(t.toFixed(0));data.push(A);}
const V=V0+(rin-rout)*t;
if(V<=0)break;
const dA=(cin*rin-A/V*rout)*dt;
A+=dA;
if(A<0)A=0;
}
// Tank visual: water height proportional to final volume ratio
const Vfinal=V0+(rin-rout)*tMax;
const hPct=Math.min(95,Math.max(10,(Vfinal/V0)*60));
const tankWater=document.getElementById('tankWater');
tankWater.style.height=hPct+'%';
// color based on concentration
const finalConc=A/Math.max(Vfinal,1);
const blue=Math.min(255,Math.round(finalConc*300));
tankWater.style.background='rgba(37,99,'+Math.max(100,blue)+','+(0.2+finalConc*0.5)+')';

// Steady state for equal rates
let steadyData=null;
if(Math.abs(rin-rout)<0.01){
const Ass=cin*V0;// steady state: cin*rin/(rout/V0) = cin*V0 when rin=rout
steadyData=Array(labels.length).fill(Ass);
}
tankChart.data.labels=labels;
const datasets=[{label:'용질량 A(t)',data:data,borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.1)',fill:true,tension:.4,pointRadius:0}];
if(steadyData){
datasets.push({label:'정상 상태 A='+steadyData[0].toFixed(1),data:steadyData,borderColor:'#ef4444',borderDash:[5,5],pointRadius:0});
}
tankChart.data.datasets=datasets;
tankChart.update();
}

document.querySelectorAll('.quiz-question').forEach(q=>{

}
}else{
total++;
const sel=q.querySelector('.quiz-option.selected');
if(sel){
const val=sel.dataset.val;

score++;sel.classList.add('correct');
fb.className='quiz-feedback show correct-fb';fb.textContent='정답입니다!';

sel.classList.add('wrong');
q.querySelector('.quiz-option[data-val="'+answer+'"]').classList.add('correct');
fb.className='quiz-feedback show wrong-fb';fb.textContent='오답입니다. 정답을 확인하세요.';

q.querySelector('.quiz-option[data-val="'+answer+'"]').classList.add('correct');
}
}
});

  <div class="card">
    <h2>1. 왜 미분방정식인가?</h2>
    <p>인구 $P(t)$는 시간에 따라 연속적으로 변합니다. 어떤 순간의 인구 변화율

    은 그 순간의 인구 $P$에 의존합니다. 이 관계를 수식으로 적으면 <strong>미분방정식</strong>이 됩니다.</p>

    <div class="highlight highlight-green">

      <p>"변화율 = (현재 상태의 함수)" 형태의 관계를 발견하면, 그것이 곧 미분방정식이다.</p>

      <li><strong>세균 배양:</strong> 영양분이 충분할 때 세균 수는 현재 수에 비례하여 증가</li>
      <li><strong>방사성 붕괴:</strong> 남은 원자 수에 비례하여 감소 (음의 성장률)</li>
      <li><strong>도시 인구:</strong> 자원 한계로 인해 성장이 둔화되는 S자형 곡선</li>

  <div class="card">
    <h2>2. 맬서스(Malthus) 모형 — 지수 성장</h2>

    <h3>가정</h3>
    <p>"인구의 변화율은 현재 인구에 정비례한다."</p>

    <h3>모형화 과정</h3>
    <div class="step">
      <div class="step-label">Step 1: 변수 정의</div>
      <p>$P(t)$ = 시간 $t$에서의 인구, $k$ = 비례상수(성장률)</p>
    </div>
    <div class="step">
      <div class="step-label">Step 2: 미분방정식 수립</div>
      <div class="math-block">$$\frac{dP}{dt} = kP$$</div>
    </div>
    <div class="step">
      <div class="step-label">Step 3: 변수분리법으로 풀기</div>
      <div class="math-block">$$\frac{dP}{P} = k\,dt \quad\Rightarrow\quad \int\frac{1}{P}\,dP = \int k\,dt \quad\Rightarrow\quad \ln|P| = kt + C$$</div>
    </div>
    <div class="step">
      <div class="step-label">Step 4: 일반해</div>
      <div class="math-block">$$P(t) = P_0\,e^{kt} \quad (P_0 = P(0)\text{: 초기 인구})$$</div>
    </div>

    <div class="highlight highlight-red">
      <div class="highlight-title">맬서스 모형의 한계</div>
      <p>$k > 0$이면 $P(t) \to \infty$ (무한 성장), $k &lt; 0$이면 $P(t) \to 0$ (멸종).<br>
      현실에서는 자원 제한으로 무한 성장이 불가능 → <strong>로지스틱 모형</strong>이 필요합니다.</p>
    </div>
  </div>

  <!-- 1-3. 로지스틱 모형 -->
  <div class="card">
    <h2>3. 로지스틱(Logistic) 모형 (심화)</h2>

    <h3>아이디어</h3>
    <p>인구가 환경 수용력(Carrying Capacity) $K$에 가까워질수록 성장이 둔화됩니다.</p>
    <p>성장률에 <strong>억제 인자</strong> $(1 - P/K)$를 곱합니다:</p>

    <ul style="padding-left:24px; margin: 10px 0;">
      <li>$P \ll K$ 일 때: $(1 - P/K) \approx 1$ → 맬서스와 유사한 지수 성장</li>
      <li>$P \to K$ 일 때: $(1 - P/K) \to 0$ → 성장 정지</li>
      <li>$P > K$ 일 때: $(1 - P/K) &lt; 0$ → 인구 감소</li>
    </ul>

    <div class="math-block">$$\frac{dP}{dt} = kP\left(1 - \frac{P}{K}\right)$$</div>

    <h3>해 유도 (변수분리법)</h3>
    <div class="step">
      <div class="step-label">Step 1: 변수 분리</div>
      <div class="math-block">$$\frac{dP}{P(1 - P/K)} = k\,dt$$</div>
    </div>
    <div class="step">
      <div class="step-label">Step 2: 부분분수 분해</div>
      <div class="math-block">$$\frac{1}{P(1 - P/K)} = \frac{1}{P} + \frac{1/K}{1 - P/K}$$</div>
    </div>
    <div class="step">
      <div class="step-label">Step 3: 양변 적분 후 정리</div>
      <div class="math-block">$$\ln|P| - \ln|1 - P/K| = kt + C$$</div>
    </div>
    <div class="step">
      <div class="step-label">Step 4: 일반해</div>
      <div class="math-block">$$P(t) = \frac{K}{1 + Ae^{-kt}} \quad \text{여기서 } A = \frac{K - P_0}{P_0}$$</div>
    </div>

    <div class="highlight highlight-blue">
      <div class="highlight-title">로지스틱 해의 특성</div>
      <ul style="padding-left: 20px;">
        <li>$t \to \infty$ 일 때 $P(t) \to K$ (수용력에 수렴)</li>
        <li>$P = K/2$ 에서 <strong>변곡점</strong> — 성장 속도가 최대</li>
        <li>S자형(시그모이드) 곡선</li>
      </ul>
    </div>
  </div>

  <!-- 1-4. 위상선 분석 -->
  <div class="card">
    <h2>4. 위상선(Phase Line) 분석</h2>
    <p>$dP/dt = f(P)$의 부호를 $P$축 위에 표시하여 평형점의 안정성을 판단합니다.</p>

    <div class="highlight highlight-green">
      <div class="highlight-title">로지스틱 모형의 평형점</div>
      <p>$dP/dt = kP(1 - P/K) = 0$ → <strong>$P = 0$</strong> (불안정) 과 <strong>$P = K$</strong> (안정)</p>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvasPhase" width="700" height="300"></canvas>
    </div>
    <p style="text-align:center; color:var(--text-light); font-size:0.9em;">
      P = 0 근방에서 화살표가 밖으로(불안정), P = K 근방에서 화살표가 안으로(안정)
    </p>
  </div>

  <!-- 1-5. 인터랙티브 그래프 -->
  <div class="card">
    <h2>5. 인터랙티브 시뮬레이션</h2>
    <p>슬라이더를 조절하며 맬서스 모형(파란 점선)과 로지스틱 모형(빨간 실선)을 비교하세요.</p>

    <div class="controls-panel">
      <div class="control-row">
        <label>성장률 k =</label>
        <input type="range" id="pop-k" min="0.05" max="2" step="0.05" value="0.5">
        <span class="val" id="pop-k-val">0.50</span>
      </div>
      <div class="control-row">
        <label>수용력 K =</label>
        <input type="range" id="pop-K" min="50" max="2000" step="50" value="1000">
        <span class="val" id="pop-K-val">1000</span>
      </div>
      <div class="control-row">
        <label>초기 인구 P<sub>0</sub> =</label>
        <input type="range" id="pop-P0" min="1" max="500" step="1" value="10">
        <span class="val" id="pop-P0-val">10</span>
      </div>
      <div class="control-row">
        <label>시간 범위 T =</label>
        <input type="range" id="pop-T" min="5" max="50" step="1" value="20">
        <span class="val" id="pop-T-val">20</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvasPop" width="800" height="450"></canvas>
    </div>

    <div id="pop-info" class="highlight highlight-blue" style="font-size:0.95em;"></div>
  </div>

  <!-- 1-6. 실전 문제 -->
  <div class="card">
    <h2>6. 실전 문제</h2>

    <div class="problem" onclick="this.classList.toggle('open')">
      <div class="problem-header">예제 1: 세균 배양 (맬서스)</div>
      <div class="problem-body" onclick="event.stopPropagation()">
        <p><strong>문제:</strong> 초기 세균 수 200마리, 3시간 후 800마리. 10시간 후 세균 수는?</p>
        <div class="step">
          <div class="step-label">Step 1: 모형 설정</div>
          <p>$P(t) = P_0 e^{kt}$, $P_0 = 200$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 2: k 결정</div>
          <p>$P(3) = 200e^{3k} = 800$<br>
          $e^{3k} = 4 \;\Rightarrow\; 3k = \ln 4 \;\Rightarrow\; k = (\ln 4)/3 \approx 0.4621$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 3: 답 계산</div>
          <p>$P(10) = 200 \cdot e^{0.4621 \times 10} = 200 \cdot e^{4.621} \approx 200 \times 101.6 \approx$ <strong>20,320마리</strong></p>
        </div>
      </div>
    </div>

    <div class="problem" onclick="this.classList.toggle('open')">
      <div class="problem-header">예제 2: 도시 인구 (로지스틱)</div>
      <div class="problem-body" onclick="event.stopPropagation()">
        <p><strong>문제:</strong> 도시 수용력 $K = 50{,}000$명, 현재 인구 $P_0 = 10{,}000$명, 성장률 $k = 0.03$/년. 50년 후 인구는?</p>
        <div class="step">
          <div class="step-label">Step 1: 상수 A 계산</div>
          <p>$A = (K - P_0)/P_0 = (50000 - 10000)/10000 = 4$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 2: 공식 대입</div>
          <p>$P(50) = 50000/(1 + 4 \cdot e^{-0.03 \times 50}) = 50000/(1 + 4 \cdot e^{-1.5}) = 50000/(1 + 4 \times 0.2231)$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 3: 답 계산</div>
          <p>$P(50) = 50000/1.8925 \approx$ <strong>26,420명</strong></p>
        </div>
      </div>
    </div>

    <div class="problem" onclick="this.classList.toggle('open')">
      <div class="problem-header">예제 3: 변곡점 찾기</div>
      <div class="problem-body" onclick="event.stopPropagation()">
        <p><strong>문제:</strong> 로지스틱 모형에서 인구 증가 속도가 최대인 시점은?</p>
        <div class="step">
          <div class="step-label">Step 1: 조건 설정</div>
          <p>인구 증가 속도 $dP/dt$가 최대 → $d^2P/dt^2 = 0$ 인 점</p>
        </div>
        <div class="step">
          <div class="step-label">Step 2: 이계도함수</div>
          <p>$dP/dt = kP(1-P/K)$이므로<br>
          $d^2P/dt^2 = k(dP/dt)(1-P/K) + kP(-1/K)(dP/dt) = k(dP/dt)(1 - 2P/K) = 0$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 3: 결론</div>
          <p>$dP/dt \ne 0$ 이므로 $1 - 2P/K = 0$ → $\boldsymbol{P = K/2}$<br>
          인구가 수용력의 절반일 때 증가 속도가 최대입니다.<br>
          이때의 시간: $t = \ln(A)/k$</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ==================== PART 2: MASS-SPRING-DAMPER ==================== -->
<div id="sec-spring" class="section">
  <div class="hero" style="background: linear-gradient(135deg, #dc2626, #ea580c);">
    <h1>2부: 질량-스프링-댐퍼 시스템</h1>
    <p>2계 상미분방정식(ODE)으로 기계적 진동을 모형화합니다</p>
  </div>

  <!-- 2-1. 물리적 배경 -->
  <div class="card">
    <h2>1. 물리적 배경 및 모형화</h2>

    <h3>시스템 구성 요소</h3>
    <table>
      <tr><th>요소</th><th>기호</th><th>단위</th><th>역할</th><th>힘</th></tr>
      <tr><td>질량(Mass)</td><td>$m$</td><td>kg</td><td>관성</td><td>$F = ma = mx''$</td></tr>
      <tr><td>스프링(Spring)</td><td>$k$</td><td>N/m</td><td>복원력</td><td>$F = -kx$ (후크 법칙)</td></tr>
      <tr><td>댐퍼(Damper)</td><td>$c$</td><td>Ns/m</td><td>저항력(마찰)</td><td>$F = -cx'$</td></tr>
      <tr><td>외력(Force)</td><td>$F(t)$</td><td>N</td><td>외부 구동력</td><td>$F(t)$</td></tr>
    </table>

    <h3>뉴턴 제2법칙 적용</h3>
    <div class="step">
      <div class="step-label">Step 1: 힘의 합 = ma</div>
      <div class="math-block">$$mx'' = -kx - cx' + F(t)$$</div>
    </div>
    <div class="step">
      <div class="step-label">Step 2: 표준형 정리</div>
      <div class="math-block">$$mx'' + cx' + kx = F(t)$$</div>
      <p style="margin-top:8px;">이것이 <strong>2계 선형 상미분방정식</strong>의 표준형입니다.</p>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvasSchematic" width="700" height="220"></canvas>
    </div>
    <p style="text-align:center; color:var(--text-light); font-size:0.9em;">질량-스프링-댐퍼 시스템 개략도</p>
  </div>

  <!-- 2-2. 자유 진동 -->
  <div class="card">
    <h2>2. 자유 진동 (F(t) = 0)</h2>
    <div class="math-block">$$mx'' + cx' + kx = 0$$</div>

    <h3>특성방정식</h3>
    <p>$x = e^{rt}$를 대입하면:</p>
    <div class="math-block">$$mr^2 + cr + k = 0 \quad\Rightarrow\quad r = \frac{-c \pm \sqrt{c^2 - 4mk}}{2m}$$</div>

    <div class="highlight highlight-blue">
      <div class="highlight-title">판별식: $\Delta = c^2 - 4mk$</div>
      <p>판별식의 부호가 시스템의 거동을 완전히 결정합니다!</p>
    </div>

    <div class="case-tabs">
      <button class="case-tab active" onclick="showCase(0)">비감쇠 (c=0)</button>
      <button class="case-tab" onclick="showCase(1)">저감쇠 (Δ&lt;0)</button>
      <button class="case-tab" onclick="showCase(2)">임계감쇠 (Δ=0)</button>
      <button class="case-tab" onclick="showCase(3)">과감쇠 (Δ&gt;0)</button>
    </div>

    <div class="case-content active" id="case-0">
      <h3>비감쇠 (c = 0): 단순 조화 운동</h3>
      <div class="math-block">$$mx'' + kx = 0 \;\;\Rightarrow\;\; r = \pm\,i\omega_0, \quad \omega_0 = \sqrt{k/m}$$</div>
      <div class="math-block">$$\text{해: } x(t) = C_1\cos(\omega_0 t) + C_2\sin(\omega_0 t)$$</div>
      <p>영원히 진동하며 에너지 손실이 없습니다. 고유진동수 $\omega_0$로 진동합니다.</p>
    </div>
    <div class="case-content" id="case-1">
      <h3>저감쇠 ($c^2 &lt; 4mk$): 감쇠 진동</h3>
      <div class="math-block">$$r = -\frac{c}{2m} \pm i\omega_d, \quad \omega_d = \frac{\sqrt{4mk - c^2}}{2m}$$</div>
      <div class="math-block">$$\text{해: } x(t) = e^{-ct/(2m)}\bigl[C_1\cos(\omega_d t) + C_2\sin(\omega_d t)\bigr]$$</div>
      <p>진동하면서 점점 줄어들어 0에 수렴합니다. 가장 흔한 현실 시스템.</p>
    </div>
    <div class="case-content" id="case-2">
      <h3>임계감쇠 ($c^2 = 4mk$): 진동 없이 가장 빠른 복귀</h3>
      <div class="math-block">$$r = -\frac{c}{2m} \;\text{(중근)} \quad\Rightarrow\quad c_{cr} = 2\sqrt{mk}$$</div>
      <div class="math-block">$$\text{해: } x(t) = (C_1 + C_2 t)\,e^{-ct/(2m)}$$</div>
      <p>진동 없이 가장 빠르게 평형으로 돌아옵니다. 문닫기 장치, 자동차 서스펜션의 이상적 설계.</p>
    </div>
    <div class="case-content" id="case-3">
      <h3>과감쇠 ($c^2 > 4mk$): 느린 비진동 복귀</h3>
      <div class="math-block">$$r_{1,2} = \frac{-c \pm \sqrt{c^2 - 4mk}}{2m} \quad \text{(두 음의 실근)}$$</div>
      <div class="math-block">$$\text{해: } x(t) = C_1 e^{r_1 t} + C_2 e^{r_2 t}$$</div>
      <p>진동 없이 천천히 평형으로 돌아옵니다. 댐핑이 과도한 경우.</p>
    </div>
  </div>

  <!-- 2-3. 강제 진동 -->
  <div class="card">
    <h2>3. 강제 진동 ($F(t) = F_0\cos(\omega t)$)</h2>
    <div class="math-block">$$mx'' + cx' + kx = F_0\cos(\omega t)$$</div>

    <h3>일반해 = 제차해(보해) + 특수해</h3>

    <div class="step">
      <div class="step-label">보해 (Complementary Solution)</div>
      <p>위의 자유 진동 해 ($c > 0$일 때 시간이 지나면 감쇠되어 사라짐 → <strong>과도 응답</strong>, $c = 0$이면 사라지지 않음)</p>
    </div>
    <div class="step">
      <div class="step-label">특수해 (Particular Solution) — 미정계수법</div>
      <p>$x_p = A\cos(\omega t) + B\sin(\omega t)$ 형태를 가정하고 대입하여 $A$, $B$를 결정합니다.</p>
      <div class="math-block">$$\text{진폭: } R = \frac{F_0}{\sqrt{(k - m\omega^2)^2 + (c\omega)^2}}$$</div>
    </div>

    <div class="highlight highlight-red">
      <div class="highlight-title">공진(Resonance) 현상</div>
      <p>외력의 진동수 $\omega$가 고유진동수 $\omega_0 = \sqrt{k/m}$에 가까워지면 진폭 $R$이 급격히 커집니다!<br>
      $c = 0$이면 $\omega = \omega_0$에서 <strong>진폭이 무한대</strong> → 구조물 파괴 위험<br>
      <span style="font-size:0.9em; color:#64748b;">※ 타코마 내로우즈 교량(1940) 붕괴는 교재에서 공진 사례로 자주 인용되나, 실제 원인은 바람과 구조물의 상호작용에 의한 공기역학적 플러터(aeroelastic flutter)로 밝혀졌습니다.</span></p>
    </div>
  </div>

  <!-- 2-4. 인터랙티브 시뮬레이션 -->
  <div class="card">
    <h2>4. 인터랙티브 시뮬레이션</h2>
    <p>파라미터를 조절하며 시스템의 거동 변화를 관찰하세요.</p>

    <div class="controls-panel">
      <div class="control-row">

      </div>
      <div class="control-row">
        <label>스프링 상수 k (N/m) =</label>
        <input type="range" id="sp-k" min="1" max="100" step="1" value="20">
        <span class="val" id="sp-k-val">20</span>
      </div>
      <div class="control-row">
        <label>외력 진폭 F<sub>0</sub> (N) =</label>
        <input type="range" id="sp-F" min="0" max="50" step="1" value="0">
        <span class="val" id="sp-F-val">0</span>
      </div>
      <div class="control-row">
        <label>외력 진동수 &omega; (rad/s) =</label>
        <input type="range" id="sp-w" min="0.1" max="15" step="0.1" value="3">
        <span class="val" id="sp-w-val">3.0</span>
      </div>
      <div class="control-row">
        <label>초기 변위 $x(0)$ =</label>
        <input type="range" id="sp-x0" min="-3" max="3" step="0.1" value="1">
        <span class="val" id="sp-x0-val">1.0</span>
      </div>
      <div class="control-row">
        <label>초기 속도 $x'(0)$ =</label>
        <input type="range" id="sp-v0" min="-10" max="10" step="0.5" value="0">
        <span class="val" id="sp-v0-val">0.0</span>
      </div>
    </div>

    <div class="spring-sim">

    <div class="problem" onclick="this.classList.toggle('open')">
      <div class="problem-header">예제 1: 자유 비감쇠 진동</div>
      <div class="problem-body" onclick="event.stopPropagation()">
        <p><strong>문제:</strong> $m = 4$kg, $k = 36$ N/m, $c = 0$. $x(0) = 0.5$m, $x'(0) = 0$. $x(t)$를 구하라.</p>
        <div class="step">
          <div class="step-label">Step 1: 특성방정식</div>
          <p>$4r^2 + 36 = 0 \;\Rightarrow\; r^2 = -9 \;\Rightarrow\; r = \pm 3i$</p>
          <p>$\omega_0 = 3$ rad/s</p>
        </div>
        <div class="step">
          <div class="step-label">Step 2: 일반해</div>
          <p>$x(t) = C_1\cos(3t) + C_2\sin(3t)$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 3: 초기조건 적용</div>
          <p>$x(0) = C_1 = 0.5$<br>
          $x'(t) = -3C_1\sin(3t) + 3C_2\cos(3t)$<br>
          $x'(0) = 3C_2 = 0 \;\Rightarrow\; C_2 = 0$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 4: 최종 답</div>
          <p><strong>$x(t) = 0.5\cos(3t)$</strong><br>
          진폭 0.5m, 주기 $T = 2\pi/3 \approx 2.09$초</p>
        </div>
      </div>
    </div>

    <div class="problem" onclick="this.classList.toggle('open')">
      <div class="problem-header">예제 2: 저감쇠 자유 진동</div>
      <div class="problem-body" onclick="event.stopPropagation()">
        <p><strong>문제:</strong> $m = 1$kg, $c = 2$ Ns/m, $k = 5$ N/m. $x(0) = 1$, $x'(0) = 0$. 감쇠 유형과 $x(t)$를 구하라.</p>
        <div class="step">
          <div class="step-label">Step 1: 판별식</div>
          <p>$\Delta = c^2 - 4mk = 4 - 20 = -16 &lt; 0$ → <strong>저감쇠</strong></p>
        </div>
        <div class="step">
          <div class="step-label">Step 2: 근 계산</div>
          <p>$r = (-2 \pm \sqrt{-16})/2 = -1 \pm 2i$<br>
          $\alpha = 1$ (감쇠율), $\omega_d = 2$ (감쇠 진동수)</p>
        </div>
        <div class="step">
          <div class="step-label">Step 3: 일반해</div>
          <p>$x(t) = e^{-t}[C_1\cos(2t) + C_2\sin(2t)]$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 4: 초기조건</div>
          <p>$x(0) = C_1 = 1$<br>
          $x'(t) = e^{-t}[(-C_1 + 2C_2)\cos(2t) + (-2C_1 - C_2)\sin(2t)]$<br>
          $x'(0) = -C_1 + 2C_2 = 0 \;\Rightarrow\; C_2 = 0.5$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 5: 최종 답</div>
          <p><strong>$x(t) = e^{-t}[\cos(2t) + 0.5\sin(2t)]$</strong></p>
        </div>
      </div>
    </div>

    <div class="problem" onclick="this.classList.toggle('open')">
      <div class="problem-header">예제 3: 강제 진동과 공진</div>
      <div class="problem-body" onclick="event.stopPropagation()">
        <p><strong>문제:</strong> $m = 2$kg, $c = 0$, $k = 18$ N/m, $F(t) = 10\cos(\omega t)$. 공진 진동수와 그 때의 위험성을 설명하라.</p>
        <div class="step">
          <div class="step-label">Step 1: 고유진동수</div>
          <p>$\omega_0 = \sqrt{k/m} = \sqrt{18/2} = 3$ rad/s</p>
        </div>
        <div class="step">
          <div class="step-label">Step 2: 정상 상태 진폭</div>
          <p>$R = F_0 / |k - m\omega^2| = 10 / |18 - 2\omega^2|$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 3: 공진 조건</div>
          <p>$\omega = \omega_0 = 3$ 일 때 분모 $= 0$ → $R \to \infty$<br>
          <strong>비감쇠 시스템에서 공진은 진폭이 시간에 비례하여 무한히 증가합니다.</strong><br>
          $x_p(t) = \dfrac{F_0 t}{2m\omega_0}\sin(\omega_0 t) = \dfrac{5t}{6}\sin(3t)$</p>
        </div>
        <div class="step">
          <div class="step-label">Step 4: 공학적 의미</div>
          <p>실제 시스템에서는 반드시 감쇠($c > 0$)를 도입하거나, 구동 진동수를 고유진동수에서 멀리 떨어뜨려 공진을 회피해야 합니다.</p>
        </div>
      </div>
    </div>
  </div>
</div>
