<script>
// ===== Navigation =====
function showSection(id, btn) {
  // Stop spring animation when leaving spring section
  if (springAnimId) { cancelAnimationFrame(springAnimId); springAnimId = null; }
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window.scrollTo({top: 0, behavior: 'smooth'});
  if (id === 'pop') { drawPhase(); drawPopGraph(); }
  if (id === 'spring') { drawSchematic(); drawSpring(); drawResonance(); }
}

// ===== Damping case tabs =====
function showCase(idx) {
  document.querySelectorAll('.case-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.case-content').forEach((c,i) => c.classList.toggle('active', i===idx));
}

// ===== Canvas helpers =====
function clearCanvas(ctx, w, h) {
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w, h);
}

// ===== 1. POPULATION GRAPH =====
function drawPopGraph() {
  const canvas = document.getElementById('canvasPop');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  clearCanvas(ctx, W, H);

  const k = parseFloat(document.getElementById('pop-k').value);
  const K = parseFloat(document.getElementById('pop-K').value);
  const P0 = parseFloat(document.getElementById('pop-P0').value);
  const T = parseFloat(document.getElementById('pop-T').value);

  // Update display
  document.getElementById('pop-k-val').textContent = k.toFixed(2);
  document.getElementById('pop-K-val').textContent = K;
  document.getElementById('pop-P0-val').textContent = P0;
  document.getElementById('pop-T-val').textContent = T;

  const margin = {top: 40, right: 30, bottom: 50, left: 70};
  const gw = W - margin.left - margin.right;
  const gh = H - margin.top - margin.bottom;

  // Compute max P for y-axis
  const malthusMax = P0 * Math.exp(k * T);
  const yMax = Math.max(K * 1.3, Math.min(malthusMax, K * 5), P0 * 1.3);

  function tx(t) { return margin.left + (t / T) * gw; }
  function ty(p) { return margin.top + gh - (p / yMax) * gh; }

  // Grid
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const yy = margin.top + (i / 5) * gh;
    ctx.beginPath(); ctx.moveTo(margin.left, yy); ctx.lineTo(W - margin.right, yy); ctx.stroke();
    ctx.fillStyle = '#64748b'; ctx.font = '12px Consolas';
    ctx.textAlign = 'right';
    ctx.fillText(((5-i)/5 * yMax).toFixed(0), margin.left - 8, yy + 4);
  }
  for (let i = 0; i <= 5; i++) {
    const xx = margin.left + (i / 5) * gw;
    ctx.beginPath(); ctx.moveTo(xx, margin.top); ctx.lineTo(xx, margin.top + gh); ctx.stroke();
    ctx.fillStyle = '#64748b'; ctx.textAlign = 'center';
    ctx.fillText((i/5 * T).toFixed(1), xx, margin.top + gh + 20);
  }

  // Axes
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(margin.left, margin.top); ctx.lineTo(margin.left, margin.top + gh); ctx.lineTo(W - margin.right, margin.top + gh); ctx.stroke();
  ctx.fillStyle = '#334155'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('t (시간)', margin.left + gw/2, H - 8);
  ctx.save(); ctx.translate(16, margin.top + gh/2); ctx.rotate(-Math.PI/2); ctx.fillText('P(t) (인구)', 0, 0); ctx.restore();

  // Carrying capacity line
  if (K <= yMax) {
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1; ctx.setLineDash([8, 4]);
    ctx.beginPath(); ctx.moveTo(margin.left, ty(K)); ctx.lineTo(W - margin.right, ty(K)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#64748b'; ctx.font = '13px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('K = ' + K, W - margin.right - 60, ty(K) - 6);
  }

  const dt = T / 500;

  // Clip to graph area so curves don't flatten at edges
  ctx.save();
  ctx.beginPath();
  ctx.rect(margin.left, margin.top, gw, gh);
  ctx.clip();

  // Malthus curve (blue dashed)
  ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2.5; ctx.setLineDash([8, 5]);
  ctx.beginPath();
  for (let i = 0; i <= 500; i++) {
    const t = i * dt;
    const p = P0 * Math.exp(k * t);
    if (i === 0) ctx.moveTo(tx(t), ty(p)); else ctx.lineTo(tx(t), ty(p));
    if (p > yMax * 2) break;
  }
  ctx.stroke(); ctx.setLineDash([]);

  // Logistic curve (red solid)
  const A = (K - P0) / P0;
  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i <= 500; i++) {
    const t = i * dt;
    const p = K / (1 + A * Math.exp(-k * t));
    if (i === 0) ctx.moveTo(tx(t), ty(p)); else ctx.lineTo(tx(t), ty(p));
  }
  ctx.stroke();

  ctx.restore(); // remove clip

  // Inflection point
  const tInf = (A > 0) ? Math.log(A) / k : -1;
  if (tInf > 0 && tInf < T) {
    const pInf = K / 2;
    ctx.fillStyle = '#dc2626';
    ctx.beginPath(); ctx.arc(tx(tInf), ty(pInf), 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#dc2626'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('변곡점 (K/2)', tx(tInf) + 10, ty(pInf) - 8);
  }

  // Legend
  ctx.font = '13px sans-serif';
  const lx = margin.left + 20, ly = margin.top + 20;
  ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2.5; ctx.setLineDash([8, 5]);
  ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 30, ly); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = '#2563eb'; ctx.textAlign = 'left'; ctx.fillText('Malthus: P=P₀eᵏᵗ', lx + 36, ly + 4);

  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(lx, ly + 22); ctx.lineTo(lx + 30, ly + 22); ctx.stroke();
  ctx.fillStyle = '#dc2626'; ctx.fillText('Logistic: P=K/(1+Ae⁻ᵏᵗ)', lx + 36, ly + 26);

  // Info box
  const info = document.getElementById('pop-info');
  const halfTime = (A > 0) ? (Math.log(A) / k).toFixed(2) : 'N/A';
  info.innerHTML = `<strong>현재 설정:</strong>
    P₀ = ${P0}, k = ${k.toFixed(2)}, K = ${K} |
    A = ${A.toFixed(2)} | 변곡점 시간 t = ${halfTime} |
    P(${T}) &approx; ${(K / (1 + A * Math.exp(-k * T))).toFixed(1)} (로지스틱)`;
}

// ===== Phase Line =====
function drawPhase() {
  const canvas = document.getElementById('canvasPhase');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  clearCanvas(ctx, W, H);

  const K = parseFloat(document.getElementById('pop-K').value) || 1000;
  const kVal = parseFloat(document.getElementById('pop-k').value) || 0.5;

  // Layout: top area for f(P) graph, bottom area for phase line
  const mx = 80, len = W - 140;
  const phaseY = H - 60;        // P axis (phase line) position
  const graphBase = H - 120;    // f(P)=0 baseline
  const graphPeak = 40;         // top of f(P) graph area

  // Equilibrium positions on P axis
  const x0 = mx + len * 0.15;
  const xK = mx + len * 0.75;

  // --- f(P) Graph Area ---

  // f(P) = 0 baseline (dashed)
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x0, graphBase); ctx.lineTo(mx + len, graphBase); ctx.stroke();
  ctx.setLineDash([]);

  // Vertical guides from P=0 and P=K (dashed)
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x0, graphBase + 4); ctx.lineTo(x0, graphPeak); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(xK, graphBase + 4); ctx.lineTo(xK, graphPeak); ctx.stroke();
  ctx.setLineDash([]);

  // f(P) axis label
  ctx.fillStyle = '#ea580c'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('f(P)', mx - 10, graphBase - (graphBase - graphPeak) / 2);

  // f(P) = 0 label
  ctx.fillStyle = '#94a3b8'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('0', mx + len + 8, graphBase + 4);

  // f(P) curve
  ctx.strokeStyle = '#ea580c'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  const steps = 200;
  const graphH = graphBase - graphPeak - 10;
  for (let i = 0; i <= steps; i++) {
    const P = (i / steps) * K * 1.3;
    const x = x0 + (P / K) * (xK - x0);
    const fp = kVal * P * (1 - P / K);
    const fpMax = kVal * K / 4;
    const y = graphBase - (fp / fpMax) * graphH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Peak label: f(K/2) = kK/4
  const peakX = x0 + 0.5 * (xK - x0);
  ctx.fillStyle = '#ea580c'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('f(P) = kP(1−P/K)', peakX, graphPeak - 4);

  // "+" and "−" signs on curve regions
  ctx.font = 'bold 18px sans-serif'; ctx.fillStyle = '#ea580c';
  ctx.fillText('+', peakX, graphBase - graphH * 0.35);
  const negX = x0 + 1.15 * (xK - x0);
  ctx.fillText('−', negX, graphBase + 18);

  // --- Phase Line (P axis) ---

  // P axis
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(mx, phaseY); ctx.lineTo(mx + len + 10, phaseY); ctx.stroke();
  // Arrowhead on P axis
  ctx.fillStyle = '#334155';
  ctx.beginPath();
  ctx.moveTo(mx + len + 10, phaseY);
  ctx.lineTo(mx + len, phaseY - 5);
  ctx.lineTo(mx + len, phaseY + 5);
  ctx.closePath(); ctx.fill();
  ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('P', mx + len + 14, phaseY + 5);

  // Equilibrium dots
  function drawDot(x, label, stable) {
    ctx.beginPath(); ctx.arc(x, phaseY, 8, 0, Math.PI * 2);
    ctx.fillStyle = stable ? '#16a34a' : '#dc2626';
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#334155'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(label, x, phaseY + 26);
    ctx.font = '11px sans-serif';
    ctx.fillStyle = stable ? '#16a34a' : '#dc2626';
    ctx.fillText(stable ? '(안정)' : '(불안정)', x, phaseY + 40);
  }

  drawDot(x0, 'P = 0', false);
  drawDot(xK, 'P = K', true);

  // Direction arrows on phase line
  function drawArrow(x1, x2) {
    ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x1, phaseY); ctx.lineTo(x2, phaseY); ctx.stroke();
    const dir = x2 > x1 ? 1 : -1;
    ctx.fillStyle = '#2563eb';
    ctx.beginPath();
    ctx.moveTo(x2, phaseY);
    ctx.lineTo(x2 - dir * 10, phaseY - 6);
    ctx.lineTo(x2 - dir * 10, phaseY + 6);
    ctx.closePath(); ctx.fill();
  }

  // Between 0 and K: arrows going right (dP/dt > 0)
  const seg1 = x0 + 18, seg2 = xK - 18;
  const segMid = (seg1 + seg2) / 2;
  drawArrow(seg1, segMid - 5);
  drawArrow(segMid + 5, seg2);

  // Right of K: arrow going left (dP/dt < 0)
  drawArrow(xK + 55, xK + 18);
}

// ===== SPRING SCHEMATIC =====
function drawSchematic() {
  const canvas = document.getElementById('canvasSchematic');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  clearCanvas(ctx, W, H);

  // Wall
  ctx.fillStyle = '#94a3b8';
  ctx.fillRect(40, 40, 12, 140);
  for (let i = 0; i < 7; i++) {
    ctx.beginPath(); ctx.moveTo(40, 40 + i * 20); ctx.lineTo(28, 52 + i * 20);
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2; ctx.stroke();
  }

  const wallX = 52, massX = 380, massW = 80, massH = 60;
  const midY = 80, botY = 140;

  // Spring (top path)
  ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(wallX, midY);
  const springStart = wallX + 20, springEnd = massX - 20;
  const coils = 10;
  const coilW = (springEnd - springStart) / coils;
  ctx.lineTo(springStart, midY);
  for (let i = 0; i < coils; i++) {
    ctx.lineTo(springStart + coilW * i + coilW * 0.25, midY - 12);
    ctx.lineTo(springStart + coilW * i + coilW * 0.75, midY + 12);
    ctx.lineTo(springStart + coilW * (i + 1), midY);
  }
  ctx.lineTo(massX, midY);
  ctx.stroke();
  ctx.fillStyle = '#2563eb'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('k', (wallX + massX) / 2, midY - 22);

  // Damper (bottom path)
  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2.5;
  const dMid = (wallX + massX) / 2;
  ctx.beginPath(); ctx.moveTo(wallX, botY); ctx.lineTo(dMid - 40, botY); ctx.stroke();
  // Piston
  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2;
  ctx.strokeRect(dMid - 40, botY - 15, 50, 30);
  ctx.beginPath(); ctx.moveTo(dMid + 10, botY); ctx.lineTo(dMid + 40, botY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(dMid - 15, botY - 15); ctx.lineTo(dMid - 15, botY + 15); ctx.lineWidth = 3; ctx.stroke();
  ctx.beginPath(); ctx.moveTo(dMid + 40, botY); ctx.lineTo(massX, botY); ctx.lineWidth = 2.5; ctx.stroke();
  ctx.fillStyle = '#dc2626'; ctx.font = 'bold 16px sans-serif';
  ctx.fillText('c', dMid, botY + 35);

  // Mass
  ctx.fillStyle = '#334155';
  ctx.fillRect(massX, midY - 30, massW, massH + 40);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 18px sans-serif';
  ctx.fillText('m', massX + massW / 2, midY + 25);

  // Force arrow
  ctx.strokeStyle = '#ea580c'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(massX + massW + 10, midY + 15); ctx.lineTo(massX + massW + 70, midY + 15); ctx.stroke();
  ctx.fillStyle = '#ea580c';
  ctx.beginPath(); ctx.moveTo(massX + massW + 70, midY + 15);
  ctx.lineTo(massX + massW + 58, midY + 8); ctx.lineTo(massX + massW + 58, midY + 22);
  ctx.closePath(); ctx.fill();
  ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('F(t)', massX + massW + 74, midY + 20);

  // x arrow
  ctx.strokeStyle = '#16a34a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(massX + massW / 2, botY + 40); ctx.lineTo(massX + massW / 2 + 50, botY + 40); ctx.stroke();
  ctx.fillStyle = '#16a34a';
  ctx.beginPath();
  ctx.moveTo(massX + massW / 2 + 50, botY + 40);
  ctx.lineTo(massX + massW / 2 + 40, botY + 34);
  ctx.lineTo(massX + massW / 2 + 40, botY + 46);
  ctx.closePath(); ctx.fill();
  ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('x(t)', massX + massW / 2 + 54, botY + 45);

  // Ground
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(30, botY + 60); ctx.lineTo(massX + massW + 20, botY + 60); ctx.stroke();
}

// ===== 2. SPRING SIMULATION =====
let springAnimId = null;

function solveSpringODE(m, c, k, F0, w, x0, v0, T, N) {
  // RK4
  const dt = T / N;
  const xs = new Float64Array(N + 1);
  const ts = new Float64Array(N + 1);
  let x = x0, v = v0;
  xs[0] = x; ts[0] = 0;
  for (let i = 1; i <= N; i++) {
    const t = (i - 1) * dt;
    function f(tt, xx, vv) {
      return (F0 * Math.cos(w * tt) - c * vv - k * xx) / m;
    }
    const k1v = f(t, x, v);
    const k1x = v;
    const k2v = f(t + dt/2, x + k1x*dt/2, v + k1v*dt/2);
    const k2x = v + k1v*dt/2;
    const k3v = f(t + dt/2, x + k2x*dt/2, v + k2v*dt/2);
    const k3x = v + k2v*dt/2;
    const k4v = f(t + dt, x + k3x*dt, v + k3v*dt);
    const k4x = v + k3v*dt;
    x += (k1x + 2*k2x + 2*k3x + k4x) * dt / 6;
    v += (k1v + 2*k2v + 2*k3v + k4v) * dt / 6;
    xs[i] = x; ts[i] = i * dt;
  }
  return {xs, ts};
}

function drawSpring() {
  const m = parseFloat(document.getElementById('sp-m').value);
  const c = parseFloat(document.getElementById('sp-c').value);
  const k = parseFloat(document.getElementById('sp-k').value);
  const F0 = parseFloat(document.getElementById('sp-F').value);
  const w = parseFloat(document.getElementById('sp-w').value);
  const x0 = parseFloat(document.getElementById('sp-x0').value);
  const v0 = parseFloat(document.getElementById('sp-v0').value);

  document.getElementById('sp-m-val').textContent = m.toFixed(1);
  document.getElementById('sp-c-val').textContent = c.toFixed(1);
  document.getElementById('sp-k-val').textContent = k;
  document.getElementById('sp-F-val').textContent = F0;
  document.getElementById('sp-w-val').textContent = w.toFixed(1);
  document.getElementById('sp-x0-val').textContent = x0.toFixed(1);
  document.getElementById('sp-v0-val').textContent = v0.toFixed(1);

  // Discriminant
  const disc = c * c - 4 * m * k;
  const discBox = document.getElementById('disc-box');
  const w0 = Math.sqrt(k / m);
  if (c === 0) {
    discBox.style.background = '#dbeafe'; discBox.style.color = '#1d4ed8';
    discBox.innerHTML = `비감쇠: c = 0 | &omega;<sub>0</sub> = &radic;(k/m) = ${w0.toFixed(3)} rad/s`;
  } else if (disc < 0) {
    discBox.style.background = '#dcfce7'; discBox.style.color = '#166534';
    const wd = Math.sqrt(-disc) / (2 * m);
    discBox.innerHTML = `저감쇠: &Delta; = ${disc.toFixed(2)} < 0 | &omega;<sub>d</sub> = ${wd.toFixed(3)} rad/s`;
  } else if (Math.abs(disc) < 0.01) {
    discBox.style.background = '#fef9c3'; discBox.style.color = '#854d0e';
    discBox.innerHTML = `임계감쇠: &Delta; &approx; 0 | c<sub>cr</sub> = ${(2*Math.sqrt(m*k)).toFixed(2)}`;
  } else {
    discBox.style.background = '#fee2e2'; discBox.style.color = '#991b1b';
    discBox.innerHTML = `과감쇠: &Delta; = ${disc.toFixed(2)} > 0`;
  }

  // Solve
  const T = 15;
  const N = 3000;
  const {xs, ts} = solveSpringODE(m, c, k, F0, w, x0, v0, T, N);

  // Find max amplitude for scaling
  let xMax = 0;
  for (let i = 0; i <= N; i++) xMax = Math.max(xMax, Math.abs(xs[i]));
  xMax = Math.max(xMax, 0.5);
  if (F0 > 0) xMax = Math.max(xMax, F0 / k * 1.2);
  const graphMax = xMax * 1.2;

  // Draw graph
  const canvas = document.getElementById('canvasSpringGraph');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  clearCanvas(ctx, W, H);

  const margin = {top: 30, right: 20, bottom: 45, left: 55};
  const gw = W - margin.left - margin.right;
  const gh = H - margin.top - margin.bottom;

  function tx(t) { return margin.left + (t / T) * gw; }
  function ty(x) { return margin.top + gh / 2 - (x / graphMax) * (gh / 2); }

  // Grid
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(margin.left, ty(0)); ctx.lineTo(W - margin.right, ty(0)); ctx.stroke();
  for (let i = 0; i <= 5; i++) {
    const tt = (i / 5) * T;
    ctx.beginPath(); ctx.moveTo(tx(tt), margin.top); ctx.lineTo(tx(tt), margin.top + gh); ctx.stroke();
    ctx.fillStyle = '#64748b'; ctx.font = '11px Consolas'; ctx.textAlign = 'center';
    ctx.fillText(tt.toFixed(1), tx(tt), margin.top + gh + 18);
  }
  for (let v = -Math.ceil(graphMax); v <= Math.ceil(graphMax); v++) {
    if (v === 0) continue;
    if (Math.abs(v) > graphMax) continue;
    ctx.strokeStyle = '#f1f5f9'; ctx.beginPath();
    ctx.moveTo(margin.left, ty(v)); ctx.lineTo(W - margin.right, ty(v)); ctx.stroke();
    ctx.fillStyle = '#94a3b8'; ctx.font = '10px Consolas'; ctx.textAlign = 'right';
    ctx.fillText(v.toFixed(1), margin.left - 6, ty(v) + 4);
  }

  // Axes labels
  ctx.fillStyle = '#334155'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('t (초)', margin.left + gw / 2, H - 5);
  ctx.save(); ctx.translate(14, margin.top + gh / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('x(t)', 0, 0); ctx.restore();

  // External force (if present)
  if (F0 > 0) {
    ctx.strokeStyle = '#93c5fd'; ctx.lineWidth = 1.5; ctx.setLineDash([5, 4]);
    ctx.beginPath();
    for (let i = 0; i <= N; i++) {
      const fv = F0 * Math.cos(w * ts[i]) / k;
      if (i === 0) ctx.moveTo(tx(ts[i]), ty(fv)); else ctx.lineTo(tx(ts[i]), ty(fv));
    }
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Displacement curve
  ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let i = 0; i <= N; i++) {
    if (i === 0) ctx.moveTo(tx(ts[i]), ty(xs[i])); else ctx.lineTo(tx(ts[i]), ty(xs[i]));
  }
  ctx.stroke();

  // Envelope for underdamped
  if (c > 0 && disc < 0) {
    const alpha = c / (2 * m);
    ctx.strokeStyle = 'rgba(220,38,38,0.25)'; ctx.lineWidth = 1.5; ctx.setLineDash([6, 3]);
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const t = (i / 200) * T;
      const env = xMax * Math.exp(-alpha * t);
      if (i === 0) ctx.moveTo(tx(t), ty(env)); else ctx.lineTo(tx(t), ty(env));
    }
    ctx.stroke();
    ctx.beginPath();
    for (let i = 0; i <= 200; i++) {
      const t = (i / 200) * T;
      const env = -xMax * Math.exp(-alpha * t);
      if (i === 0) ctx.moveTo(tx(t), ty(env)); else ctx.lineTo(tx(t), ty(env));
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Animate spring
  if (springAnimId) cancelAnimationFrame(springAnimId);
  animateSpring(xs, N, T, graphMax);
}

function animateSpring(xs, N, T, graphMax) {
  const canvas = document.getElementById('canvasSpringAnim');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  let startTime = null;

  function frame(timestamp) {
    if (!startTime) startTime = timestamp;
    const elapsed = (timestamp - startTime) / 1000;
    const t = elapsed % T;
    const idx = Math.min(Math.floor((t / T) * N), N);
    const x = xs[idx];

    clearCanvas(ctx, W, H);

    const wallY = 30;
    const baseY = wallY + 20;
    const restLen = 160;
    const massH = 50;
    const scale = 80 / graphMax;
    const displacement = x * scale;
    const massTop = baseY + restLen + displacement;

    // Wall
    ctx.fillStyle = '#64748b';
    ctx.fillRect(40, wallY - 5, W - 80, 12);
    for (let i = 0; i < 6; i++) {
      ctx.beginPath(); ctx.moveTo(60 + i * 30, wallY - 5);
      ctx.lineTo(50 + i * 30, wallY - 18); ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2; ctx.stroke();
    }

    // Anchor
    const anchorX = W / 2;

    // Spring coils
    const coils = 12;
    const springLen = massTop - baseY;
    const coilH = springLen / coils;
    ctx.strokeStyle = '#2563eb'; ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(anchorX, baseY);
    for (let i = 0; i < coils; i++) {
      const y1 = baseY + coilH * i;
      ctx.lineTo(anchorX - 18, y1 + coilH * 0.25);
      ctx.lineTo(anchorX + 18, y1 + coilH * 0.75);
      ctx.lineTo(anchorX, y1 + coilH);
    }
    ctx.stroke();

    // Damper (simplified - parallel lines)
    const dx = anchorX + 45;
    ctx.strokeStyle = '#dc2626'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(dx, baseY); ctx.lineTo(dx, baseY + springLen * 0.3); ctx.stroke();
    ctx.strokeRect(dx - 10, baseY + springLen * 0.3, 20, springLen * 0.35);
    ctx.beginPath();
    ctx.moveTo(dx, baseY + springLen * 0.3 + springLen * 0.15);
    ctx.lineTo(dx - 10, baseY + springLen * 0.3 + springLen * 0.15);
    ctx.moveTo(dx, baseY + springLen * 0.3 + springLen * 0.15);
    ctx.lineTo(dx + 10, baseY + springLen * 0.3 + springLen * 0.15);
    ctx.lineWidth = 3; ctx.stroke();
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(dx, baseY + springLen * 0.65); ctx.lineTo(dx, massTop); ctx.stroke();

    // Mass
    const mw = 70;
    ctx.fillStyle = '#334155';
    ctx.fillRect(anchorX - mw / 2 + 10, massTop, mw, massH);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('m', anchorX + 10, massTop + massH / 2 + 6);

    // Position indicator
    const eqY = baseY + restLen;
    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(20, eqY); ctx.lineTo(W - 20, eqY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#94a3b8'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('평형', 10, eqY - 5);

    // x arrow
    if (Math.abs(displacement) > 3) {
      ctx.strokeStyle = '#16a34a'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(anchorX - mw / 2 - 5, eqY);
      ctx.lineTo(anchorX - mw / 2 - 5, eqY + displacement); ctx.stroke();
      ctx.fillStyle = '#16a34a';
      const dir = displacement > 0 ? 1 : -1;
      ctx.beginPath();
      ctx.moveTo(anchorX - mw / 2 - 5, eqY + displacement);
      ctx.lineTo(anchorX - mw / 2 - 11, eqY + displacement - dir * 8);
      ctx.lineTo(anchorX - mw / 2 + 1, eqY + displacement - dir * 8);
      ctx.closePath(); ctx.fill();
      ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'right';
      ctx.fillText('x=' + x.toFixed(2), anchorX - mw / 2 - 10, eqY + displacement / 2 + 4);
    }

    // Time
    ctx.fillStyle = '#334155'; ctx.font = 'bold 13px Consolas'; ctx.textAlign = 'center';
    ctx.fillText('t = ' + t.toFixed(2) + 's', W / 2, H - 10);

    springAnimId = requestAnimationFrame(frame);
  }
  springAnimId = requestAnimationFrame(frame);
}

// ===== RESONANCE CURVE =====
function drawResonance() {
  const canvas = document.getElementById('canvasResonance');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  clearCanvas(ctx, W, H);

  const m = parseFloat(document.getElementById('res-m').value);
  const k = parseFloat(document.getElementById('res-k').value);
  const F0 = parseFloat(document.getElementById('res-F').value);

  document.getElementById('res-m-val').textContent = m.toFixed(1);
  document.getElementById('res-k-val').textContent = k;
  document.getElementById('res-F-val').textContent = F0;

  const w0 = Math.sqrt(k / m);
  const wMax = w0 * 3;

  const margin = {top: 30, right: 30, bottom: 50, left: 65};
  const gw = W - margin.left - margin.right;
  const gh = H - margin.top - margin.bottom;

  const dampings = [0.5, 2, 5, 10, 20];
  const colors = ['#dc2626', '#ea580c', '#f59e0b', '#16a34a', '#2563eb'];

  // Find max amplitude across all curves for scaling
  let ampMax = 0;
  for (const c of dampings) {
    for (let i = 0; i <= 400; i++) {
      const w = 0.01 + (i / 400) * wMax;
      const denom = Math.sqrt(Math.pow(k - m * w * w, 2) + Math.pow(c * w, 2));
      const amp = F0 / denom;
      if (amp > ampMax && amp < F0 / 0.01) ampMax = amp;
    }
  }
  ampMax = Math.min(ampMax, F0 * 5) * 1.1;

  function tx(w) { return margin.left + (w / wMax) * gw; }
  function ty(a) { return margin.top + gh - (a / ampMax) * gh; }

  // Grid
  ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const yy = margin.top + (i / 5) * gh;
    ctx.beginPath(); ctx.moveTo(margin.left, yy); ctx.lineTo(W - margin.right, yy); ctx.stroke();
  }

  // w0 line
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1.5; ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(tx(w0), margin.top); ctx.lineTo(tx(w0), margin.top + gh); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#64748b'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('w₀ = ' + w0.toFixed(2), tx(w0), margin.top - 8);

  // Axes
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(margin.left, margin.top); ctx.lineTo(margin.left, margin.top + gh);
  ctx.lineTo(W - margin.right, margin.top + gh); ctx.stroke();
  ctx.fillStyle = '#334155'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('w (rad/s)', margin.left + gw / 2, H - 8);
  ctx.save(); ctx.translate(16, margin.top + gh / 2); ctx.rotate(-Math.PI / 2);
  ctx.fillText('진폭 R', 0, 0); ctx.restore();

  // Tick labels
  for (let i = 0; i <= 6; i++) {
    const ww = (i / 6) * wMax;
    ctx.fillStyle = '#64748b'; ctx.font = '11px Consolas'; ctx.textAlign = 'center';
    ctx.fillText(ww.toFixed(1), tx(ww), margin.top + gh + 18);
  }

  // Curves
  dampings.forEach((c, ci) => {
    ctx.strokeStyle = colors[ci]; ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let i = 0; i <= 400; i++) {
      const w = 0.01 + (i / 400) * wMax;
      const denom = Math.sqrt(Math.pow(k - m * w * w, 2) + Math.pow(c * w, 2));
      let amp = F0 / denom;
      amp = Math.min(amp, ampMax * 1.5);
      const py = Math.max(ty(amp), margin.top - 5);
      if (i === 0) ctx.moveTo(tx(w), py); else ctx.lineTo(tx(w), py);
    }
    ctx.stroke();
  });

  // Legend
  const lx = W - margin.right - 120, ly = margin.top + 10;
  dampings.forEach((c, ci) => {
    ctx.strokeStyle = colors[ci]; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(lx, ly + ci * 20); ctx.lineTo(lx + 24, ly + ci * 20); ctx.stroke();
    ctx.fillStyle = colors[ci]; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('c = ' + c, lx + 30, ly + ci * 20 + 4);
  });
}

/* ── Navigation ── */

footer {

<!-- ==================== HERO ==================== -->
<header class="hero" id="hero">
  <h1>미분방정식의 <span>해</span></h1>
  <p class="subtitle">
    Solution of Differential Equations &mdash; 해란 무엇이며, 왜 중요하고, 어떻게 이해해야 하는가
  </p>

<!-- ============================================================ -->
<!--  SECTION 1 : 해의 정의                                        -->
<!-- ============================================================ -->
<section class="section" id="sec1">
  <p class="section-label">Section 01</p>
  <h2>해(Solution)의 정의</h2>

  <p>
    미분방정식의 <strong>해(solution)</strong>란, 미분방정식에 대입했을 때
    그 등식을 <strong>항등적으로 만족시키는 함수</strong>를 말합니다.
  </p>

  <div class="math-box highlight">
    $$F\!\bigl(x,\; y,\; y',\; y'',\;\dots,\; y^{(n)}\bigr) = 0$$
    <p style="margin-top:0.8rem; font-size:0.9rem; color:var(--text2);">
      위 미분방정식에서, 어떤 구간 $I$ 위의 함수 $y = \phi(x)$가<br>
      모든 $x \in I$에 대해 등식을 성립시키면 $\phi$를 <strong>해</strong>라 한다.
    </p>
  </div>

  <div class="analogy">
    <h4>직관적 비유: "자물쇠와 열쇠"</h4>
    <p>
      대수방정식 $x^2 - 4 = 0$의 해가 <strong>숫자</strong> $x=2, -2$인 것처럼,<br>
      미분방정식의 해는 <strong>함수</strong>입니다. 미분방정식이라는 자물쇠에 딱 들어맞는 열쇠가 바로 <strong>해 함수</strong>입니다.<br>
      단, 열쇠가 하나의 "값"이 아니라 하나의 "곡선 전체"라는 점이 핵심적 차이입니다.
    </p>
  </div>

  <h3 style="color:var(--accent); margin: 2rem 0 1rem;">대수방정식 vs 미분방정식의 해 비교</h3>

  <table class="compare-table">
    <thead>
      <tr><th></th><th>대수방정식</th><th>미분방정식</th></tr>
    </thead>
    <tbody>
      <tr>
        <td><strong>예시</strong></td>
        <td>$x^2 - 5x + 6 = 0$</td>
        <td>$y' = 2x$</td>
      </tr>
      <tr>
        <td><strong>해의 형태</strong></td>
        <td>숫자: $x = 2,\; 3$</td>
        <td>함수: $y = x^2 + C$</td>
      </tr>
      <tr>
        <td><strong>해의 개수</strong></td>
        <td>유한 개 (최대 $n$개)</td>
        <td>무한히 많음 (상수 $C$에 따라)</td>
      </tr>
      <tr>
        <td><strong>해의 의미</strong></td>
        <td>그래프와 $x$축의 교점</td>
        <td>방향장을 따르는 곡선 전체</td>
      </tr>
      <tr>
        <td><strong>검증</strong></td>
        <td>숫자를 대입</td>
        <td>함수와 그 도함수를 대입</td>
      </tr>
    </tbody>
  </table>

  <div class="example-box" onclick="this.classList.toggle('open')">
    <div class="example-header">
      구체적 예시: $y' = 2x$의 해 확인
    </div>
    <div class="example-content">
      <p>$y = x^2 + 3$이 $y' = 2x$의 해인지 확인해 봅시다.</p>
      <div class="math-box">
        $$y = x^2 + 3 \quad\Longrightarrow\quad y' = 2x$$
        $$\text{좌변 } y' = 2x = \text{ 우변} \quad \checkmark$$
      </div>
      <p>
        $y = x^2 + 3$을 미분하면 $y' = 2x$이므로, 원래 방정식 $y' = 2x$를 만족합니다.
        따라서 $y = x^2 + 3$은 이 미분방정식의 <strong>해</strong>입니다.
      </p>
      <p>
        사실 $C$가 어떤 상수이든 $y = x^2 + C$는 모두 해입니다.
        이것이 바로 <strong>일반해</strong>이며, $C=3$으로 고정한 것이 <strong>특수해</strong>입니다.
      </p>
    </div>
  </div>
</section>

<div class="divider"></div>

<!-- ============================================================ -->
<!--  SECTION 2 : 해의 종류                                        -->
<!-- ============================================================ -->
<section class="section" id="sec2">
  <p class="section-label">Section 02</p>
  <h2>해의 종류</h2>

  <p>미분방정식의 해는 크게 세 가지로 분류됩니다.</p>

  <div class="card-row">
    <!-- 일반해 -->
    <div class="card">
      <h3>일반해 (General Solution)</h3>
      <span class="tag blue">가장 기본</span>
      <p>
        $n$계 미분방정식의 해로서, <strong>$n$개의 임의상수</strong> $C_1, C_2, \dots, C_n$을 포함하는 해.
        해 전체의 "가족(family)"을 나타냅니다.
      </p>
      <div class="math-box" style="margin-top:0.8rem;">
        $$y'' = -y \;\;\Rightarrow\;\; y = C_1\cos x + C_2\sin x$$
      </div>
    </div>

    <!-- 특수해 -->
    <div class="card accent2">
      <h3>특수해 (Particular Solution)</h3>
      <span class="tag pink">초기조건 적용</span>
      <p>
        <strong>초기조건(Initial Condition)</strong>이나 경계조건을 적용하여
        임의상수의 값을 확정한 <strong>하나의 구체적인 해</strong>.
      </p>
      <div class="math-box" style="margin-top:0.8rem;">
        $$y(0)=1,\; y'(0)=0$$
        $$\Rightarrow\;\; y = \cos x$$
      </div>
    </div>

    <!-- 특이해 -->
    <div class="card accent3">
      <h3>특이해 (Singular Solution)</h3>
      <span class="tag green">특별한 존재</span>
      <p>
        일반해에서 임의상수의 어떤 값으로도 <strong>얻을 수 없는</strong> 해.
        일반해 가족의 <strong>포락선(envelope)</strong>인 경우가 많습니다.
      </p>
      <div class="math-box" style="margin-top:0.8rem;">
        $$y'^2 = 4y \;\;\Rightarrow\;\; \text{일반해: } y=(x-C)^2$$
        $$\text{특이해: } y = 0$$
      </div>
    </div>
  </div>

  <!-- 그래프: 해의 종류 시각화 -->
  <h3 style="color:var(--accent); margin: 2rem 0 1rem;">시각적 비교: 해의 가족과 포락선</h3>

  <div class="canvas-wrap">
    <canvas id="familyCanvas" width="800" height="450"></canvas>
    <div class="canvas-controls">
      <label>임의상수 $C$:&nbsp;</label>
      <input type="range" id="familyC" min="-4" max="4" step="0.5" value="0">
      <span id="familyCVal" style="color:var(--accent);font-weight:600;min-width:30px;">0</span>
      <button onclick="drawFamilyAll()">전체 가족 표시</button>
      <button onclick="drawFamilySingle()">선택된 해만</button>
    </div>
  </div>
  <p style="font-size:0.9rem; color:var(--text2); text-align:center;">
    $y' ^2 = 4y$ 의 일반해 $y=(x-C)^2$ 가족과 특이해 $y=0$ (빨간 선)
  </p>

  <div class="analogy" style="margin-top:2rem;">
    <h4>비유: 일반해 = 지도, 특수해 = 내비게이션 경로</h4>
    <p>
      일반해는 "갈 수 있는 모든 경로"를 보여주는 <strong>전체 지도</strong>이고,<br>
      특수해는 출발점(초기조건)을 정했을 때 <strong>실제로 따라가는 하나의 경로</strong>입니다.<br>
      특이해는 지도에는 없지만, 실제로 존재하는 <strong>숨겨진 길</strong>입니다.
    </p>
  </div>
</section>

<div class="divider"></div>

<!-- ============================================================ -->
<!--  SECTION 3 : 기하학적 의미                                     -->
<!-- ============================================================ -->
<section class="section" id="sec3">
  <p class="section-label">Section 03</p>
  <h2>해의 기하학적 의미</h2>

  <p>
    미분방정식 $y' = f(x,y)$는 $xy$-평면의 <strong>각 점 $(x,y)$에 기울기 $f(x,y)$를 배정</strong>합니다.
    이 기울기들의 집합을 <strong>방향장(Direction Field)</strong>이라 하며,
    해곡선은 이 방향장을 <strong>매끄럽게 따라가는 곡선</strong>입니다.
  </p>

  <div class="card-row">
    <div class="card">
      <h3>방향장 (Direction Field)</h3>
      <p>평면 위 각 점에 짧은 선분(기울기)을 그린 것. 유체 흐름의 화살표와 유사합니다.</p>
    </div>
    <div class="card accent2">
      <h3>해곡선 (Solution Curve)</h3>
      <p>방향장의 선분들에 <strong>항상 접하면서</strong> 지나가는 곡선. 이것이 곧 해 $y=\phi(x)$의 그래프입니다.</p>
    </div>
  </div>

  <h3 style="color:var(--accent); margin: 2rem 0 1rem;">인터랙티브: 방향장과 해곡선</h3>

  <div class="analogy" style="margin-top:2rem;">

    <p>
      방향장은 <strong>강물의 흐름 방향</strong>을 표시한 것이고,<br>
      해곡선은 그 강물 위에 <strong>나뭇잎을 떨어뜨렸을 때 따라가는 경로</strong>입니다.<br>
      나뭇잎을 떨어뜨리는 위치(초기조건)가 다르면 경로(특수해)도 달라집니다.

<!--  SECTION 4 : 존재성과 유일성                                    -->
<!-- ============================================================ -->
<section class="section" id="sec4">
  <p class="section-label">Section 04</p>
  <h2>해의 존재성과 유일성</h2>

  <p>
    "미분방정식에 해가 항상 존재할까?", "존재한다면 유일할까?" &mdash; 이 질문에 답하는 것이
    <strong>존재성-유일성 정리</strong>입니다.
  </p>

  <!-- 직관적 동기 부여 -->
  <div class="card" style="border-left: 4px solid var(--accent3); margin: 2rem 0;">
    <h3 style="color:var(--accent3);">왜 이 질문이 자연스러운가</h3>
    <p>
      미분방정식 $y' = f(x,y)$는 함수의 정체를 직접 알려주는 것이 아니라,
      함수가 만족해야 할 <strong>변화의 조건</strong>만 제시한다.
      그러면 자연스럽게 질문이 생긴다: <em>그 조건을 만족하는 함수가 진짜 있는가?
      있다면 하나인가 여러 개인가?</em>
    </p>
    <p style="margin-top: 1rem;">
      이 질문에 대한 답은 조건 자체, 즉 $f$의 성질이 결정한다.
    </p>
  </div>

  <div class="card-row" style="margin: 1.5rem 0 2rem;">
    <div class="card accent3">
      <h3>존재성 &mdash; $f$가 연속이면</h3>
      <p>
        $f$가 연속이면 변화의 지시가 매끄럽게 이어져 있으므로,
        그 지시를 따라가는 경로가 <strong>반드시 만들어진다</strong>. 이것이 존재성이다.
      </p>
      <p style="margin-top: 0.8rem; color: var(--text2); font-size: 0.9rem;">
        반대로 $f$가 정의되지 않거나 불연속이면 지시 자체가 끊어져 있으므로 경로를 이을 수 없다.
      </p>
    </div>
    <div class="card accent4">
      <h3>유일성 &mdash; $\dfrac{\partial f}{\partial y}$까지 연속이면</h3>
      <p>
        $\dfrac{\partial f}{\partial y}$까지 연속이면 인접한 경로들 사이에 <strong>구별력</strong>이 있어서,
        같은 출발점에서 갈라지는 일이 불가능하다. 해가 딱 하나로 정해진다. 이것이 유일성이다.
      </p>
      <p style="margin-top: 0.8rem; color: var(--text2); font-size: 0.9rem;">
        이 조건이 깨지면 변화에 대한 제약이 느슨해져서, 여러 함수가 동시에 같은 조건을 만족할 수 있게 된다.
      </p>
    </div>
  </div>

  <div class="math-box highlight3" style="margin-bottom: 2rem;">
    <p style="font-size: 1rem; text-align: center; margin: 0;">
      <strong>결국 존재성과 유일성 정리란,</strong> 변화의 조건만 주어졌을 때<br>
      그 조건이 어떤 형태이면 해가 있고 유일한지를 명확하게 판별해주는 <strong>기준</strong>이다.
    </p>
  </div>

  <div class="theorem">
    <h3>피카르-린델뢰프 정리 (Picard-Lindelof Theorem)</h3>
    <p>초기값 문제</p>
    <div class="math-box" style="background:transparent; border:none; padding:0.5rem 0;">
      $$y' = f(x,y), \qquad y(x_0) = y_0$$
    </div>
    <p>
      에서 $f(x,y)$가 점 $(x_0, y_0)$을 포함하는 어떤 직사각형 영역에서
      <strong>연속</strong>이고, $\dfrac{\partial f}{\partial y}$가 존재하며 <strong>연속</strong>이면,<br>
      이 초기값 문제는 $x_0$ 근방에서 <strong>유일한 해</strong>를 가진다.
    </p>
  </div>

  <h3 style="color:var(--accent); margin: 2rem 0 1rem;">조건이 깨지면 어떻게 되는가?</h3>

  <div class="card-row">
    <div class="card">
      <h3>해가 유일하지 않은 경우</h3>
      <div class="math-box" style="margin-top:0.8rem;">
        $$y' = 3y^{2/3}, \quad y(0) = 0$$
      </div>
      <p>
        $f(x,y) = 3y^{2/3}$에서 $\dfrac{\partial f}{\partial y} = \dfrac{2}{y^{1/3}}$은
        $y=0$에서 <strong>불연속</strong>(발산)입니다.
      </p>
      <p>
        해: $y = 0$뿐 아니라, $x \le c$일 때 $y=0$이고 $x > c$일 때 $y=(x-c)^3$인 함수도
        임의의 $c \ge 0$에 대해 모두 해입니다.
        <span class="tag pink">유일성 실패</span>
      </p>
    </div>
    <div class="card accent2">
      <h3>해가 존재하지 않는 경우</h3>
      <div class="math-box" style="margin-top:0.8rem;">
        $$y' = \frac{1}{x}, \quad y(0) = 1$$
      </div>
      <p>
        $f(x,y) = 1/x$는 $x=0$에서 <strong>정의되지 않으므로</strong>
        연속 조건을 만족하지 않습니다.
      </p>
      <p>
        $x=0$을 포함하는 구간에서는 해가 존재하지 않습니다.
        <span class="tag pink">존재성 실패</span>
      </p>
    </div>
  </div>

  <!-- 추가 예시: y' = sqrt(y) -->
  <div class="card" style="margin: 1.5rem 0; border-left: 4px solid var(--accent2);">
    <h3 style="color:var(--accent2);">유일성 실패의 또 다른 예: $y' = \sqrt{y}$</h3>
    <div class="math-box" style="margin-top:0.8rem;">
      $$y' = \sqrt{y}, \quad y(0) = 0 \qquad (y \ge 0)$$
    </div>
    <p>
      $f(x,y) = \sqrt{y}$는 $y \ge 0$에서만 정의됩니다.
      편도함수 $\dfrac{\partial f}{\partial y} = \dfrac{1}{2\sqrt{y}}$는
      $y = 0$에서 <strong>발산</strong>하므로 피카르-린델뢰프 정리의 유일성 조건이 깨집니다.
    </p>
    <p style="margin-top: 0.8rem;">
      실제로 해가 여러 개 존재합니다:
    </p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:0.8rem;">
      <div class="math-box" style="text-align:center;">
        $$y_1(x) = 0 \quad \text{(자명한 해)}$$
      </div>
      <div class="math-box" style="text-align:center;">
        $$y_2(x) = \frac{(x-c)^2}{4} \quad (x > c)$$
      </div>
    </div>
    <p style="margin-top: 0.8rem;">
      임의의 $c \ge 0$에 대해, $x \le c$에서 $y = 0$이고 $x > c$에서 $y = \dfrac{(x-c)^2}{4}$인 함수가
      모두 초기조건 $y(0)=0$을 만족하는 해입니다.
      <span class="tag pink">유일성 실패</span>
    </p>
  </div>

  <!-- 왜 √y에서 해가 무한히 갈라지는가 -->
  <div class="card" style="margin: 1.5rem 0; border-left: 4px solid var(--accent4);">
    <h3 style="color:var(--accent4);">직관: 왜 $\sqrt{y}$에서는 "아무 때나 출발"이 가능한가</h3>
    <p>
      $y' = \sqrt{y}$에서 $y = 0$이면 $y' = 0$입니다.
      기울기가 $0$이니까 해는 그 자리에 머물 수 있습니다.
      그런데 아주 살짝이라도 $y$가 양수가 되면 $y' > 0$이 되어서 올라가기 시작하고,
      올라가면 $\sqrt{y}$가 더 커지니까 더 빨리 올라갑니다.
      <strong>일단 출발하면 되돌아올 수 없습니다.</strong>
    </p>
    <p style="margin-top: 0.8rem;">
      문제는 <strong>"언제 출발하느냐"를 미분방정식이 결정해주지 못한다</strong>는 것입니다.
      $y = 0$에 영원히 머무르는 것도 변화의 조건 $y' = \sqrt{y}$를 만족하고,
      $x = 5$까지 머물다가 출발하는 것도 만족하고,
      $x = 100$에서 출발하는 것도 만족합니다.
      어느 시점에서든 "이제 출발해도 되고, 더 기다려도 된다"는 상태가 계속 유지됩니다.
    </p>

    <h3 style="color:var(--accent3); margin-top: 1.5rem;">비교: $y' = y$는 왜 다른가</h3>
    <p>
      $y' = y$, $y(0) = 0$과 비교하면 명확해집니다.
      여기서도 $y = 0$이면 $y' = 0$이라 머무를 수 있습니다.
      하지만 살짝 밀려서 $y = 0.001$이 되면 기울기도 $0.001$뿐이라,
      <strong>밀린 정도에 비례하는 약한 힘만</strong> 받습니다.
      스스로 폭발적으로 성장할 수 없어서 결국 $y = 0$에서 벗어나지 못합니다.
    </p>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top: 1.2rem;">
      <div class="math-box highlight2" style="text-align:center;">
        <p style="font-weight:700; color:var(--accent2); margin-bottom:0.5rem;">$y' = \sqrt{y}$ &mdash; 불균형</p>
        <p>$y = 0.001$이면 기울기 $\sqrt{0.001} \approx 0.032$</p>
        <p style="margin-top:0.3rem;">$$\frac{\text{기울기}}{\text{밀린 정도}} = \frac{\sqrt{\epsilon}}{\epsilon} = \frac{1}{\sqrt{\epsilon}} \to \infty$$</p>
        <p style="font-size:0.85rem; color:var(--text2);">밀린 정도에 비해 <strong>30배</strong> 큰 기울기 &rarr; 자력 성장 가능</p>
      </div>
      <div class="math-box highlight3" style="text-align:center;">
        <p style="font-weight:700; color:var(--accent3); margin-bottom:0.5rem;">$y' = y$ &mdash; 균형</p>
        <p>$y = 0.001$이면 기울기 $0.001$</p>
        <p style="margin-top:0.3rem;">$$\frac{\text{기울기}}{\text{밀린 정도}} = \frac{y}{y} = 1 \quad \text{(항상 일정)}$$</p>
        <p style="font-size:0.85rem; color:var(--text2);">섭동이 자기 크기 이상의 기울기를 <strong>절대 못 받음</strong></p>
      </div>
    </div>

    <p style="margin-top: 1.2rem;">
      이 <strong>"밀린 정도 대비 기울기의 비율"</strong>이 바로 $\dfrac{\partial f}{\partial y}$의 발산 여부와 직결됩니다.
      립시츠 조건은 "인접 경로 간 기울기 차이가 거리에 비례해서만 커진다"를 보장하는데,
      $\dfrac{1}{2\sqrt{y}} \to \infty$이면 이 비례 관계가 무너져서
      아무리 작은 출발도 자력으로 성장 가능하게 되고,
      "아무 시점에서나 출발 가능한" 해가 무한히 생기는 것입니다.
    </p>
  </div>

  <!-- 립시츠 조건 개략 설명 -->
  <div class="card" style="margin: 1.5rem 0; border-left: 4px solid var(--accent);">
    <h3 style="color:var(--accent);">립시츠 조건(Lipschitz Condition)이란?</h3>
    <p>
      함수 $f(x,y)$가 $y$에 대해 <strong>립시츠 조건</strong>을 만족한다는 것은,
      어떤 상수 $L > 0$이 존재하여 다음이 성립하는 것입니다:
    </p>
    <div class="math-box" style="margin: 1rem 0;">
      $$|f(x, y_1) - f(x, y_2)| \;\le\; L\,|y_1 - y_2|$$
    </div>
    <p>
      직관적으로 말하면, <strong>두 점 $y_1$, $y_2$에서 기울기($f$ 값)의 차이가
      두 점 사이의 거리에 비례해서만 커질 수 있다</strong>는 뜻입니다.
      상수 $L$이 그 비례의 한계를 정해줍니다.
    </p>
    <p style="margin-top: 0.8rem;">
      이 조건이 왜 유일성을 보장할까요?
      만약 두 해 $y_1(x)$, $y_2(x)$가 같은 초기조건에서 출발했다면,
      처음에 차이는 $0$입니다.
      립시츠 조건 하에서 기울기 차이는 현재 차이의 $L$배를 넘을 수 없으므로,
      차이가 $0$에서 시작하면 <strong>영원히 $0$에 머물 수밖에 없습니다</strong>.
      두 해가 갈라질 수 없다는 뜻이고, 이것이 유일성입니다.
    </p>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top: 1.2rem;">
      <div style="background:var(--bg3); padding:1rem; border-radius:8px;">
        <p style="font-weight:700; color:var(--accent3); margin-bottom:0.4rem;">$y' = y$ &mdash; 립시츠 만족</p>
        <p style="font-size:0.9rem;">$|f(x,y_1) - f(x,y_2)| = |y_1 - y_2|$</p>
        <p style="font-size:0.85rem; color:var(--text2); margin-top:0.3rem;">$L = 1$로 한계가 명확 &rarr; 해가 갈라질 수 없음</p>
      </div>
      <div style="background:var(--bg3); padding:1rem; border-radius:8px;">
        <p style="font-weight:700; color:var(--accent2); margin-bottom:0.4rem;">$y' = \sqrt{y}$ &mdash; 립시츠 불만족</p>
        <p style="font-size:0.9rem;">$|\sqrt{y_1} - \sqrt{y_2}| \le \dfrac{|y_1-y_2|}{2\sqrt{\min(y_1,y_2)}}$</p>
        <p style="font-size:0.85rem; color:var(--text2); margin-top:0.3rem;">$y \to 0$이면 비례 상수 $\to \infty$ &rarr; 제한 없음</p>
      </div>
    </div>

    <p style="margin-top: 1rem; font-size:0.92rem; color:var(--text2);">
      참고: $\dfrac{\partial f}{\partial y}$가 연속이면 유계(bounded)이므로 자동으로 립시츠 조건을 만족합니다.
      그래서 피카르-린델뢰프 정리가 "$\dfrac{\partial f}{\partial y}$ 연속"을 조건으로 쓰는 것입니다.
    </p>
  </div>
  <h3 style="color:var(--accent); margin: 2rem 0 1rem;">시각화: 유일성이 성립 vs 실패</h3>
  <p>같은 초기조건 $y(0)=0$에서 출발할 때, 해가 하나인 경우와 여러 개인 경우를 비교합니다.</p>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin:1.5rem 0;">
    <!-- 유일성 성립 -->
    <div class="canvas-wrap">
      <canvas id="uniqueOkCanvas" width="400" height="380"></canvas>
      <div style="padding:0.8rem 1rem; background:var(--bg3); text-align:center;">
        <span style="color:var(--accent3); font-weight:700;">유일성 성립</span><br>
        <span style="font-size:0.85rem; color:var(--text2);">$y' = y,\;\; y(0)=0$</span><br>
        <span style="font-size:0.8rem; color:var(--text2);">$\frac{\partial f}{\partial y} = 1$ (연속) &rarr; 해는 $y=0$ 오직 하나</span>
      </div>
    </div>
    <!-- 유일성 실패 -->
    <div class="canvas-wrap">
      <canvas id="uniqueCanvas" width="400" height="380"></canvas>
      <div style="padding:0.8rem 1rem; background:var(--bg3); text-align:center;">
        <span style="color:var(--accent2); font-weight:700;">유일성 실패</span><br>
        <span style="font-size:0.85rem; color:var(--text2);">$y' = 3y^{2/3},\;\; y(0)=0$</span><br>
        <span style="font-size:0.8rem; color:var(--text2);">$\frac{\partial f}{\partial y} = \frac{2}{y^{1/3}}$ ($y=0$에서 발산) &rarr; 해가 여러 개!</span>
      </div>
    </div>
  </div>

  <div class="canvas-wrap" style="margin-top:0;">
    <div class="canvas-controls">
      <button onclick="toggleUqAnim()" id="uqAnimBtn">애니메이션 시작</button>
      <button onclick="resetUqAnim()">초기화</button>
      <span style="color:var(--text2); font-size:0.85rem;" id="uqDesc">
        버튼을 눌러 같은 출발점에서 해가 어떻게 진행하는지 비교하세요
      </span>
    </div>
  </div>

  <!-- 단계별 설명 -->
  <div class="card" style="margin-top:1.2rem; border-color:var(--accent2);">
    <h3 style="color:var(--accent2);">왜 여러 해가 가능한가?</h3>
    <p style="color:var(--text2); margin-bottom:0.5rem;">
      $y' = 3y^{2/3},\; y(0) = 0$ 에서 다음이 <strong>모두</strong> 해입니다:
    </p>
    <ul style="color:var(--text2); padding-left:1.5rem;">
      <li><strong>해 1:</strong> $y = 0$ (영원히 $x$축 위에 머무름)</li>
      <li><strong>해 2:</strong> $y = x^3$ ($x=0$에서 즉시 출발)</li>
      <li><strong>해 3:</strong> $x \le 1$일 때 $y=0$, $x > 1$일 때 $y=(x-1)^3$ &nbsp;(잠시 머물다 출발)</li>
      <li><strong>해 4, 5, ...:</strong> 임의의 시점 $c$까지 $y=0$에 머물다가 $y=(x-c)^3$으로 출발</li>
    </ul>
    <p style="color:var(--text2); margin-top:0.8rem;">
      원점이 일종의 <strong>"정체 구간"</strong>이 되어, 언제 출발할지 결정할 수 없습니다.<br>
      이것이 피카르-린델뢰프 정리의 조건($\partial f/\partial y$ 연속)이 깨질 때 벌어지는 일입니다.
    </p>
  </div>

  <div class="analogy" style="margin-top:2rem;">
    <h4>비유: 갈림길</h4>
    <p>
      피카르-린델뢰프 정리의 조건이 만족되면, 도로에는 <strong>갈림길이 없습니다</strong> &mdash;
      출발점이 같으면 반드시 같은 길을 갑니다(유일성).<br>
      조건이 깨지면 <strong>갈림길</strong>이 생겨, 같은 출발점에서도 여러 경로가 가능합니다.
    </p>
  </div>

  <!-- ── 오일러 좌굴 예제 ── -->
  <h3 style="color:var(--accent); margin: 3rem 0 1rem;">공학 예제: 오일러 좌굴 (Euler's Column Buckling)</h3>

  <p>
    유일성 실패가 가장 극적으로 나타나는 공학 문제가 바로 <strong>좌굴(Buckling)</strong>입니다.
    축방향 압축하중 $P$를 받는 기둥의 횡변위 $y(x)$는 다음 미분방정식을 만족합니다.
  </p>

  <div class="math-box highlight">
    $$EI\frac{d^2y}{dx^2} + Py = 0, \qquad y(0) = 0,\;\; y(L) = 0$$
    <p style="margin-top:0.8rem; font-size:0.9rem; color:var(--text2);">
      $E$: 탄성계수, &ensp; $I$: 단면 2차 모멘트, &ensp; $P$: 축방향 압축하중, &ensp; $L$: 기둥 길이
    </p>
  </div>

  <div class="card-row">
    <div class="card">
      <h3>일반해</h3>
      <div class="math-box" style="margin-top:0.5rem; padding:1rem;">
        $$y = A\sin\!\left(\sqrt{\frac{P}{EI}}\,x\right)$$
      </div>
      <p>경계조건 $y(0)=0$에서 $\cos$ 항 소거. $y(L)=0$ 적용 시 두 가지 가능성이 열립니다.</p>
    </div>
    <div class="card accent2">
      <h3>임계하중 (Critical Load)</h3>
      <div class="math-box" style="margin-top:0.5rem; padding:1rem;">
        $$P_{cr} = \frac{\pi^2 EI}{L^2} \quad \text{(오일러 공식)}$$
      </div>
      <p>$P < P_{cr}$이면 $A=0$뿐 (유일). $P = P_{cr}$이면 $A$가 자유 &rarr; <strong>유일성 실패 = 좌굴!</strong></p>
    </div>
  </div>

  <table class="compare-table" style="margin-top:1.5rem;">
    <thead>
      <tr><th>조건</th><th>해</th><th>물리적 의미</th></tr>
    </thead>
    <tbody>
      <tr>
        <td>$P < P_{cr}$</td>
        <td>$y = 0$ (유일)</td>
        <td>기둥이 곧게 유지</td>
      </tr>
      <tr>
        <td>$P = P_{cr}$</td>
        <td>$y = 0$ <strong>그리고</strong> $y = A\sin(\pi x/L)$</td>
        <td><strong>좌굴 발생</strong> &mdash; 유일성 실패!</td>
      </tr>
      <tr>
        <td>$P = n^2 P_{cr}$</td>
        <td>$y = A\sin(n\pi x/L)$</td>
        <td>$n$차 좌굴 모드</td>
      </tr>
    </tbody>
  </table>

  <!-- 인터랙티브: 기둥 + 분기 다이어그램 -->
  <h3 style="color:var(--accent); margin: 2rem 0 1rem;">인터랙티브: 하중에 따른 기둥 변형</h3>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin:1.5rem 0;">
    <!-- 기둥 시각화 -->
    <div class="canvas-wrap">
      <canvas id="bucklColumnCanvas" width="400" height="450"></canvas>
      <div style="padding:0.6rem 1rem; background:var(--bg3); text-align:center;">
        <span style="font-size:0.85rem; color:var(--text2);">기둥의 변형 형상</span>
      </div>
    </div>
    <!-- 분기 다이어그램 -->
    <div class="canvas-wrap">
      <canvas id="bucklBifurCanvas" width="400" height="450"></canvas>
      <div style="padding:0.6rem 1rem; background:var(--bg3); text-align:center;">
        <span style="font-size:0.85rem; color:var(--text2);">분기 다이어그램 (Bifurcation Diagram)</span>
      </div>
    </div>
  </div>

  <div class="canvas-wrap" style="margin-top:0;">
    <div class="canvas-controls">
      <label>하중 $P/P_{cr}$:&nbsp;</label>
      <input type="range" id="bucklSlider" min="0" max="2" step="0.01" value="0">
      <span id="bucklVal" style="color:var(--accent); font-weight:600; min-width:50px;">0.00</span>
      <span id="bucklStatus" style="font-size:0.85rem; color:var(--accent3); font-weight:600;">안정 (유일해)</span>
    </div>
  </div>

  <!-- 좌굴 모드 -->
  <h3 style="color:var(--accent); margin: 2rem 0 1rem;">좌굴 모드 (Mode Shapes)</h3>

  <div class="canvas-wrap">
    <canvas id="bucklModeCanvas" width="800" height="300"></canvas>
    <div class="canvas-controls">
      <button onclick="setBucklMode(0)">전체 모드</button>
      <button onclick="setBucklMode(1)">1차 모드</button>
      <button onclick="setBucklMode(2)">2차 모드</button>
      <button onclick="setBucklMode(3)">3차 모드</button>
      <span style="color:var(--text2); font-size:0.85rem;">$y_n = A\sin(n\pi x/L)$, &ensp; $P_n = n^2 P_{cr}$</span>
    </div>
  </div>

  <div class="analogy" style="margin-top:2rem;">
    <h4>핵심 통찰: 좌굴 = 유일성 실패의 물리적 발현</h4>
    <p>
      하중이 임계값 $P_{cr}$에 도달하면, 미분방정식은 $y=0$(곧은 상태)과
      $y = A\sin(\pi x/L)$(휜 상태) <strong>두 해를 동시에 허용</strong>합니다.<br>
      자연은 에너지가 낮은 새로운 해(휜 상태)를 선택하고 &mdash; 이것이 <strong>좌굴</strong>입니다.<br><br>
      즉, 공학에서 "구조물이 좌굴한다"는 것은 수학적으로
      "<strong>해의 유일성이 깨지는 분기점을 통과한다</strong>"는 것과 정확히 같은 의미입니다.
    </p>
  </div>
</section>

<section class="section" id="sec5">
  <p class="section-label">Section 05</p>
  <h2>해의 검증 (Verification)</h2>

  <p>
    주어진 함수가 미분방정식의 해인지 확인하는 것은 해를 "구하는 것"보다 훨씬 간단합니다.
    아래 단계를 따르면 됩니다.
  </p>

  <ol class="steps">
    <li>주어진 함수 $y = \phi(x)$를 필요한 만큼 <strong>미분</strong>하여 $y', y'', \dots$ 를 구한다.</li>
    <li>원래 미분방정식에 $y, y', y'', \dots$ 를 <strong>대입</strong>한다.</li>
    <li>정리 후 <strong>항등적으로 $0 = 0$</strong> (또는 좌변 = 우변)이 성립하는지 확인한다.</li>
    <li>해가 정의되는 <strong>구간</strong>을 명시한다.</li>
  </ol>

  <h3 style="color:var(--accent); margin: 2rem 0 1rem;">인터랙티브 검증 데모</h3>

  <div class="verify-interactive" id="verifyDemo">
    <p style="color:var(--text); font-weight:600; margin-bottom:0.8rem;">
      문제: $y'' + y = 0$ 에 대해 $y = 3\sin x + 2\cos x$ 가 해인지 확인
    </p>
    <div class="verify-step active" id="vs1">
      <strong>Step 1.</strong> 미분하기<br>
      $y = 3\sin x + 2\cos x$<br>
      $y' = 3\cos x - 2\sin x$<br>
      $y'' = -3\sin x - 2\cos x$
    </div>
    <div class="verify-step" id="vs2">
      <strong>Step 2.</strong> 대입하기<br>
      $y'' + y = (-3\sin x - 2\cos x) + (3\sin x + 2\cos x)$
    </div>
    <div class="verify-step" id="vs3">
      <strong>Step 3.</strong> 정리하기<br>
      $y'' + y = 0$ &emsp; $\checkmark$ &emsp; 항등적으로 성립!
    </div>
    <div class="verify-step" id="vs4">
      <strong>Step 4.</strong> 구간: 모든 실수 $x \in (-\infty, \infty)$에서 해이다.
    </div>
    <button class="verify-btn" id="verifyBtn" onclick="advanceVerify()">다음 단계</button>
  </div>

  <div class="example-box" onclick="this.classList.toggle('open')">
    <div class="example-header">
      추가 예시: $y' - 2y = 0$, $y = 5e^{2x}$
    </div>
    <div class="example-content">
      <div class="math-box">
        $$y = 5e^{2x} \;\Rightarrow\; y' = 10e^{2x}$$
        $$y' - 2y = 10e^{2x} - 2 \cdot 5e^{2x} = 10e^{2x} - 10e^{2x} = 0 \;\;\checkmark$$
      </div>
      <p>$x \in (-\infty, \infty)$에서 해이다.</p>
    </div>
  </div>
</section>

<!--  SECTION 6 : 풀이 방법 개요                                    -->
<!-- ============================================================ -->
<section class="section" id="sec6">
  <p class="section-label">Section 06</p>
  <h2>해를 구하는 방법 (개요)</h2>

  <p>
    "해"의 의미를 이해했다면, 이제 해를 <strong>어떻게 구하는가</strong>를 개관합니다.
    아래는 주요 풀이법의 지도입니다.
  </p>

  <div class="flow">
    <div class="flow-item">미분방정식 주어짐</div>
    <div class="flow-arrow">&rarr;</div>
    <div class="flow-item">유형 분류</div>
    <div class="flow-arrow">&rarr;</div>
    <div class="flow-item">적절한 기법 적용</div>
    <div class="flow-arrow">&rarr;</div>
    <div class="flow-item"><strong>일반해</strong> 획득</div>
    <div class="flow-arrow">&rarr;</div>
    <div class="flow-item">초기조건 적용</div>
    <div class="flow-arrow">&rarr;</div>
    <div class="flow-item" style="border-color:var(--accent3);"><strong>특수해</strong> 확정</div>
  </div>

  <div class="method-grid">
    <div class="method-card">
      <span class="tag blue">1계 ODE</span>
      <h4>분리변수법 (Separation of Variables)</h4>
      <div class="math-box" style="font-size:0.9rem; padding:0.8rem;">
        $$\frac{dy}{dx} = g(x)h(y) \;\Rightarrow\; \int\frac{dy}{h(y)} = \int g(x)\,dx$$
      </div>
      <p>변수를 양변으로 분리하여 적분하는 가장 기본적인 방법.</p>
    </div>
    <div class="method-card">
      <span class="tag blue">1계 ODE</span>
      <h4>적분인자법 (Integrating Factor)</h4>
      <div class="math-box" style="font-size:0.9rem; padding:0.8rem;">
        $$y' + P(x)y = Q(x) \;\Rightarrow\; \mu = e^{\int P\,dx}$$
      </div>
      <p>1계 선형 ODE를 체계적으로 풀 수 있는 만능 도구.</p>
    </div>
    <div class="method-card">
      <span class="tag pink">2계 이상</span>
      <h4>특성방정식법 (Characteristic Equation)</h4>
      <div class="math-box" style="font-size:0.9rem; padding:0.8rem;">
        $$ay'' + by' + cy = 0 \;\Rightarrow\; a\lambda^2 + b\lambda + c = 0$$
      </div>
      <p>상수계수 선형 ODE를 대수방정식으로 변환.</p>
    </div>
    <div class="method-card">
      <span class="tag green">급수</span>
      <h4>멱급수 해법 (Power Series)</h4>
      <div class="math-box" style="font-size:0.9rem; padding:0.8rem;">
        $$y = \sum_{n=0}^{\infty} a_n x^n$$
      </div>
      <p>해를 급수로 가정하고 계수를 결정. 닫힌 형태 해가 없을 때 유용.</p>
    </div>
    <div class="method-card">
      <span class="tag blue">수치적</span>
      <h4>수치 해법 (Numerical Methods)</h4>
      <div class="math-box" style="font-size:0.9rem; padding:0.8rem;">
        $$y_{n+1} = y_n + h\,f(x_n, y_n)$$
      </div>
      <p>오일러법, 룽게-쿠타법 등으로 해를 근사. 컴퓨터 활용.</p>
    </div>
    <div class="method-card">
      <span class="tag pink">변환</span>
      <h4>라플라스 변환 (Laplace Transform)</h4>
      <div class="math-box" style="font-size:0.9rem; padding:0.8rem;">
        $$\mathcal{L}\{y'\} = sY(s) - y(0)$$
      </div>
      <p>미분방정식을 대수방정식으로 변환하여 풀고 역변환.</p>
    </div>
  </div>
</section>

<section class="section" id="sec7">
  <p class="section-label">Section 07</p>
  <h2>해의 물리적 의미</h2>

  <p>
    미분방정식의 해는 추상적 수학이 아니라, <strong>현실 세계의 운동과 변화</strong>를 서술합니다.
    해를 구한다는 것은 "자연이 시간에 따라 어떻게 변하는가"의 답을 얻는 것입니다.
  </p>

  <div class="physics-demo">
    <!-- 지수 감쇠 -->
    <div class="physics-card">
      <h4>방사성 붕괴 / 냉각</h4>
      <canvas id="decayCanvas" width="340" height="220"></canvas>
      <div class="math-box" style="font-size:0.9rem; padding:0.6rem;">
        $$\dv{N}{t} = -kN \;\;\Rightarrow\;\; N(t) = N_0 e^{-kt}$$
      </div>
      <p style="font-size:0.85rem; color:var(--text2);">해 = 시간에 따른 잔존량 곡선</p>
    </div>
    <!-- 진동 -->
    <div class="physics-card">
      <h4>스프링 진동 (단진동)</h4>
      <canvas id="springCanvas" width="340" height="220"></canvas>
      <div class="math-box" style="font-size:0.9rem; padding:0.6rem;">
        $$m\frac{d^2 x}{dt^2} = -kx \;\;\Rightarrow\;\; x(t) = A\cos(\omega t + \phi)$$
      </div>
      <p style="font-size:0.85rem; color:var(--text2);">해 = 시간에 따른 위치 곡선</p>
    </div>
    <!-- 로지스틱 -->
    <div class="physics-card">
      <h4>인구 성장 (로지스틱)</h4>
      <canvas id="logisticCanvas" width="340" height="220"></canvas>
      <div class="math-box" style="font-size:0.9rem; padding:0.6rem;">
        $$\dv{P}{t} = rP\!\left(1 - \frac{P}{K}\right) \;\;\Rightarrow\;\; P(t) = \frac{K}{1 + Ce^{-rt}}$$
      </div>
      <p style="font-size:0.85rem; color:var(--text2);">해 = 시간에 따른 인구 곡선</p>
    </div>
    <!-- 자유낙하 -->
    <div class="physics-card">
      <h4>자유낙하 (공기저항)</h4>
      <canvas id="fallCanvas" width="340" height="220"></canvas>
      <div class="math-box" style="font-size:0.9rem; padding:0.6rem;">
        $$m\dv{v}{t} = mg - bv \;\;\Rightarrow\;\; v(t) = \frac{mg}{b}(1 - e^{-bt/m})$$
      </div>
      <p style="font-size:0.85rem; color:var(--text2);">해 = 시간에 따른 속도 곡선 (종단속도 수렴)</p>
    </div>
  </div>

  <div class="analogy" style="margin-top:2rem;">
    <h4>핵심 통찰</h4>
    <p>
      미분방정식은 <strong>"변화의 규칙"</strong>을 기술하고,<br>
      해는 그 규칙을 따를 때 <strong>"실제로 일어나는 일"</strong>을 알려줍니다.<br><br>
      $y' = -ky$ 라는 방정식은 <em>"현재 양에 비례하여 감소한다"</em>는 규칙이고,<br>
      $y = y_0 e^{-kt}$ 라는 해는 <em>"구체적으로 시간이 지나면 이렇게 줄어든다"</em>는 답입니다.
    </p>
  </div>
</section>

  famCtx.lineWidth = 1;
  famCtx.beginPath();
  famCtx.moveTo(0, h/2); famCtx.lineTo(w, h/2);
  famCtx.moveTo(w/2, 0); famCtx.lineTo(w/2, h);
  famCtx.stroke();
  famCtx.fillStyle = getCSS('--canvas-label');
  famCtx.font = '12px sans-serif';
  famCtx.fillText('x', w - 15, h/2 - 8);
  famCtx.fillText('y', w/2 + 8, 15);
}

function famToScreen(x, y){
  const w = famCvs.width, h = famCvs.height;
  const sx = w/2 + x * (w/10);
  const sy = h/2 - y * (h/10);
  return [sx, sy];
}

function drawParabola(C, color, lw){
  famCtx.strokeStyle = color;
  famCtx.lineWidth = lw;
  famCtx.beginPath();
  let first = true;
  for(let px = -5; px <= 5; px += 0.05){
    const py = (px - C) * (px - C);
    if(py > 6) continue;
    const [sx, sy] = famToScreen(px, py);
    if(first){ famCtx.moveTo(sx, sy); first = false; }
    else famCtx.lineTo(sx, sy);
  }
  famCtx.stroke();
}

function drawFamily(){
  drawFamilyAxes();

    }
  }
  // selected
  drawParabola(Cv, accentColor, 2.5);
  // singular solution y = 0
  famCtx.strokeStyle = accent2Color;
  famCtx.lineWidth = 2.5;
  famCtx.setLineDash([6,4]);
  famCtx.beginPath();
  const [sx0, sy0] = famToScreen(-5, 0);
  const [sx1, sy1] = famToScreen(5, 0);
  famCtx.moveTo(sx0, sy0); famCtx.lineTo(sx1, sy1);
  famCtx.stroke();
  famCtx.setLineDash([]);
  // labels
  famCtx.fillStyle = accentColor;
  famCtx.font = 'bold 13px sans-serif';
  const [lx,ly] = famToScreen(Cv + 1.5, 2.3);
  famCtx.fillText(`C = ${Cv}`, lx, ly);

}

//  SECTION 3 : Direction Field
// ══════════════════════════════════════════════
const dfCvs = document.getElementById('dirFieldCanvas');
const dfCtx = dfCvs.getContext('2d');
const eqSel = document.getElementById('eqSelect');

const equations = [
  { f: (x,y) => x + y, label: "y' = x + y" },
  { f: (x,y) => -y, label: "y' = -y" },
  { f: (x,y) => x * y, label: "y' = xy" },
  { f: (x,y) => Math.sin(x) * Math.cos(y), label: "y' = sin(x)cos(y)" },
  { f: (x,y) => x*x - y, label: "y' = x² - y" },
];

let solCurves = [];
const dfXmin = -5, dfXmax = 5, dfYmin = -4, dfYmax = 4;

function dfToScreen(x, y){
  const w = dfCvs.width, h = dfCvs.height;
  const sx = (x - dfXmin) / (dfXmax - dfXmin) * w;
  const sy = (1 - (y - dfYmin) / (dfYmax - dfYmin)) * h;
  return [sx, sy];
}
function screenToDf(sx, sy){
  const w = dfCvs.width, h = dfCvs.height;
  const x = sx / w * (dfXmax - dfXmin) + dfXmin;
  const y = (1 - sy / h) * (dfYmax - dfYmin) + dfYmin;
  return [x, y];
}

function drawDirField(){
  const w = dfCvs.width, h = dfCvs.height;
  dfCtx.clearRect(0,0,w,h);
  dfCtx.fillStyle = getCSS('--canvas-bg');
  dfCtx.fillRect(0,0,w,h);

  const idx = parseInt(eqSel.value);
  const f = equations[idx].f;

  // axes
  dfCtx.strokeStyle = getCSS('--canvas-axis'); dfCtx.lineWidth = 1;
  dfCtx.beginPath();
  const [ax0, ay0] = dfToScreen(dfXmin, 0);
  const [ax1, ay1] = dfToScreen(dfXmax, 0);
  dfCtx.moveTo(ax0, ay0); dfCtx.lineTo(ax1, ay1);
  const [bx0, by0] = dfToScreen(0, dfYmin);
  const [bx1, by1] = dfToScreen(0, dfYmax);
  dfCtx.moveTo(bx0, by0); dfCtx.lineTo(bx1, by1);
  dfCtx.stroke();

  // direction field
  const step = 0.5;
  const len = 0.18;
  for(let x = dfXmin + 0.25; x <= dfXmax - 0.25; x += step){
    for(let y = dfYmin + 0.25; y <= dfYmax - 0.25; y += step){
      const slope = f(x, y);
      const angle = Math.atan(slope);
      const dx = len * Math.cos(angle);
      const dy = len * Math.sin(angle);
      const [sx1, sy1] = dfToScreen(x - dx, y - dy);
      const [sx2, sy2] = dfToScreen(x + dx, y + dy);
      // color by slope magnitude
      const mag = Math.min(Math.abs(slope) / 3, 1);
      const isLight = document.documentElement.getAttribute('data-theme') === 'light';
      const r = Math.round(lerp(isLight ? 140 : 80, isLight ? 50 : 108, mag));
      const g = Math.round(lerp(isLight ? 145 : 90, isLight ? 80 : 140, mag));
      const b = Math.round(lerp(isLight ? 170 : 120, isLight ? 200 : 255, mag));
      dfCtx.strokeStyle = `rgba(${r},${g},${b},${isLight ? 0.6 : 0.7})`;
      dfCtx.lineWidth = 1.3;
      dfCtx.beginPath();
      dfCtx.moveTo(sx1, sy1); dfCtx.lineTo(sx2, sy2);
      dfCtx.stroke();
    }
  }

  // solution curves
  solCurves.forEach(curve => {
    dfCtx.strokeStyle = getCSS('--accent4');
    dfCtx.lineWidth = 2.2;
    dfCtx.beginPath();
    curve.forEach((pt, i) => {
      const [sx, sy] = dfToScreen(pt[0], pt[1]);
      if(i === 0) dfCtx.moveTo(sx, sy);
      else dfCtx.lineTo(sx, sy);
    });
    dfCtx.stroke();
  });

  // label
  dfCtx.fillStyle = getCSS('--canvas-label');
  dfCtx.font = '13px sans-serif';
  dfCtx.fillText(equations[idx].label, 15, 22);
}

function computeSolCurve(x0, y0){
  const idx = parseInt(eqSel.value);
  const f = equations[idx].f;
  const h = 0.02;
  let pts = [[x0, y0]];

  // forward
  let x = x0, y = y0;
  for(let i = 0; i < 600; i++){
    const k1 = f(x, y);
    const k2 = f(x + h/2, y + h/2*k1);
    const k3 = f(x + h/2, y + h/2*k2);
    const k4 = f(x + h, y + h*k3);
    y += h/6*(k1 + 2*k2 + 2*k3 + k4);
    x += h;
    if(x > dfXmax + 1 || Math.abs(y) > dfYmax + 5) break;
    pts.push([x, y]);
  }

  // backward
  x = x0; y = y0;
  let bpts = [];
  for(let i = 0; i < 600; i++){
    const k1 = f(x, y);
    const k2 = f(x - h/2, y - h/2*k1);
    const k3 = f(x - h/2, y - h/2*k2);
    const k4 = f(x - h, y - h*k3);
    y -= h/6*(k1 + 2*k2 + 2*k3 + k4);
    x -= h;
    if(x < dfXmin - 1 || Math.abs(y) > dfYmax + 5) break;
    bpts.unshift([x, y]);
  }

  return bpts.concat(pts);
}

dfCvs.addEventListener('click', e => {
  const rect = dfCvs.getBoundingClientRect();
  const scaleX = dfCvs.width / rect.width;
  const scaleY = dfCvs.height / rect.height;
  const sx = (e.clientX - rect.left) * scaleX;
  const sy = (e.clientY - rect.top) * scaleY;
  const [x0, y0] = screenToDf(sx, sy);
  solCurves.push(computeSolCurve(x0, y0));
  drawDirField();
});

function clearSolCurves(){ solCurves = []; drawDirField(); }
eqSel.addEventListener('change', () => { solCurves = []; drawDirField(); });
drawDirField();

//  SECTION 4 : Uniqueness Comparison
// ══════════════════════════════════════════════
const uqCvs = document.getElementById('uniqueCanvas');
const uqCtx = uqCvs.getContext('2d');
const uqOkCvs = document.getElementById('uniqueOkCanvas');
const uqOkCtx = uqOkCvs.getContext('2d');

let uqAnimRunning = false, uqAnimT = 0, uqAnimId = null;

// ── 왼쪽: 유일성 성립 (y' = y, y(0) = 0 → 해: y = 0 하나) ──
function drawUniqOk(tCursor){
  const w = uqOkCvs.width, h = uqOkCvs.height;
  const pad = 40;
  uqOkCtx.clearRect(0,0,w,h);
  uqOkCtx.fillStyle = getCSS('--canvas-bg');
  uqOkCtx.fillRect(0,0,w,h);

  const xmin = -1, xmax = 4, ymin = -1.5, ymax = 3;
  function toS(x,y){
    return [pad + (x-xmin)/(xmax-xmin)*(w-pad*2), (h-pad) - (y-ymin)/(ymax-ymin)*(h-pad*2)];
  }

  // grid
  uqOkCtx.strokeStyle = getCSS('--canvas-axis');
  uqOkCtx.lineWidth = 0.5;
  for(let gx = Math.ceil(xmin); gx <= xmax; gx++){
    const [sx] = toS(gx, 0);
    uqOkCtx.beginPath(); uqOkCtx.moveTo(sx, pad); uqOkCtx.lineTo(sx, h-pad); uqOkCtx.stroke();
  }
  for(let gy = Math.ceil(ymin); gy <= ymax; gy++){
    const [,sy] = toS(0, gy);
    uqOkCtx.beginPath(); uqOkCtx.moveTo(pad, sy); uqOkCtx.lineTo(w-pad, sy); uqOkCtx.stroke();
  }

  // axes
  uqOkCtx.strokeStyle = getCSS('--canvas-axis'); uqOkCtx.lineWidth = 1.5;
  uqOkCtx.beginPath();
  let [ax0,ay0] = toS(xmin,0); let [ax1,ay1] = toS(xmax,0);
  uqOkCtx.moveTo(ax0,ay0); uqOkCtx.lineTo(ax1,ay1);
  [ax0,ay0] = toS(0,ymin); [ax1,ay1] = toS(0,ymax);
  uqOkCtx.moveTo(ax0,ay0); uqOkCtx.lineTo(ax1,ay1);
  uqOkCtx.stroke();
  uqOkCtx.fillStyle = getCSS('--canvas-label'); uqOkCtx.font = '12px sans-serif';
  uqOkCtx.fillText('x', w-pad+5, toS(0,0)[1]-5);
  uqOkCtx.fillText('y', toS(0,0)[0]+5, pad-5);

  // 해: y = 0 (유일한 해) — 굵은 초록
  const okColor = getCSS('--accent3');
  uqOkCtx.strokeStyle = okColor; uqOkCtx.lineWidth = 3;
  uqOkCtx.beginPath();
  const [lx0,ly0] = toS(xmin, 0); const [lx1,ly1] = toS(xmax, 0);
  uqOkCtx.moveTo(lx0,ly0); uqOkCtx.lineTo(lx1,ly1);
  uqOkCtx.stroke();

  // label
  uqOkCtx.fillStyle = okColor; uqOkCtx.font = 'bold 14px sans-serif';
  uqOkCtx.fillText('y = 0 (유일한 해)', toS(1.5,0)[0], toS(1.5,0.2)[1]);

  // "다른 해 후보"가 없음을 보여줌: y = Ce^x (C≠0)은 y(0)=0 불만족
  uqOkCtx.setLineDash([4,4]);
  uqOkCtx.lineWidth = 1.2;
  const ghostCs = [0.3, -0.3, 0.8, -0.5];
  ghostCs.forEach(C => {
    uqOkCtx.strokeStyle = 'rgba(150,150,170,0.3)';
    uqOkCtx.beginPath();
    let first = true;
    for(let x = xmin; x <= xmax; x += 0.04){
      const y = C * Math.exp(x);
      if(y > ymax || y < ymin) { first = true; continue; }
      const [sx,sy] = toS(x,y);
      if(first){ uqOkCtx.moveTo(sx,sy); first=false; } else uqOkCtx.lineTo(sx,sy);
    }
    uqOkCtx.stroke();
  });
  uqOkCtx.setLineDash([]);
  uqOkCtx.fillStyle = 'rgba(150,150,170,0.5)'; uqOkCtx.font = '11px sans-serif';
  uqOkCtx.fillText('y=Ce^x (C≠0): y(0)≠0 → 탈락', toS(0.5, 2.2)[0], toS(0.5, 2.2)[1]);

  // origin dot
  const [ox,oy] = toS(0,0);
  uqOkCtx.fillStyle = okColor;
  uqOkCtx.beginPath(); uqOkCtx.arc(ox,oy,7,0,Math.PI*2); uqOkCtx.fill();
  uqOkCtx.fillStyle = getCSS('--canvas-bg'); uqOkCtx.font = 'bold 10px sans-serif';
  uqOkCtx.fillText('출발', ox-10, oy+3);

  // animated dot
  if(tCursor !== undefined && tCursor >= 0){
    const cx = Math.min(tCursor, xmax);
    const [dx,dy] = toS(cx, 0);
    uqOkCtx.fillStyle = okColor;
    uqOkCtx.beginPath(); uqOkCtx.arc(dx,dy,5,0,Math.PI*2); uqOkCtx.fill();
    uqOkCtx.shadowColor = okColor; uqOkCtx.shadowBlur = 10;
    uqOkCtx.beginPath(); uqOkCtx.arc(dx,dy,5,0,Math.PI*2); uqOkCtx.fill();
    uqOkCtx.shadowBlur = 0;
  }

  // title
  uqOkCtx.fillStyle = okColor; uqOkCtx.font = 'bold 14px sans-serif';
  uqOkCtx.fillText("y' = y,  y(0) = 0", 10, 20);
  uqOkCtx.fillStyle = getCSS('--canvas-label'); uqOkCtx.font = '12px sans-serif';
  uqOkCtx.fillText("하나의 길만 존재", 10, 38);
}

// ── 오른쪽: 유일성 실패 (y' = 3y^(2/3), y(0) = 0) ──
function drawUniqueness(tCursor){
  const w = uqCvs.width, h = uqCvs.height;
  const pad = 40;
  uqCtx.clearRect(0,0,w,h);
  uqCtx.fillStyle = getCSS('--canvas-bg');
  uqCtx.fillRect(0,0,w,h);

  const xmin = -1, xmax = 4, ymin = -1, ymax = 4;
  function toS(x,y){
    return [pad + (x-xmin)/(xmax-xmin)*(w-pad*2), (h-pad) - (y-ymin)/(ymax-ymin)*(h-pad*2)];
  }

  // grid
  uqCtx.strokeStyle = getCSS('--canvas-axis');
  uqCtx.lineWidth = 0.5;
  for(let gx = Math.ceil(xmin); gx <= xmax; gx++){
    const [sx] = toS(gx, 0);
    uqCtx.beginPath(); uqCtx.moveTo(sx, pad); uqCtx.lineTo(sx, h-pad); uqCtx.stroke();
  }
  for(let gy = Math.ceil(ymin); gy <= ymax; gy++){
    const [,sy] = toS(0, gy);
    uqCtx.beginPath(); uqCtx.moveTo(pad, sy); uqCtx.lineTo(w-pad, sy); uqCtx.stroke();
  }

  // axes
  uqCtx.strokeStyle = getCSS('--canvas-axis'); uqCtx.lineWidth = 1.5;
  uqCtx.beginPath();
  let [a0, a1] = toS(xmin, 0); let [b0, b1] = toS(xmax, 0);
  uqCtx.moveTo(a0, a1); uqCtx.lineTo(b0, b1);
  [a0, a1] = toS(0, ymin); [b0, b1] = toS(0, ymax);
  uqCtx.moveTo(a0, a1); uqCtx.lineTo(b0, b1);
  uqCtx.stroke();
  uqCtx.fillStyle = getCSS('--canvas-label'); uqCtx.font = '12px sans-serif';
  uqCtx.fillText('x', w-pad+5, toS(0,0)[1]-5);
  uqCtx.fillText('y', toS(0,0)[0]+5, pad-5);

  // 각 해 그리기 (c = 출발 시점)
  const solutions = [
    { c: -Infinity, label: 'y = 0 (영원히 정지)', color: getCSS('--accent2'), dash: [6,4] },
    { c: 0,   label: 'y = x³ (즉시 출발)',      color: getCSS('--accent'), dash: [] },
    { c: 0.7, label: 'y: x=0.7부터 출발',       color: getCSS('--accent3'), dash: [] },
    { c: 1.5, label: 'y: x=1.5부터 출발',       color: getCSS('--accent4'), dash: [] },
    { c: 2.5, label: 'y: x=2.5부터 출발',       color: '#9b59b6', dash: [] },
  ];

  solutions.forEach((sol, idx) => {
    uqCtx.strokeStyle = sol.color;
    uqCtx.lineWidth = idx === 0 ? 3 : 2.2;
    uqCtx.setLineDash(sol.dash);
    uqCtx.beginPath();
    let first = true;
    const drawMax = (tCursor !== undefined && tCursor >= 0) ? Math.min(tCursor, xmax) : xmax;
    for(let x = xmin; x <= drawMax; x += 0.02){
      let y;
      if(sol.c === -Infinity) y = 0;
      else if(x <= sol.c) y = 0;
      else y = Math.pow(x - sol.c, 3);
      if(y > ymax + 0.5) { first = true; continue; }
      const [px, py] = toS(x, y);
      if(first){ uqCtx.moveTo(px, py); first = false; }
      else uqCtx.lineTo(px, py);
    }
    uqCtx.stroke();
    uqCtx.setLineDash([]);

    // animated dot on each curve
    if(tCursor !== undefined && tCursor >= 0){
      const cx = Math.min(tCursor, xmax);
      let cy;
      if(sol.c === -Infinity) cy = 0;
      else if(cx <= sol.c) cy = 0;
      else cy = Math.pow(cx - sol.c, 3);
      if(cy <= ymax + 0.5){
        const [dx,dy] = toS(cx, cy);
        uqCtx.fillStyle = sol.color;
        uqCtx.beginPath(); uqCtx.arc(dx,dy,4,0,Math.PI*2); uqCtx.fill();
      }
    }
  });

  // 분기 표시 화살표들
  if(tCursor === undefined || tCursor < 0){
    solutions.forEach((sol, idx) => {
      if(idx === 0 || sol.c > 3) return;
      const [bx, by] = toS(sol.c, 0);
      uqCtx.fillStyle = sol.color;
      uqCtx.beginPath();
      uqCtx.moveTo(bx, by-8); uqCtx.lineTo(bx+5, by-16); uqCtx.lineTo(bx-5, by-16);
      uqCtx.fill();
    });
  }

  // 범례
  const legendX = 10, legendY = 20;
  uqCtx.font = 'bold 14px sans-serif';
  uqCtx.fillStyle = getCSS('--accent2');
  uqCtx.fillText("y' = 3y^(2/3),  y(0) = 0", legendX, legendY);
  uqCtx.fillStyle = getCSS('--canvas-label'); uqCtx.font = '12px sans-serif';
  uqCtx.fillText("같은 출발점 → 여러 갈래!", legendX, legendY + 18);

  solutions.forEach((sol, i) => {
    const ly = h - pad + 18 + i * 15;
    if(ly > h - 5) return;
    uqCtx.fillStyle = sol.color; uqCtx.font = '11px sans-serif';
    uqCtx.fillRect(legendX, ly - 8, 12, 3);
    uqCtx.fillText(sol.label, legendX + 18, ly - 3);
  });

  // origin dot
  const [ox, oy] = toS(0, 0);
  uqCtx.fillStyle = getCSS('--accent2');
  uqCtx.beginPath(); uqCtx.arc(ox, oy, 7, 0, Math.PI*2); uqCtx.fill();
  uqCtx.fillStyle = getCSS('--canvas-bg'); uqCtx.font = 'bold 10px sans-serif';
  uqCtx.fillText('출발', ox-10, oy+3);
}

function toggleUqAnim(){
  if(uqAnimRunning){ stopUqAnim(); return; }
  uqAnimRunning = true; uqAnimT = -0.5;
  document.getElementById('uqAnimBtn').textContent = '일시정지';
  document.getElementById('uqDesc').textContent = '같은 출발점에서 해들이 서로 다른 경로로 갈라집니다';
  function step(){
    uqAnimT += 0.025;
    if(uqAnimT > 5){ uqAnimT = -0.5; }
    drawUniqOk(uqAnimT);
    drawUniqueness(uqAnimT);
    uqAnimId = requestAnimationFrame(step);
  }
  step();
}
function stopUqAnim(){
  uqAnimRunning = false;
  if(uqAnimId) cancelAnimationFrame(uqAnimId);
  document.getElementById('uqAnimBtn').textContent = '애니메이션 시작';
}
function resetUqAnim(){
  stopUqAnim();
  uqAnimT = -1;
  drawUniqOk();
  drawUniqueness();
  document.getElementById('uqDesc').textContent = '버튼을 눌러 같은 출발점에서 해가 어떻게 진행하는지 비교하세요';
}
drawUniqOk();
drawUniqueness();
