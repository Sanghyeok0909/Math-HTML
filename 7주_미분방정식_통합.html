let graphMode = 'compare';
function setGraphMode(mode) {
  graphMode = mode;
  document.getElementById('btnCompare').classList.toggle('active', mode==='compare');
  document.getElementById('btnScale').classList.toggle('active', mode==='scale');
  document.getElementById('btnAdd').classList.toggle('active', mode==='add');
  updateGraphExplain();
  drawGraph();
}
function updateGraphExplain() {
  const el = document.getElementById('graphExplain');
  if (graphMode === 'compare') {
    el.innerHTML = '<strong>그래프 비교:</strong> 선형 함수 \\(f(x)=2x\\)(파랑)는 원점을 지나는 직선이다. 비선형 함수 \\(g(x)=x^2\\)(분홍)은 곡선이다. 아핀 함수 \\(h(x)=3x+1\\)(노랑 점선)은 직선이지만 원점을 지나지 않으므로 선형이 아니다.';
  } else if (graphMode === 'scale') {
    el.innerHTML = '<strong>동차성 검증 (c=2, a=1):</strong> 선형 \\(f(x)=2x\\)에서 \\(f(2 \\times 1)=4\\)이고, \\(2 \\times f(1)=2 \\times 2=4\\)로 같다 <span class="yes">\u2713</span>. 비선형 \\(g(x)=x^2\\)에서 \\(g(2 \\times 1)=4\\)이고, \\(2 \\times g(1)=2 \\times 1=2\\)로 다르다 <span class="no">\u2717</span>. 그래프의 점 위치로 이를 확인하라.';
  } else {
    el.innerHTML = '<strong>가법성 검증 (a=1, b=1):</strong> 선형 \\(f(x)=2x\\)에서 \\(f(1+1)=f(2)=4\\)이고, \\(f(1)+f(1)=2+2=4\\)로 같다 <span class="yes">\u2713</span>. 비선형 \\(g(x)=x^2\\)에서 \\(g(1+1)=g(2)=4\\)이고, \\(g(1)+g(1)=1+1=2\\)로 다르다 <span class="no">\u2717</span>. 그래프의 점 위치로 이를 확인하라.';
  }
  if (typeof renderMathInElement === 'function') renderMathInElement(el, {delimiters:[{left:'\\(',right:'\\)',display:false}],throwOnError:false});
}

function drawGraph() {
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cl = C();
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle = cl.canvasBg;
  ctx.fillRect(0,0,W,H);

  const cx = W/2, cy = H/2;
  const scaleX = 40, scaleY = 40;

  // Grid
  ctx.strokeStyle = cl.grid;
  ctx.lineWidth = 1;
  for (let gx = -10; gx <= 10; gx++) {
    const px = cx + gx * scaleX;
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,H); ctx.stroke();
  }
  for (let gy = -6; gy <= 6; gy++) {
    const py = cy - gy * scaleY;
    ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(W,py); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = cl.axes;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();

  // Axis labels
  ctx.fillStyle = cl.labels;
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  for (let gx = -9; gx <= 9; gx++) {
    if (gx === 0) continue;
    ctx.fillText(gx, cx + gx*scaleX, cy + 18);
  }
  ctx.textAlign = 'right';
  for (let gy = -5; gy <= 5; gy++) {
    if (gy === 0) continue;
    ctx.fillText(gy, cx - 8, cy - gy*scaleY + 4);
  }

  function plotFunc(fn, color, dash=[]) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.setLineDash(dash);
    ctx.beginPath();
    let first = true;
    for (let px = 0; px < W; px++) {
      const x = (px - cx) / scaleX;
      const y = fn(x);
      const py = cy - y * scaleY;
      if (py < -200 || py > H + 200) { first = true; continue; }
      if (first) { ctx.moveTo(px, py); first = false; }
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  }

  function drawPoint(x, y, color, label) {
    const px = cx + x * scaleX;
    const py = cy - y * scaleY;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2); ctx.fill();
    if (label) {
      ctx.font = '13px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(label, px + 8, py - 8);
    }
  }

  const caption = document.getElementById('graphCaption');

  if (graphMode === 'compare') {
    plotFunc(x => 2*x, cl.blue);
    plotFunc(x => x*x, cl.pink);
    plotFunc(x => 3*x+1, cl.yellow, [6,4]);
    caption.innerHTML = '파랑: \\(f(x)=2x\\) (선형) | 분홍: \\(g(x)=x^2\\) (비선형) | 노랑 점선: \\(h(x)=3x+1\\) (아핀, 비선형!)';
    if (typeof renderMathInElement === 'function') renderMathInElement(caption, {delimiters:[{left:'\\(',right:'\\)',display:false}],throwOnError:false});
  }
  else if (graphMode === 'scale') {
    const c = 2, a = 1;
    plotFunc(x => 2*x, cl.blue);
    plotFunc(x => x*x, cl.pink);
    drawPoint(a, 2*a, cl.blue, `f(${a})=${2*a}`);
    drawPoint(c*a, 2*c*a, cl.green, `f(${c}\u00D7${a})=${2*c*a}`);
    drawPoint(a, a*a, cl.pink, `g(${a})=${a*a}`);
    drawPoint(c*a, (c*a)**2, cl.yellow, `g(${c}\u00D7${a})=${(c*a)**2}`);

    ctx.font = '14px sans-serif';
    ctx.fillStyle = cl.green;
    ctx.textAlign = 'left';
    ctx.fillText(`f: ${c}\u00D7f(${a})=${c}\u00D7${2*a}=${2*c*a} = f(${c*a}) \u2713`, 20, 30);
    ctx.fillStyle = cl.pink;
    ctx.fillText(`g: ${c}\u00D7g(${a})=${c}\u00D7${a*a}=${c*a*a} \u2260 g(${c*a})=${(c*a)**2} \u2717`, 20, 55);
    caption.innerHTML = '동차성 검증: f(cx) = c\u00B7f(x)가 선형에서만 성립';
  }
  else if (graphMode === 'add') {
    const a = 1, b = 1;
    plotFunc(x => 2*x, cl.blue);
    plotFunc(x => x*x, cl.pink);
    drawPoint(a, 2*a, cl.blue, `f(${a})=${2*a}`);
    drawPoint(a+b, 2*(a+b), cl.green, `f(${a}+${b})=${2*(a+b)}`);
    drawPoint(a, a*a, cl.pink, `g(${a})=${a*a}`);
    drawPoint(a+b, (a+b)**2, cl.yellow, `g(${a}+${b})=${(a+b)**2}`);

    ctx.font = '14px sans-serif';
    ctx.fillStyle = cl.green;
    ctx.textAlign = 'left';
    ctx.fillText(`f: f(${a})+f(${b})=${2*a}+${2*b}=${2*a+2*b} = f(${a+b}) \u2713`, 20, 30);
    ctx.fillStyle = cl.pink;
    ctx.fillText(`g: g(${a})+g(${b})=${a*a}+${b*b}=${a*a+b*b} \u2260 g(${a+b})=${(a+b)**2} \u2717`, 20, 55);
    caption.innerHTML = '가법성 검증: f(x+y) = f(x)+f(y)가 선형에서만 성립';
  }
}

// ============================================================
//  Section 4: Linear Transformation Grid
// ============================================================
let transformT = 0; // 0 = identity, 1 = transformed
let transformAnimating = false;
let transformTarget = null;

const transforms = {
  rotate: { name:'회전 45\u00B0', m: [Math.cos(Math.PI/4), -Math.sin(Math.PI/4), Math.sin(Math.PI/4), Math.cos(Math.PI/4)] },
  shear: { name:'전단', m: [1, 0.8, 0, 1] },
  scale: { name:'스케일', m: [2, 0, 0, 0.5] },
  reflect: { name:'y축 반사', m: [-1, 0, 0, 1] },
  project: { name:'x축 사영', m: [1, 0, 0, 0] },
};

function updateTransform() {
  transformT = 0;
  drawTransformGrid();
}

function resetTransform() {
  transformT = 0;
  transformAnimating = false;
  drawTransformGrid();
}

function animateTransform() {
  if (transformAnimating) return;
  const sel = document.getElementById('transformSelect').value;
  transformTarget = transforms[sel].m;
  transformAnimating = true;
  transformT = 0;
  function step() {
    transformT += 0.02;
    if (transformT >= 1) { transformT = 1; transformAnimating = false; }
    drawTransformGrid();
    if (transformAnimating) requestAnimationFrame(step);
  }
  step();
}

function drawTransformGrid() {
  const canvas = document.getElementById('transformCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cl = C();
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = cl.canvasBg;
  ctx.fillRect(0,0,W,H);

  const cx = W/2, cy = H/2;
  const s = 50; // grid scale

  const sel = document.getElementById('transformSelect').value;
  const m = transforms[sel].m;
  const t = transformT;

  // Interpolate: I*(1-t) + M*t
  const a = 1*(1-t) + m[0]*t;
  const b = 0*(1-t) + m[1]*t;
  const c2 = 0*(1-t) + m[2]*t;
  const d = 1*(1-t) + m[3]*t;

  function applyT(x, y) {
    return [a*x + b*y, c2*x + d*y];
  }

  // Draw transformed grid lines
  const range = 5;

  // Vertical lines
  for (let i = -range; i <= range; i++) {
    ctx.strokeStyle = i === 0 ? cl.gridStrong : cl.grid;
    ctx.lineWidth = i === 0 ? 2 : 1;
    ctx.beginPath();
    for (let j = -range; j <= range; j++) {
      const [tx, ty] = applyT(i, j);
      const px = cx + tx * s;
      const py = cy - ty * s;
      if (j === -range) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  // Horizontal lines
  for (let j = -range; j <= range; j++) {
    ctx.strokeStyle = j === 0 ? cl.gridStrong : cl.grid;
    ctx.lineWidth = j === 0 ? 2 : 1;
    ctx.beginPath();
    for (let i = -range; i <= range; i++) {
      const [tx, ty] = applyT(i, j);
      const px = cx + tx * s;
      const py = cy - ty * s;
      if (i === -range) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  // Draw grid points
  for (let i = -range; i <= range; i++) {
    for (let j = -range; j <= range; j++) {
      const [tx, ty] = applyT(i, j);
      const px = cx + tx * s;
      const py = cy - ty * s;
      ctx.fillStyle = (i===0 && j===0) ? cl.originPt : cl.gridPt;
      ctx.beginPath();
      ctx.arc(px, py, (i===0 && j===0) ? 5 : 2.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Basis vectors
  const [e1x, e1y] = applyT(1, 0);
  const [e2x, e2y] = applyT(0, 1);

  function drawArrow(fx, fy, tx, ty, color) {
    const px1 = cx + fx*s, py1 = cy - fy*s;
    const px2 = cx + tx*s, py2 = cy - ty*s;
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(px1,py1); ctx.lineTo(px2,py2); ctx.stroke();
    // Arrowhead
    const angle = Math.atan2(py1-py2, px2-px1);
    const headLen = 12;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(px2, py2);
    ctx.lineTo(px2 - headLen*Math.cos(angle-0.3), py2 + headLen*Math.sin(angle-0.3));
    ctx.lineTo(px2 - headLen*Math.cos(angle+0.3), py2 + headLen*Math.sin(angle+0.3));
    ctx.fill();
  }

  drawArrow(0, 0, e1x, e1y, cl.green);
  drawArrow(0, 0, e2x, e2y, cl.yellow);

  // Labels
  ctx.font = 'bold 14px sans-serif';
  ctx.fillStyle = cl.green;
  ctx.textAlign = 'center';
  ctx.fillText('e\u2081', cx + e1x*s + 15, cy - e1y*s - 10);
  ctx.fillStyle = cl.yellow;
  ctx.fillText('e\u2082', cx + e2x*s + 15, cy - e2y*s - 10);

  // Matrix display
  ctx.fillStyle = cl.matrixText;
  ctx.font = '13px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`A = [${a.toFixed(2)}, ${b.toFixed(2)}]`, 15, 25);
  ctx.fillText(`    [${c2.toFixed(2)}, ${d.toFixed(2)}]`, 15, 42);
  ctx.fillText(`t = ${t.toFixed(2)}`, 15, 62);

  // Caption
  const capEl = document.getElementById('transformCaption');
  capEl.textContent = `${transforms[sel].name} 변환. 직선\u2192직선, 원점\u2192원점 유지 (선형변환의 특성)`;
}

// ============================================================
//  Section 6: Wave Superposition
// ============================================================
let waveAnimFrame = null;
let waveTime = 0;

function updateWave() {
  document.getElementById('c1Val').textContent = parseFloat(document.getElementById('c1Slider').value).toFixed(1);
  document.getElementById('c2Val').textContent = parseFloat(document.getElementById('c2Slider').value).toFixed(1);
  document.getElementById('freq1Val').textContent = parseFloat(document.getElementById('freq1Slider').value).toFixed(1);
  document.getElementById('freq2Val').textContent = parseFloat(document.getElementById('freq2Slider').value).toFixed(1);
}

function drawWave() {
  const canvas = document.getElementById('waveCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const c1 = parseFloat(document.getElementById('c1Slider').value);
  const c2 = parseFloat(document.getElementById('c2Slider').value);
  const f1 = parseFloat(document.getElementById('freq1Slider').value);
  const f2 = parseFloat(document.getElementById('freq2Slider').value);

  const cl = C();
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = cl.canvasBg;
  ctx.fillRect(0,0,W,H);

  const cy1 = H * 0.22;
  const cy2 = H * 0.50;
  const cy3 = H * 0.78;
  const amp = H * 0.14;

  // Draw section lines
  ctx.strokeStyle = cl.dimLine;
  ctx.lineWidth = 1;
  [H*0.36, H*0.64].forEach(ly => {
    ctx.beginPath(); ctx.moveTo(0,ly); ctx.lineTo(W,ly); ctx.stroke();
  });

  // Center lines
  ctx.strokeStyle = cl.dimLine2;
  ctx.lineWidth = 1;
  [cy1, cy2, cy3].forEach(cy => {
    ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
  });

  // Labels
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillStyle = cl.blue;
  ctx.fillText(`c\u2081\u00B7y\u2081 = ${c1.toFixed(1)}\u00B7sin(${f1.toFixed(1)}x)`, 10, cy1 - amp - 8);
  ctx.fillStyle = cl.pink;
  ctx.fillText(`c\u2082\u00B7y\u2082 = ${c2.toFixed(1)}\u00B7sin(${f2.toFixed(1)}x)`, 10, cy2 - amp - 8);
  ctx.fillStyle = cl.green;
  ctx.fillText(`c\u2081y\u2081 + c\u2082y\u2082 (중첩)`, 10, cy3 - amp - 8);

  function wave1(x) { return c1 * Math.sin(f1 * x + waveTime); }
  function wave2(x) { return c2 * Math.sin(f2 * x + waveTime * 0.7); }

  function plotWave(fn, centerY, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    for (let px = 0; px < W; px++) {
      const x = (px / W) * 4 * Math.PI;
      const y = fn(x);
      const py = centerY - y * amp;
      if (px === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  plotWave(wave1, cy1, cl.blue);
  plotWave(wave2, cy2, cl.pink);
  plotWave(x => wave1(x) + wave2(x), cy3, cl.green);

  waveTime += 0.03;
  waveAnimFrame = requestAnimationFrame(drawWave);
}

// Start wave animation when section is visible
const waveObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      if (!waveAnimFrame) drawWave();
    } else {
      if (waveAnimFrame) { cancelAnimationFrame(waveAnimFrame); waveAnimFrame = null; }
    }
  });
}, { threshold: 0.1 });
document.addEventListener('DOMContentLoaded', () => {
  waveObserver.observe(document.getElementById('waveCanvas'));
});

//  Initial checker run
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  runChecker();
});

<!-- Hero -->
<section class="hero">
  <h1>경계조건 & 초기조건</h1>
  <p class="subtitle">미분방정식의 무한한 해 중에서 <strong>딱 하나의 해</strong>를 골라내는 조건들</p>
  <div class="formula-hero">
    $$\text{미분방정식} + \text{조건(IC/BC)} \;\longrightarrow\; \text{유일한 해}$$
  </div>
  <div class="scroll-hint">scroll down</div>

<!-- Section 1: Why -->
<section class="section" id="why">
  <h2 class="section-title">왜 조건이 필요한가?</h2>
  <p class="section-subtitle">미분방정식만으로는 해가 하나로 정해지지 않는다</p>

  <div class="card">
    <h3>일반해는 무한히 많다</h3>
    <p>미분방정식을 풀면 <span class="hl">적분상수</span>가 포함된 <strong>일반해(General Solution)</strong>를 얻습니다. 이 상수의 값에 따라 해가 무한히 많아집니다.</p>
    <div class="formula-box">
      $$y' = y \quad\Longrightarrow\quad y = Ce^{x} \quad (C\text{는 임의의 상수})$$
    </div>
    <p>\(C = 1, 2, -3, 0.5, \ldots\) 등 어떤 값이든 가능하므로, <strong>무한히 많은 곡선</strong>이 모두 해가 됩니다. 이 중에서 우리가 원하는 <strong>하나의 특수해(Particular Solution)</strong>를 골라내려면 추가 조건이 필요합니다.</p>
  </div>

  <div class="analogy-box">
    <div class="analogy-title">비유로 이해하기</div>
    <p><strong>초기조건</strong>은 "이 공은 t=0일 때 높이 5m에서 속도 3m/s로 출발한다" — <span class="hl">어디서 출발하는가?</span></p>
    <p><strong>경계조건</strong>은 "이 줄의 양 끝은 벽에 고정되어 있다" — <span class="hl2">양 끝이 어떻게 구속되는가?</span></p>
  </div>

  <!-- Interactive: y = Ce^x with slider -->
  <div class="canvas-container">
    <h4>Interactive: \(y' = y\) 의 해 \(y = Ce^x\)</h4>
    <canvas id="canvas-why" height="360"></canvas>
    <div class="slider-group">
      <label>C 값 선택:</label>
      <input type="range" id="slider-C" min="-3" max="3" step="0.1" value="1">
      <span class="slider-val" id="val-C">1.0</span>
    </div>
    <p style="color:var(--text-dim); font-size:0.88rem; margin-top:0.8rem;">
      회색 곡선 = 다양한 \(C\)값의 일반해 &nbsp;|&nbsp; <span style="color:var(--accent);">파란 곡선</span> = 선택된 특수해 &nbsp;|&nbsp; <span style="color:var(--accent2);">분홍 점</span> = 초기조건 \(y(0) = C\)
    </p>
  </div>
</section>

<!-- Section 2: Initial Conditions -->
<section class="section" id="ic">
  <h2 class="section-title">초기조건 (Initial Conditions)</h2>
  <p class="section-subtitle">하나의 시점에서 함수와 도함수의 값을 지정하여 해를 결정한다</p>

  <div class="card">
    <h3>정의</h3>
    <p><strong>초기조건(Initial Condition)</strong>이란 독립변수의 <span class="hl">한 점</span>(보통 \(t = 0\))에서 함수값과 그 도함수값을 지정하는 것입니다.</p>
    <div class="formula-box">
      $$y(t_0) = y_0, \quad y'(t_0) = y_1, \quad y''(t_0) = y_2, \;\ldots$$
    </div>
    <p><strong>핵심 원리:</strong> \(n\)차 ODE에는 정확히 <span class="hl">\(n\)개</span>의 초기조건이 필요합니다. 이것이 바로 <strong>초기값 문제(IVP, Initial Value Problem)</strong>입니다.</p>
  </div>

  <div class="card accent3">
    <h3>존재 & 유일성 정리 (Picard-Lindelof)</h3>
    <p>\(y' = f(t, y)\)에서 \(f\)가 연속이고 \(y\)에 대해 립시츠 조건을 만족하면, 초기조건 \(y(t_0) = y_0\)을 만족하는 해가 <strong>유일하게 존재</strong>합니다.</p>
    <div class="formula-box">
      $$\text{IVP: } \begin{cases} y' = f(t, y) \\ y(t_0) = y_0 \end{cases} \quad \Longrightarrow \quad \text{유일한 해 존재}$$
    </div>
  </div>

  <h3 style="margin: 2rem 0 1rem; color: var(--accent4);">실생활 예시</h3>
  <div class="grid-2">
    <div class="card">
      <h3>스프링-질량 시스템</h3>
      <div class="formula-box" style="font-size:1rem;">$$my'' + ky = 0$$</div>
      <p>초기조건: 초기 <span class="hl">변위</span> \(y(0)\)와 초기 <span class="hl">속도</span> \(y'(0)\)이 운동을 유일하게 결정</p>
    </div>

    <div class="card accent3">
      <h3>인구 모델</h3>
      <div class="formula-box" style="font-size:1rem;">$$P' = rP$$</div>
      <p>초기조건: 초기 <span class="hl3">인구</span> \(P(0) = P_0\)이 미래 인구를 결정</p>
    </div>
  </div>

  <!-- Interactive: 2nd order ODE -->
  <div class="canvas-container">
    <h4>Interactive: \(y'' + y = 0\) 의 해 (초기조건에 따른 변화)</h4>
    <canvas id="canvas-ic" height="360"></canvas>
    <div class="slider-group">
      <label>\(y(0)\) =</label>
      <input type="range" id="slider-y0" min="-2" max="2" step="0.1" value="1">
      <span class="slider-val" id="val-y0">1.0</span>
    </div>
    <div class="slider-group">
      <label>\(y'(0)\) =</label>
      <input type="range" id="slider-yp0" min="-2" max="2" step="0.1" value="0">
      <span class="slider-val" id="val-yp0">0.0</span>
    </div>
    <p style="color:var(--text-dim); font-size:0.88rem; margin-top:0.8rem;">
      해: \(y(t) = y(0)\cos t + y'(0)\sin t\). 두 슬라이더로 초기조건을 바꿔보세요.
    </p>
  </div>
</section>

<!-- Section 3: Boundary Conditions -->
<section class="section" id="bc">
  <h2 class="section-title">경계조건 (Boundary Conditions)</h2>
  <p class="section-subtitle">서로 다른 위치에서 함수/도함수 값을 지정하여 해를 구속한다</p>

  <div class="card">
    <h3>정의</h3>
    <p><strong>경계조건(Boundary Condition)</strong>이란 독립변수의 <span class="hl2">서로 다른 두 점 이상</span>(예: \(x = a\)와 \(x = b\))에서 조건을 부여하는 것입니다.</p>
    <div class="formula-box">
      $$\text{BVP: } \begin{cases} y'' + p(x)y' + q(x)y = g(x) \\ y(a) = \alpha, \quad y(b) = \beta \end{cases}$$
    </div>
    <p>초기조건과 달리 <strong>한 점</strong>이 아닌 <strong>여러 점</strong>에서 조건을 줍니다. 이를 <strong>경계값 문제(BVP, Boundary Value Problem)</strong>라 합니다.</p>
  </div>

  <h3 style="margin: 2rem 0 1rem; color: var(--accent2);">경계조건의 종류</h3>
  <div class="bc-type-grid">
    <div class="bc-type-card">
      <h4 style="color: var(--accent);">디리클레 (Dirichlet)</h4>
      <div class="bc-formula">$$y(a) = \alpha, \quad y(b) = \beta$$</div>
      <p>함수 <strong>값 자체</strong>를 지정. "양 끝의 온도를 고정" 또는 "현의 양 끝을 고정"</p>
    </div>
    <div class="bc-type-card">
      <h4 style="color: var(--accent2);">노이만 (Neumann)</h4>
      <div class="bc-formula">$$y'(a) = \alpha, \quad y'(b) = \beta$$</div>
      <p><strong>도함수</strong>(기울기/유량)를 지정. "단열 벽면" (\(y'=0\)) 또는 "열 유입량 고정"</p>
    </div>
    <div class="bc-type-card">
      <h4 style="color: var(--accent3);">로빈 (Robin / 혼합)</h4>
      <div class="bc-formula">$$\alpha y(a) + \beta y'(a) = \gamma$$</div>
      <p>함수값과 도함수의 <strong>선형결합</strong>. "대류 열전달" 등 물리적 상황</p>
    </div>
    <div class="bc-type-card">
      <h4 style="color: var(--accent4);">주기적 (Periodic)</h4>
      <div class="bc-formula">$$y(a) = y(b), \quad y'(a) = y'(b)$$</div>
      <p>양 끝 값이 <strong>같다</strong>. 원형 영역, 주기 함수 등</p>
    </div>
  </div>

  <div class="analogy-box" style="margin-top: 2rem;">
    <div class="analogy-title">물리적 의미</div>
    <p><strong>디리클레:</strong> 금속 막대 양 끝의 온도를 100°C와 0°C로 고정 &rarr; 정상 상태 온도 분포</p>
    <p><strong>노이만:</strong> 막대의 한쪽 끝을 단열 (열 흐름 = 0) &rarr; \(y'(0) = 0\)</p>
    <p><strong>로빈:</strong> 막대 끝에서 공기와 대류 열전달 &rarr; 온도와 온도기울기의 결합</p>
  </div>

  <!-- Interactive: String with BC -->
  <div class="canvas-container">
    <h4>Interactive: 양 끝이 고정된 현 (BVP)</h4>
    <canvas id="canvas-bc" height="360"></canvas>
    <div class="slider-group">
      <label>\(y(0)\) =</label>
      <input type="range" id="slider-bc-a" min="-2" max="2" step="0.1" value="0">
      <span class="slider-val" id="val-bc-a">0.0</span>
    </div>
    <div class="slider-group">
      <label>\(y(\pi)\) =</label>
      <input type="range" id="slider-bc-b" min="-2" max="2" step="0.1" value="0">
      <span class="slider-val" id="val-bc-b">0.0</span>
    </div>
    <div class="slider-group">
      <label>n 값:</label>
      <input type="range" id="slider-bc-n" min="0.5" max="5" step="0.5" value="1.5">
      <span class="slider-val" id="val-bc-n">1.5</span>
    </div>
    <p style="color:var(--text-dim); font-size:0.88rem; margin-top:0.8rem;">
      \(y'' + n^2 y = 0\) 의 해에 경계조건 적용. 정수 n에서는 해가 없거나 무한히 많아집니다. 비정수 n을 시도해 보세요.
    </p>
  </div>

  <div class="card accent4" style="margin-top: 1.5rem;">
    <h3>BVP의 특수성: 해가 없거나 무한히 많을 수 있다!</h3>
    <p>IVP와 달리, BVP에서는 해의 존재와 유일성이 <strong>보장되지 않습니다</strong>.</p>
    <div class="grid-2" style="margin-top: 1rem;">
      <div class="formula-box">
        <div style="color:var(--accent2); font-weight:700; margin-bottom:0.5rem;">해가 없는 경우</div>
        $$y'' + y = 0,\; y(0)=0,\; y(\pi)=1$$
        <div style="font-size:0.85rem; color:var(--text-dim); margin-top:0.5rem;">일반해 \(y=A\sin x + B\cos x\)에서 \(y(0)=0 \Rightarrow B=0\), \(y(\pi)=0 \neq 1\). 모순!</div>
      </div>
      <div class="formula-box">
        <div style="color:var(--accent3); font-weight:700; margin-bottom:0.5rem;">해가 무한히 많은 경우</div>
        $$y'' + y = 0,\; y(0)=0,\; y(\pi)=0$$
        <div style="font-size:0.85rem; color:var(--text-dim); margin-top:0.5rem;">\(y=A\sin x\)가 모든 \(A\)에 대해 성립. 무한히 많은 해!</div>
      </div>
    </div>
  </div>
</section>

<!-- Section 4: Compare -->
<section class="section" id="compare">
  <h2 class="section-title">초기조건 vs 경계조건</h2>
  <p class="section-subtitle">핵심 차이를 한눈에 비교</p>

  <div class="card" style="overflow-x: auto;">
    <table class="comp-table">
      <thead>
        <tr>
          <th>구분</th>
          <th><span class="tag ic">IC</span> 초기조건</th>
          <th><span class="tag bc">BC</span> 경계조건</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>조건 부여 위치</td>
          <td><strong>한 점</strong> (보통 \(t = 0\))</td>
          <td><strong>두 점 이상</strong> (\(x = a, b\))</td>
        </tr>
        <tr>
          <td>대표 문제</td>
          <td>IVP (Initial Value Problem)</td>
          <td>BVP (Boundary Value Problem)</td>
        </tr>
        <tr>
          <td>주 사용 맥락</td>
          <td>ODE, 시간에 따른 변화</td>
          <td>ODE/PDE, 공간 분포</td>
        </tr>
        <tr>
          <td>해의 존재·유일성</td>
          <td>조건 만족 시 <span class="hl3">거의 보장</span></td>
          <td><span class="hl2">보장되지 않을 수 있음</span></td>
        </tr>
        <tr>
          <td>물리적 의미</td>
          <td>초기 상태 (위치, 속도, ...)</td>
          <td>공간적 구속 (고정, 단열, ...)</td>
        </tr>
        <tr>
          <td>독립변수 해석</td>
          <td>시간 (\(t\))</td>
          <td>공간 (\(x\))</td>
        </tr>
        <tr>
          <td>조건의 수 (n차)</td>
          <td>\(n\)개, 모두 한 점에서</td>
          <td>\(n\)개, 여러 점에 분배</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="grid-2">
    <div class="card">
      <h3>IVP 시각적 이해</h3>
      <p>하나의 시작점에서 곡선이 <span class="hl">"앞으로 진행"</span>합니다. 초기 위치와 기울기를 정하면 곡선이 유일하게 결정됩니다.</p>
      <div class="formula-box" style="font-size: 1rem;">
        $$\underset{\text{시작점}}{\bullet} \longrightarrow \underset{\text{해 곡선}}{\sim\sim\sim\sim}$$
      </div>
    </div>
    <div class="card accent2">
      <h3>BVP 시각적 이해</h3>
      <p>양 끝점이 <span class="hl2">"고정"</span>되어 있고, 그 사이의 곡선 모양을 찾습니다. 마치 양 끝이 묶인 줄의 형태를 결정하는 것과 같습니다.</p>
      <div class="formula-box" style="font-size: 1rem;">
        $$\underset{y(a)=\alpha}{\bullet} \sim\sim\sim\sim \underset{y(b)=\beta}{\bullet}$$
      </div>
    </div>
  </div>
</section>

<!-- Section 5: PDE -->
<section class="section" id="pde">
  <h2 class="section-title">PDE에서의 조건</h2>
  <p class="section-subtitle">편미분방정식에서는 초기조건과 경계조건을 동시에 사용한다</p>

  <div class="card">
    <h3>왜 둘 다 필요한가?</h3>
    <p>PDE는 보통 <span class="hl">시간</span>과 <span class="hl2">공간</span> 두 가지 독립변수를 가집니다. 시간 방향에는 <span class="tag ic">IC</span>, 공간 방향에는 <span class="tag bc">BC</span>가 필요합니다.</p>
  </div>

  <div class="grid-2" style="margin-top: 1.5rem;">
    <div class="card accent4">
      <h3>열 방정식 (Heat Equation)</h3>
      <div class="formula-box" style="font-size: 1.1rem;">
        $$\frac{\partial u}{\partial t} = k\frac{\partial^2 u}{\partial x^2}$$
      </div>
      <p><span class="tag ic">IC</span> \(u(x,0) = f(x)\) — 초기 온도 분포</p>
      <p><span class="tag bc">BC</span> \(u(0,t)=0,\; u(L,t)=0\) — 양 끝 온도 고정</p>
    </div>
    <div class="card accent5">
      <h3>파동 방정식 (Wave Equation)</h3>
      <div class="formula-box" style="font-size: 1.1rem;">
        $$\frac{\partial^2 u}{\partial t^2} = c^2\frac{\partial^2 u}{\partial x^2}$$
      </div>
      <p><span class="tag ic">IC</span> \(u(x,0) = f(x),\; u_t(x,0) = g(x)\)</p>
      <p><span class="tag bc">BC</span> \(u(0,t)=0,\; u(L,t)=0\) — 양 끝 고정</p>
    </div>
  </div>

  <div class="analogy-box" style="margin-top: 1.5rem;">
    <div class="analogy-title">PDE 조건의 시각화</div>
    <p>시간-공간 평면을 상상하세요. <span class="tag ic">IC</span>는 <strong>\(t=0\) 수평선</strong> 위의 정보이고, <span class="tag bc">BC</span>는 <strong>\(x=0\)과 \(x=L\) 수직선</strong> 위의 정보입니다. 이 세 변의 정보로 직사각형 내부의 해를 결정합니다.</p>
  </div>

  <!-- Interactive: Heat equation -->
  <div class="canvas-container">
    <h4>Interactive: 1D 열 방정식 시뮬레이션</h4>
    <canvas id="canvas-heat" height="360"></canvas>
    <div class="slider-group">
      <label>초기 분포:</label>
      <select id="heat-init" style="background:var(--card); color:var(--text); border:1px solid var(--border); padding:6px 12px; border-radius:6px; font-size:0.9rem;">
        <option value="sine">sin(pi*x/L)</option>
        <option value="step">계단 함수</option>
        <option value="triangle">삼각파</option>
        <option value="spike">중앙 집중</option>
      </select>
    </div>
    <div class="slider-group">
      <label>확산 계수 k:</label>
      <input type="range" id="slider-k" min="0.1" max="3" step="0.1" value="1">
      <span class="slider-val" id="val-k">1.0</span>
    </div>
    <div class="heat-controls">
      <button class="btn" id="heat-play">재생</button>
      <button class="btn secondary" id="heat-reset">초기화</button>
      <span style="color:var(--text-dim); font-size:0.85rem;" id="heat-time">t = 0.000</span>
    </div>
    <p style="color:var(--text-dim); font-size:0.88rem; margin-top:0.8rem;">
      <span class="tag bc">BC</span> \(u(0,t)=0,\; u(L,t)=0\) (디리클레) &nbsp;|&nbsp; <span class="tag ic">IC</span> \(u(x,0)\)을 선택하고 재생 버튼을 누르세요.
    </p>
  </div>
</section>

<!-- Section 6: Well-Posed -->
<section class="section" id="wellposed">
  <h2 class="section-title">적정 문제 (Well-Posed Problem)</h2>
  <p class="section-subtitle">아다마르(Hadamard)가 정의한 "좋은" 문제의 세 가지 조건</p>

  <div class="grid-3">
    <div class="card">
      <h3>1. 해의 존재</h3>
      <p>주어진 조건을 만족하는 해가 <span class="hl">적어도 하나</span> 존재해야 합니다.</p>
      <div class="formula-box" style="font-size:0.9rem;">
        $$\exists\, u : \mathcal{L}u = f,\;\text{조건 만족}$$
      </div>
    </div>
    <div class="card accent2">
      <h3>2. 해의 유일성</h3>
      <p>조건을 만족하는 해가 <span class="hl2">정확히 하나</span>여야 합니다.</p>
      <div class="formula-box" style="font-size:0.9rem;">
        $$u_1 = u_2 \;\text{(두 해가 같다)}$$
      </div>
    </div>
    <div class="card accent3">
      <h3>3. 연속적 의존성</h3>
      <p>조건의 <span class="hl3">작은 변화</span>가 해의 작은 변화만을 야기해야 합니다 (안정성).</p>
      <div class="formula-box" style="font-size:0.9rem;">
        $$\|f_1 - f_2\| < \delta \Rightarrow \|u_1 - u_2\| < \varepsilon$$
      </div>
    </div>
  </div>

  <div class="card accent4" style="margin-top: 1.5rem;">
    <h3>조건이 부족하거나 과잉이면?</h3>
    <div class="grid-2">
      <div>
        <p style="font-weight:700; color:var(--accent2); margin-bottom:0.5rem;">조건 부족 (Under-determined)</p>
        <p>해가 무한히 많아집니다. 적분 상수를 결정할 수 없습니다.</p>
        <p style="font-size:0.9rem; color:var(--text-dim); margin-top:0.5rem;">예: 2차 ODE에 초기조건 1개만 제공</p>
      </div>
      <div>
        <p style="font-weight:700; color:var(--accent2); margin-bottom:0.5rem;">조건 과잉 (Over-determined)</p>
        <p>조건들이 서로 모순되어 해가 존재하지 않을 수 있습니다.</p>
        <p style="font-size:0.9rem; color:var(--text-dim); margin-top:0.5rem;">예: 2차 ODE에 초기조건 3개 제공</p>
      </div>
    </div>
  </div>
</section>

<!-- Section 7: Examples -->
<section class="section" id="examples">
  <h2 class="section-title">풀이 예제</h2>
  <p class="section-subtitle">단계별 풀이로 이해를 확인</p>

  <!-- Example 1: IVP -->
  <div class="collapsible">
    <div class="collapsible-header" onclick="toggleCollapsible(this)">
      <span><span class="tag ic">IVP</span> 예제 1: \(y'' - 3y' + 2y = 0,\; y(0)=1,\; y'(0)=0\)</span>
      <span class="arrow">&#9654;</span>
    </div>
    <div class="collapsible-body">
      <div class="collapsible-body-inner">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-content">
            <strong>특성방정식 세우기</strong>
            <div class="formula-box">$$r^2 - 3r + 2 = 0$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-content">
            <strong>특성근 구하기</strong>
            <div class="formula-box">$$(r-1)(r-2) = 0 \quad \Rightarrow \quad r_1 = 1,\; r_2 = 2$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-content">
            <strong>일반해</strong>
            <div class="formula-box">$$y(t) = c_1 e^{t} + c_2 e^{2t}$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">4</div>
          <div class="step-content">
            <strong>초기조건 적용</strong>
            <div class="formula-box">
              $$y(0) = c_1 + c_2 = 1$$
              $$y'(0) = c_1 + 2c_2 = 0$$
            </div>
            <p>연립하면: \(c_2 = -1,\; c_1 = 2\)</p>
          </div>
        </div>
        <div class="step">
          <div class="step-num">5</div>
          <div class="step-content">
            <strong>특수해 (최종 답)</strong>
            <div class="formula-box" style="border-color: var(--accent3);">
              $$\boxed{y(t) = 2e^{t} - e^{2t}}$$
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Example 2: BVP -->
  <div class="collapsible">
    <div class="collapsible-header" onclick="toggleCollapsible(this)">
      <span><span class="tag bc">BVP</span> 예제 2: \(y'' + 4y = 0,\; y(0)=0,\; y(\pi/2)=3\)</span>
      <span class="arrow">&#9654;</span>
    </div>
    <div class="collapsible-body">
      <div class="collapsible-body-inner">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-content">
            <strong>특성방정식</strong>
            <div class="formula-box">$$r^2 + 4 = 0 \quad \Rightarrow \quad r = \pm 2i$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-content">
            <strong>일반해</strong>
            <div class="formula-box">$$y(x) = c_1 \cos 2x + c_2 \sin 2x$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-content">
            <strong>경계조건 \(y(0) = 0\) 적용</strong>
            <div class="formula-box">$$y(0) = c_1 \cdot 1 + c_2 \cdot 0 = c_1 = 0$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">4</div>
          <div class="step-content">
            <strong>경계조건 \(y(\pi/2) = 3\) 적용</strong>
            <div class="formula-box">$$y(\pi/2) = c_2 \sin(\pi) = 0 \neq 3$$</div>
            <p style="color:var(--accent2); font-weight:700;">모순! 이 BVP에는 해가 존재하지 않습니다.</p>
            <p>이것이 BVP의 특수성입니다. 경계조건의 값에 따라 해가 없을 수 있습니다.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Example 3: BVP with solution -->
  <div class="collapsible">
    <div class="collapsible-header" onclick="toggleCollapsible(this)">
      <span><span class="tag bc">BVP</span> 예제 3: \(y'' + 4y = 0,\; y(0)=0,\; y(\pi/4)=3\)</span>
      <span class="arrow">&#9654;</span>
    </div>
    <div class="collapsible-body">
      <div class="collapsible-body-inner">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-content">
            <strong>일반해</strong> (위와 동일)
            <div class="formula-box">$$y(x) = c_1 \cos 2x + c_2 \sin 2x$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-content">
            <strong>\(y(0)=0\)</strong> &rarr; \(c_1 = 0\), 따라서 \(y = c_2 \sin 2x\)
          </div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-content">
            <strong>\(y(\pi/4) = 3\)</strong>
            <div class="formula-box">$$c_2 \sin(\pi/2) = c_2 \cdot 1 = 3 \quad \Rightarrow \quad c_2 = 3$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">4</div>
          <div class="step-content">
            <strong>특수해</strong>
            <div class="formula-box" style="border-color: var(--accent3);">
              $$\boxed{y(x) = 3\sin 2x}$$
            </div>
            <p style="color:var(--accent3);">이번에는 경계조건이 모순 없이 해를 유일하게 결정합니다.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Example 4: PDE -->
  <div class="collapsible">
    <div class="collapsible-header" onclick="toggleCollapsible(this)">
      <span><span class="tag pde">PDE</span> 예제 4: 열 방정식 \(u_t = u_{xx},\; u(0,t)=0,\; u(1,t)=0,\; u(x,0)=\sin(\pi x)\)</span>
      <span class="arrow">&#9654;</span>
    </div>
    <div class="collapsible-body">
      <div class="collapsible-body-inner">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-content">
            <strong>변수분리</strong> \(u(x,t) = X(x)T(t)\)로 놓으면:
            <div class="formula-box">$$\frac{T'}{T} = \frac{X''}{X} = -\lambda$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-content">
            <strong>경계조건 적용</strong> \(X(0) = 0,\; X(1) = 0\)
            <div class="formula-box">$$X'' + \lambda X = 0 \;\Rightarrow\; X_n = \sin(n\pi x),\; \lambda_n = n^2\pi^2$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-content">
            <strong>시간 부분 풀기</strong>
            <div class="formula-box">$$T_n' = -n^2\pi^2 T_n \;\Rightarrow\; T_n = e^{-n^2\pi^2 t}$$</div>
          </div>
        </div>
        <div class="step">
          <div class="step-num">4</div>
          <div class="step-content">
            <strong>초기조건 적용</strong> \(u(x,0) = \sin(\pi x)\)이므로 \(n=1\) 항만 남음
            <div class="formula-box" style="border-color: var(--accent3);">
              $$\boxed{u(x,t) = e^{-\pi^2 t}\sin(\pi x)}$$
            </div>
            <p>시간이 지남에 따라 온도가 지수적으로 감소하며, 공간적으로는 사인 형태를 유지합니다.</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Section 8: Summary -->
<section class="section" id="summary">
  <h2 class="section-title">최종 요약</h2>
  <p class="section-subtitle">핵심만 간결하게</p>

  <div class="grid-2">
    <div class="card">
      <h3>초기조건 (IC) 요약</h3>
      <ul class="checklist">
        <li>하나의 독립변수 값(보통 \(t=0\))에서 조건 부여</li>
        <li>\(n\)차 ODE &rarr; \(n\)개 초기조건 필요</li>
        <li>\(y(t_0), y'(t_0), y''(t_0), \ldots\) 형태</li>
        <li>Picard-Lindelof 정리로 해의 존재·유일성 보장</li>
        <li>물리: 초기 위치, 속도, 전압, 인구 등</li>
      </ul>
    </div>
    <div class="card accent2">
      <h3>경계조건 (BC) 요약</h3>
      <ul class="checklist">
        <li>서로 다른 두 점 이상에서 조건 부여</li>
        <li>디리클레 / 노이만 / 로빈 / 주기적 4가지 유형</li>
        <li>해의 존재·유일성이 보장되지 않을 수 있음</li>
        <li>PDE에서는 IC와 함께 사용</li>
        <li>물리: 온도 고정, 단열, 대류, 고정단 등</li>
      </ul>
    </div>
  </div>

  <div class="card accent3" style="margin-top: 1.5rem;">
    <h3>이것만은 기억하자!</h3>
    <ul class="checklist">
      <li>미분방정식의 일반해에는 적분상수가 포함 &rarr; 조건이 필요</li>
      <li>초기조건 = 한 점, 경계조건 = 여러 점</li>
      <li>IVP는 해의 유일성이 잘 보장되지만, BVP는 그렇지 않을 수 있다</li>
      <li>PDE에서는 시간 &rarr; IC, 공간 &rarr; BC 동시 사용</li>
      <li>적정 문제(Well-Posed) = 존재 + 유일 + 연속 의존성</li>
      <li>조건의 수와 종류가 적절해야 의미 있는 풀이가 가능하다</li>
    </ul>
  </div>

  <div class="formula-box" style="margin-top: 2rem; font-size: 1.3rem; border-color: var(--accent);">
    $$\underbrace{\text{미분방정식}}_{\text{물리 법칙}} + \underbrace{\text{IC / BC}}_{\text{구체적 상황}} = \underbrace{\text{유일한 해}}_{\text{예측}}$$
  </div>
</section>

<div style="text-align:center; padding: 3rem 0; color:var(--text-dim); font-size:0.85rem;">
  Engineering Mathematics &mdash; Boundary & Initial Conditions
</div>

<script>
// ── Theme Toggle ──
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.querySelector('.theme-toggle');
  if (html.getAttribute('data-theme') === 'light') {
    html.removeAttribute('data-theme');
    btn.textContent = 'Light';
  } else {
    html.setAttribute('data-theme', 'light');
    btn.textContent = 'Dark';
  }
  // Redraw all canvases
  drawWhyCanvas();
  drawICCanvas();
  drawBCCanvas();
  drawHeatCanvas();
}

// ── Nav hide/show ──
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  const cur = window.scrollY;
  if (cur > lastScroll && cur > 100) nav.classList.add('hidden');
  else nav.classList.remove('hidden');
  lastScroll = cur;

  // Active link
  document.querySelectorAll('.section').forEach(sec => {
    const link = document.querySelector(`nav a[href="#${sec.id}"]`);
    if (!link) return;
    const rect = sec.getBoundingClientRect();
    if (rect.top < 200 && rect.bottom > 200) link.classList.add('active');
    else link.classList.remove('active');
  });
});

// ── Collapsible ──
function toggleCollapsible(header) {
  header.parentElement.classList.toggle('open');
}

// ── Canvas Helpers ──
function getCS() {
  const s = getComputedStyle(document.documentElement);
  return {
    bg: s.getPropertyValue('--canvas-bg').trim() || '#141724',
    grid: s.getPropertyValue('--canvas-grid').trim() || '#1e2235',
    axis: s.getPropertyValue('--canvas-axis').trim() || '#3a4060',
    label: s.getPropertyValue('--canvas-label').trim() || '#8890a8',
    accent: s.getPropertyValue('--accent').trim() || '#6c9fff',
    accent2: s.getPropertyValue('--accent2').trim() || '#ff6cb4',
    accent3: s.getPropertyValue('--accent3').trim() || '#5cff8a',
    accent4: s.getPropertyValue('--accent4').trim() || '#ffcf5c',
    text: s.getPropertyValue('--text').trim() || '#e0e4f0',
    textDim: s.getPropertyValue('--text-dim').trim() || '#8890a8',
    border: s.getPropertyValue('--border').trim() || '#2a2f45',
  };
}

function setupCanvas(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w: rect.width, h: rect.height };
}

function drawGrid(ctx, w, h, cs, xRange, yRange) {
  ctx.fillStyle = cs.bg;
  ctx.fillRect(0, 0, w, h);

  const toX = x => (x - xRange[0]) / (xRange[1] - xRange[0]) * w;
  const toY = y => h - (y - yRange[0]) / (yRange[1] - yRange[0]) * h;

  // Grid
  ctx.strokeStyle = cs.grid;
  ctx.lineWidth = 1;
  for (let x = Math.ceil(xRange[0]); x <= xRange[1]; x++) {
    ctx.beginPath(); ctx.moveTo(toX(x), 0); ctx.lineTo(toX(x), h); ctx.stroke();
  }
  for (let y = Math.ceil(yRange[0]); y <= yRange[1]; y++) {
    ctx.beginPath(); ctx.moveTo(0, toY(y)); ctx.lineTo(w, toY(y)); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = cs.axis;
  ctx.lineWidth = 2;
  if (xRange[0] <= 0 && xRange[1] >= 0) {
    ctx.beginPath(); ctx.moveTo(toX(0), 0); ctx.lineTo(toX(0), h); ctx.stroke();
  }
  if (yRange[0] <= 0 && yRange[1] >= 0) {
    ctx.beginPath(); ctx.moveTo(0, toY(0)); ctx.lineTo(w, toY(0)); ctx.stroke();
  }

  // Labels
  ctx.fillStyle = cs.label;
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  for (let x = Math.ceil(xRange[0]); x <= xRange[1]; x++) {
    if (x === 0) continue;
    ctx.fillText(x, toX(x), toY(0) + 14);
  }
  ctx.textAlign = 'right';
  for (let y = Math.ceil(yRange[0]); y <= yRange[1]; y++) {
    if (y === 0) continue;
    ctx.fillText(y, toX(0) - 6, toY(y) + 4);
  }

  return { toX, toY };
}

// ── Canvas 1: y' = y ──
function drawWhyCanvas() {
  const canvas = document.getElementById('canvas-why');
  const { ctx, w, h } = setupCanvas(canvas);
  const cs = getCS();
  const C = parseFloat(document.getElementById('slider-C').value);
  const xRange = [-3, 3], yRange = [-4, 4];
  const { toX, toY } = drawGrid(ctx, w, h, cs, xRange, yRange);

  // Ghost curves
  const ghostCs = [-3, -2, -1, -0.5, 0.5, 1, 2, 3];
  ctx.lineWidth = 1.2;
  ghostCs.forEach(c => {
    ctx.strokeStyle = cs.border;
    ctx.beginPath();
    let first = true;
    for (let px = 0; px <= w; px += 2) {
      const x = xRange[0] + (px / w) * (xRange[1] - xRange[0]);
      const y = c * Math.exp(x);
      if (y < yRange[0] - 2 || y > yRange[1] + 2) { first = true; continue; }
      if (first) { ctx.moveTo(px, toY(y)); first = false; }
      else ctx.lineTo(px, toY(y));
    }
    ctx.stroke();
  });

  // Selected curve
  ctx.strokeStyle = cs.accent;
  ctx.lineWidth = 3;
  ctx.beginPath();
  let first = true;
  for (let px = 0; px <= w; px += 2) {
    const x = xRange[0] + (px / w) * (xRange[1] - xRange[0]);
    const y = C * Math.exp(x);
    if (y < yRange[0] - 2 || y > yRange[1] + 2) { first = true; continue; }
    if (first) { ctx.moveTo(px, toY(y)); first = false; }
    else ctx.lineTo(px, toY(y));
  }
  ctx.stroke();

  // IC point
  ctx.fillStyle = cs.accent2;
  ctx.beginPath();
  ctx.arc(toX(0), toY(C), 7, 0, Math.PI * 2);
  ctx.fill();

  // Label
  ctx.fillStyle = cs.text;
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`y(0) = ${C.toFixed(1)}`, toX(0) + 12, toY(C) - 10);
}

document.getElementById('slider-C').addEventListener('input', e => {
  document.getElementById('val-C').textContent = parseFloat(e.target.value).toFixed(1);
  drawWhyCanvas();
});

// ── Canvas 2: y'' + y = 0 ──
function drawICCanvas() {
  const canvas = document.getElementById('canvas-ic');
  const { ctx, w, h } = setupCanvas(canvas);
  const cs = getCS();
  const y0 = parseFloat(document.getElementById('slider-y0').value);
  const yp0 = parseFloat(document.getElementById('slider-yp0').value);
  const xRange = [-1, 4 * Math.PI], yRange = [-3, 3];
  const { toX, toY } = drawGrid(ctx, w, h, cs, xRange, yRange);

  // Ghost curves
  const ghosts = [
    [1, 0], [0, 1], [-1, 0], [0, -1], [1, 1], [-1, 1], [1.5, -0.5]
  ];
  ctx.lineWidth = 1;
  ghosts.forEach(([a, b]) => {
    ctx.strokeStyle = cs.border;
    ctx.beginPath();
    let f = true;
    for (let px = 0; px <= w; px += 2) {
      const t = xRange[0] + (px / w) * (xRange[1] - xRange[0]);
      const y = a * Math.cos(t) + b * Math.sin(t);
      if (y < yRange[0] - 1 || y > yRange[1] + 1) { f = true; continue; }
      if (f) { ctx.moveTo(px, toY(y)); f = false; }
      else ctx.lineTo(px, toY(y));
    }
    ctx.stroke();
  });

  // Selected curve
  ctx.strokeStyle = cs.accent;
  ctx.lineWidth = 3;
  ctx.beginPath();
  let first = true;
  for (let px = 0; px <= w; px += 2) {
    const t = xRange[0] + (px / w) * (xRange[1] - xRange[0]);
    const y = y0 * Math.cos(t) + yp0 * Math.sin(t);
    if (y < yRange[0] - 1 || y > yRange[1] + 1) { first = true; continue; }
    if (first) { ctx.moveTo(px, toY(y)); first = false; }
    else ctx.lineTo(px, toY(y));
  }
  ctx.stroke();

  // IC point
  const yAtZero = y0;
  ctx.fillStyle = cs.accent2;
  ctx.beginPath();
  ctx.arc(toX(0), toY(yAtZero), 7, 0, Math.PI * 2);
  ctx.fill();

  // Tangent line at t=0
  ctx.strokeStyle = cs.accent4;
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(toX(-0.5), toY(yAtZero - 0.5 * yp0));
  ctx.lineTo(toX(1), toY(yAtZero + 1 * yp0));
  ctx.stroke();
  ctx.setLineDash([]);

  // Labels
  ctx.fillStyle = cs.text;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`y(0)=${y0.toFixed(1)}, y'(0)=${yp0.toFixed(1)}`, toX(0) + 12, toY(yAtZero) - 12);

  // Amplitude info
  const A = Math.sqrt(y0 * y0 + yp0 * yp0);
  ctx.fillStyle = cs.textDim;
  ctx.font = '11px sans-serif';
  ctx.fillText(`Amplitude = ${A.toFixed(2)}`, 10, 20);
}

document.getElementById('slider-y0').addEventListener('input', e => {
  document.getElementById('val-y0').textContent = parseFloat(e.target.value).toFixed(1);
  drawICCanvas();
});
document.getElementById('slider-yp0').addEventListener('input', e => {
  document.getElementById('val-yp0').textContent = parseFloat(e.target.value).toFixed(1);
  drawICCanvas();
});

// ── Canvas 3: BVP String ──
function drawBCCanvas() {
  const canvas = document.getElementById('canvas-bc');
  const { ctx, w, h } = setupCanvas(canvas);
  const cs = getCS();
  const bcA = parseFloat(document.getElementById('slider-bc-a').value);
  const bcB = parseFloat(document.getElementById('slider-bc-b').value);
  const n = parseFloat(document.getElementById('slider-bc-n').value);
  const xRange = [-0.3, Math.PI + 0.3], yRange = [-3, 3];
  const { toX, toY } = drawGrid(ctx, w, h, cs, xRange, yRange);

  // The solution: y = A*sin(nx) + B*cos(nx)
  // y(0) = B = bcA  =>  B = bcA
  // y(pi) = A*sin(n*pi) + B*cos(n*pi) = bcB
  // sin(n*pi) = 0 for integer n, cos(n*pi) = (-1)^n
  // So bcB = bcA * (-1)^n
  // If bcB != bcA * (-1)^n, no unique solution with just these; show the linear combination
  const B = bcA;
  const sinNPi = Math.sin(n * Math.PI);
  const cosNPi = Math.cos(n * Math.PI);
  let A = 0;
  let solvable = true;
  if (Math.abs(sinNPi) > 0.001) {
    A = (bcB - B * cosNPi) / sinNPi;
  } else {
    // sin(n*pi) ~ 0, check consistency
    if (Math.abs(bcB - B * cosNPi) > 0.01) {
      solvable = false;
    }
    // A is free -> draw with A = 1
    A = 1;
  }

  // Draw the particular part (linear interpolation for inhomogeneous BC)
  // General approach: y = (bcA*(pi-x) + bcB*x)/pi + C*sin(nx) for homogeneous eqn
  // Simpler: just show y = B*cos(nx) + A*sin(nx) + linear part for non-zero BC

  // Draw boundary markers
  ctx.strokeStyle = cs.border;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(toX(0), 0); ctx.lineTo(toX(0), h);
  ctx.moveTo(toX(Math.PI), 0); ctx.lineTo(toX(Math.PI), h);
  ctx.stroke();
  ctx.setLineDash([]);

  // Straight line connecting boundaries
  ctx.strokeStyle = cs.textDim;
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(bcA));
  ctx.lineTo(toX(Math.PI), toY(bcB));
  ctx.stroke();
  ctx.setLineDash([]);

  // Draw the solution curve
  // y = linear_part + mode_shape
  // linear part: L(x) = bcA + (bcB - bcA)*x/pi
  // mode: sin(n*x) scaled
  if (solvable || Math.abs(sinNPi) > 0.001) {
    ctx.strokeStyle = cs.accent;
    ctx.lineWidth = 3;
    ctx.beginPath();
    let first = true;
    for (let px = 0; px <= w; px += 2) {
      const x = xRange[0] + (px / w) * (xRange[1] - xRange[0]);
      if (x < 0 || x > Math.PI) continue;
      const y = B * Math.cos(n * x) + A * Math.sin(n * x);
      if (first) { ctx.moveTo(px, toY(y)); first = false; }
      else ctx.lineTo(px, toY(y));
    }
    ctx.stroke();
  }

  // If sin(n*pi)~0, show multiple possible solutions
  if (Math.abs(sinNPi) < 0.001) {
    const alphas = [-2, -1, 0, 1, 2];
    alphas.forEach((a, i) => {
      ctx.strokeStyle = i === 2 ? cs.accent : cs.border;
      ctx.lineWidth = i === 2 ? 3 : 1.5;
      ctx.beginPath();
      let first = true;
      for (let px = 0; px <= w; px += 2) {
        const x = xRange[0] + (px / w) * (xRange[1] - xRange[0]);
        if (x < 0 || x > Math.PI) continue;
        const y = B * Math.cos(n * x) + a * Math.sin(n * x);
        if (first) { ctx.moveTo(px, toY(y)); first = false; }
        else ctx.lineTo(px, toY(y));
      }
      ctx.stroke();
    });

    if (!solvable) {
      ctx.fillStyle = cs.accent2;
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('해가 존재하지 않습니다!', w / 2, 30);
    } else {
      ctx.fillStyle = cs.accent4;
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('해가 무한히 많습니다! (A는 자유)', w / 2, 30);
    }
  } else {
    // Unique solution exists
    ctx.fillStyle = cs.accent3;
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('유일한 해가 존재합니다!', w / 2, 30);
  }

  // BC points
  ctx.fillStyle = cs.accent2;
  ctx.beginPath();
  ctx.arc(toX(0), toY(bcA), 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(toX(Math.PI), toY(bcB), 7, 0, Math.PI * 2);
  ctx.fill();

  // Labels
  ctx.fillStyle = cs.text;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`y(0)=${bcA.toFixed(1)}`, toX(0) + 10, toY(bcA) - 10);
  ctx.textAlign = 'right';
  ctx.fillText(`y(pi)=${bcB.toFixed(1)}`, toX(Math.PI) - 10, toY(bcB) - 10);
}

document.getElementById('slider-bc-a').addEventListener('input', e => {
  document.getElementById('val-bc-a').textContent = parseFloat(e.target.value).toFixed(1);
  drawBCCanvas();
});
document.getElementById('slider-bc-b').addEventListener('input', e => {
  document.getElementById('val-bc-b').textContent = parseFloat(e.target.value).toFixed(1);
  drawBCCanvas();
});
document.getElementById('slider-bc-n').addEventListener('input', e => {
  document.getElementById('val-bc-n').textContent = parseFloat(e.target.value).toFixed(1);
  drawBCCanvas();
});

// ── Canvas 4: Heat Equation ──
let heatState = null;
let heatAnimId = null;
let heatPlaying = false;
const HEAT_N = 200;

function initHeatState() {
  const type = document.getElementById('heat-init').value;
  const u = new Float64Array(HEAT_N);
  for (let i = 0; i < HEAT_N; i++) {
    const x = i / (HEAT_N - 1);
    switch (type) {
      case 'sine': u[i] = Math.sin(Math.PI * x); break;
      case 'step': u[i] = (x > 0.3 && x < 0.7) ? 1 : 0; break;
      case 'triangle': u[i] = x < 0.5 ? 2 * x : 2 * (1 - x); break;
      case 'spike': u[i] = Math.exp(-((x - 0.5) * (x - 0.5)) / 0.005); break;
    }
  }
  u[0] = 0;
  u[HEAT_N - 1] = 0;
  heatState = { u, t: 0, initial: new Float64Array(u) };
  document.getElementById('heat-time').textContent = 't = 0.000';
}

function stepHeat() {
  const k = parseFloat(document.getElementById('slider-k').value);
  const dx = 1 / (HEAT_N - 1);
  const dt = 0.4 * dx * dx / k;
  const r = k * dt / (dx * dx);
  const { u } = heatState;
  const newU = new Float64Array(HEAT_N);
  newU[0] = 0;
  newU[HEAT_N - 1] = 0;
  for (let i = 1; i < HEAT_N - 1; i++) {
    newU[i] = u[i] + r * (u[i + 1] - 2 * u[i] + u[i - 1]);
  }
  heatState.u = newU;
  heatState.t += dt;
}

function drawHeatCanvas() {
  const canvas = document.getElementById('canvas-heat');
  const { ctx, w, h } = setupCanvas(canvas);
  const cs = getCS();

  ctx.fillStyle = cs.bg;
  ctx.fillRect(0, 0, w, h);

  const margin = { top: 30, bottom: 40, left: 50, right: 20 };
  const pw = w - margin.left - margin.right;
  const ph = h - margin.top - margin.bottom;

  // Grid
  ctx.strokeStyle = cs.grid;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) {
    const x = margin.left + (i / 10) * pw;
    ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, h - margin.bottom); ctx.stroke();
  }
  for (let i = 0; i <= 5; i++) {
    const y = margin.top + (i / 5) * ph;
    ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(w - margin.right, y); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = cs.axis;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(margin.left, h - margin.bottom);
  ctx.lineTo(w - margin.right, h - margin.bottom);
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, h - margin.bottom);
  ctx.stroke();

  // Labels
  ctx.fillStyle = cs.label;
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i <= 10; i++) {
    ctx.fillText((i / 10).toFixed(1), margin.left + (i / 10) * pw, h - margin.bottom + 16);
  }
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const val = 1 - i / 5;
    ctx.fillText(val.toFixed(1), margin.left - 8, margin.top + (i / 5) * ph + 4);
  }
  ctx.fillStyle = cs.textDim;
  ctx.textAlign = 'center';
  ctx.fillText('x', w / 2, h - 5);
  ctx.save();
  ctx.translate(12, h / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('u(x, t)', 0, 0);
  ctx.restore();

  if (!heatState) return;

  // Initial distribution (ghost)
  ctx.strokeStyle = cs.border;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  for (let i = 0; i < HEAT_N; i++) {
    const x = margin.left + (i / (HEAT_N - 1)) * pw;
    const y = margin.top + (1 - heatState.initial[i]) * ph;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Current distribution
  ctx.strokeStyle = cs.accent;
  ctx.lineWidth = 3;
  ctx.beginPath();
  for (let i = 0; i < HEAT_N; i++) {
    const x = margin.left + (i / (HEAT_N - 1)) * pw;
    const y = margin.top + (1 - heatState.u[i]) * ph;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Fill under curve
  ctx.fillStyle = cs.accent + '15';
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top + ph);
  for (let i = 0; i < HEAT_N; i++) {
    const x = margin.left + (i / (HEAT_N - 1)) * pw;
    const y = margin.top + (1 - heatState.u[i]) * ph;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w - margin.right, margin.top + ph);
  ctx.closePath();
  ctx.fill();

  // BC markers
  ctx.fillStyle = cs.accent2;
  ctx.beginPath();
  ctx.arc(margin.left, margin.top + ph, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(w - margin.right, margin.top + ph, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = cs.accent2;
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('u=0', margin.left, margin.top + ph + 28);
  ctx.fillText('u=0', w - margin.right, margin.top + ph + 28);

  // Time
  document.getElementById('heat-time').textContent = `t = ${heatState.t.toFixed(3)}`;
}

function heatLoop() {
  for (let i = 0; i < 5; i++) stepHeat();
  drawHeatCanvas();
  if (heatPlaying) heatAnimId = requestAnimationFrame(heatLoop);
}

document.getElementById('heat-play').addEventListener('click', () => {
  if (!heatState) initHeatState();
  heatPlaying = !heatPlaying;
  document.getElementById('heat-play').textContent = heatPlaying ? '일시정지' : '재생';
  if (heatPlaying) heatLoop();
  else cancelAnimationFrame(heatAnimId);
});

document.getElementById('heat-reset').addEventListener('click', () => {
  heatPlaying = false;
  cancelAnimationFrame(heatAnimId);
  document.getElementById('heat-play').textContent = '재생';
  initHeatState();
  drawHeatCanvas();
});

document.getElementById('heat-init').addEventListener('change', () => {
  heatPlaying = false;
  cancelAnimationFrame(heatAnimId);
  document.getElementById('heat-play').textContent = '재생';
  initHeatState();
  drawHeatCanvas();
});

document.getElementById('slider-k').addEventListener('input', e => {
  document.getElementById('val-k').textContent = parseFloat(e.target.value).toFixed(1);
});

// ── Init ──
window.addEventListener('DOMContentLoaded', () => {
  renderMathInElement(document.body, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '\\(', right: '\\)', display: false },
    ]
  });

  drawWhyCanvas();
  drawICCanvas();
  drawBCCanvas();
  initHeatState();
  drawHeatCanvas();
});

window.addEventListener('resize', () => {

<section class="section" id="physical">
  <h2 class="section-title">물리적 직관 — 질량-스프링-댐퍼 시스템</h2>
  <p class="section-subtitle">뉴턴의 제2법칙으로부터 2계 미분방정식이 자연스럽게 탄생한다</p>

  <div class="card">
    <h3>시스템 개요</h3>
    <p>질량-스프링-댐퍼(Mass-Spring-Damper) 시스템은 2계 미분방정식의 가장 대표적인 물리적 모델이다. 벽에 스프링이 연결되고, 스프링 끝에 질량체가 달려 있으며, 댐퍼(감쇠기)가 운동에 저항하는 구조다.</p>
    <canvas id="systemDiagram" width="800" height="280" style="margin-top:1rem; height:280px;"></canvas>
    <p style="color:var(--text-dim); font-size:0.85rem; margin-top:0.5rem; text-align:center;">각 구성요소를 클릭하면 상세 설명이 나타납니다</p>
    <div id="componentInfo" style="min-height:60px; margin-top:1rem;"></div>
  </div>

  <div class="grid-3">
    <div class="card">
      <div class="icon-circle mass">m</div>
      <h3>질량 m (Mass)</h3>
      <p>물체의 <strong>관성</strong>을 나타낸다. 질량이 클수록 가속시키기 어렵다.</p>
      <div class="formula-box" id="fMass"></div>
      <p>가속도 \(y''\)에 곱해지는 계수로, 시스템의 응답 속도를 결정한다.</p>
    </div>
    <div class="card accent2">
      <div class="icon-circle damper">c</div>
      <h3>감쇠계수 c (Damping)</h3>
      <p>운동에 대한 <strong>저항력</strong>을 나타낸다. 마찰, 공기저항 등이 해당된다.</p>
      <div class="formula-box" id="fDamp"></div>
      <p>속도 \(y'\)에 비례하는 힘으로, 에너지를 소산시킨다.</p>
    </div>
    <div class="card accent3">
      <div class="icon-circle spring">k</div>
      <h3>스프링 상수 k (Stiffness)</h3>
      <p>변위에 대한 <strong>복원력</strong>을 나타낸다. 훅의 법칙(Hooke's Law)에 의한 힘이다.</p>
      <div class="formula-box" id="fSpring"></div>
      <p>변위 \(y\)에 비례하는 힘으로, 평형점으로 되돌리려 한다.</p>
    </div>
  </div>

  <!-- 유도 과정 -->
  <div class="card" style="margin-top:2rem;">
    <h3>뉴턴 제2법칙으로부터의 유도</h3>
    <div class="deriv-step">
      <div class="deriv-num">1</div>
      <div class="deriv-content">
        <p><strong>뉴턴의 제2법칙:</strong> 물체에 작용하는 힘의 합 = 질량 x 가속도</p>
        <div class="formula-box" id="fNewton"></div>
      </div>
    </div>
    <div class="deriv-step">
      <div class="deriv-num">2</div>
      <div class="deriv-content">
        <p><strong>작용하는 힘들을 나열:</strong></p>
        <ul style="margin:0.5rem 0 0.5rem 1.5rem;">
          <li>스프링 복원력: \(-ky\) (변위 반대 방향)</li>
          <li>감쇠력: \(-cy'\) (속도 반대 방향)</li>
          <li>외력: \(F(t)\) (외부에서 가하는 힘)</li>
        </ul>
      </div>
    </div>
    <div class="deriv-step">
      <div class="deriv-num">3</div>
      <div class="deriv-content">
        <p><strong>합력 = ma에 대입:</strong></p>
        <div class="formula-box" id="fDerive1"></div>
      </div>
    </div>
    <div class="deriv-step">
      <div class="deriv-num">4</div>
      <div class="deriv-content">
        <p><strong>정리하면 — 2계 선형 상미분방정식:</strong></p>
        <div class="formula-box" id="fDerive2"></div>
      </div>
    </div>

    <div class="highlight-box">
      <p><strong>핵심 통찰:</strong> 2계 미분방정식은 "가속도(관성) + 속도(저항) + 변위(복원) = 외력" 이라는 물리적 균형을 수학적으로 표현한 것이다. 각 항은 명확한 물리적 의미를 갖는다.</p>
    </div>
  </div>
</section>

<!-- ==================== 2. 수학적 구조 ==================== -->
<section class="section" id="structure">
  <h2 class="section-title">수학적 구조</h2>
  <p class="section-subtitle">2계 선형 ODE의 일반 형태와 핵심 성질</p>

  <div class="card">
    <h3>일반형 (General Form)</h3>
    <div class="formula-box" id="fGeneral"></div>
    <p>여기서 \(a, b, c\)는 상수이고, \(g(t)\)는 외력을 나타내는 함수이다.</p>
  </div>

  <div class="grid-2">
    <div class="card">
      <h3>제차 방정식 (Homogeneous)</h3>
      <div class="formula-box" id="fHomo"></div>
      <p>외력이 없는 경우 (\(g(t) = 0\)). 시스템이 초기 조건에 의해서만 움직인다. <strong>자유 진동(Free Vibration)</strong>에 해당한다.</p>
    </div>
    <div class="card accent2">
      <h3>비제차 방정식 (Non-Homogeneous)</h3>
      <div class="formula-box" id="fNonHomo"></div>
      <p>외력이 작용하는 경우 (\(g(t) \neq 0\)). <strong>강제 진동(Forced Vibration)</strong>에 해당한다.</p>
    </div>
  </div>

  <div class="card" style="margin-top:1rem;">
    <h3>해의 구조 — 중첩 원리</h3>
    <p>2계 선형 ODE는 <strong>선형성(Linearity)</strong>을 가지므로, 해의 중첩이 가능하다.</p>
    <div class="highlight-box success">
      <p><strong>일반해 = 제차해(보해) + 특수해</strong></p>
      <div class="formula-box" id="fSuperpose"></div>
      <ul style="margin:0.5rem 0 0 1.5rem;">
        <li>\(y_h\): 제차 방정식의 일반해 (보해, Complementary Solution)</li>
        <li>\(y_p\): 비제차 방정식의 특수해 (Particular Solution)</li>
      </ul>
      <p style="margin-top:0.5rem; color:var(--text-dim); font-size:0.9rem;">감쇠가 있는 시스템에서 주기적 외력이 작용할 때, \(y_h\)는 시간이 지나면 소멸하는 <strong>과도 응답</strong>(Transient), \(y_p\)는 남아있는 <strong>정상 상태 응답</strong>(Steady-State)에 해당한다.</p>
    </div>
    <p style="margin-top:1rem;">제차 해 \(y_h\)는 두 개의 <strong>선형 독립인 해</strong> \(y_1, y_2\)의 선형결합이다:</p>
    <div class="formula-box" id="fHomoSol"></div>
    <p>여기서 \(c_1, c_2\)는 초기조건으로 결정되는 임의 상수이다.</p>
  </div>
</section>

<!-- ==================== 3. 특성방정식 ==================== -->
<section class="section" id="characteristic">
  <h2 class="section-title">특성방정식과 세 가지 경우</h2>
  <p class="section-subtitle">제차 2계 ODE의 해를 구하는 핵심 도구</p>

  <div class="card">
    <h3>특성방정식 유도</h3>
    <div class="deriv-step">
      <div class="deriv-num">1</div>
      <div class="deriv-content">
        <p>\(y = e^{rt}\) 형태의 해를 가정한다 (지수함수는 미분해도 형태가 보존)</p>
      </div>
    </div>
    <div class="deriv-step">
      <div class="deriv-num">2</div>
      <div class="deriv-content">
        <p>\(y' = re^{rt}\), \(y'' = r^2 e^{rt}\)를 원래 방정식에 대입:</p>
        <div class="formula-box" id="fCharDeriv1"></div>
      </div>
    </div>
    <div class="deriv-step">
      <div class="deriv-num">3</div>
      <div class="deriv-content">
        <p>\(e^{rt} \neq 0\) 이므로 양변을 \(e^{rt}\)로 나누면 <strong>특성방정식</strong>:</p>
        <div class="formula-box" id="fCharEq"></div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:1rem;">
    <h3>판별식에 따른 세 가지 경우</h3>
    <div class="formula-box" id="fDiscriminant"></div>

    <table class="comp-table" style="margin-top:1.5rem;">
      <thead>
        <tr>
          <th>판별식</th>
          <th>감쇠 유형</th>
          <th>근의 형태</th>
          <th>해의 형태</th>
          <th>물리적 운동</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>\(\Delta > 0\)</td>
          <td><span class="tag over">과감쇠 (Overdamped)</span></td>
          <td>서로 다른 두 실근 \(r_1, r_2\)</td>
          <td id="tdOver"></td>
          <td>진동 없이 천천히 복귀</td>
        </tr>
        <tr>
          <td>\(\Delta = 0\)</td>
          <td><span class="tag critical">임계감쇠 (Critically Damped)</span></td>
          <td>중근 \(r = r_1\)</td>
          <td id="tdCrit"></td>
          <td>진동 없이 가장 빠르게 복귀</td>
        </tr>
        <tr>
          <td>\(\Delta < 0\)</td>
          <td><span class="tag under">저감쇠 (Underdamped)</span></td>
          <td>복소근 \(\alpha \pm \beta i\)</td>
          <td id="tdUnder"></td>
          <td>감쇠 진동</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- 3가지 경우 상세 -->
  <div class="collapsible" id="collCase1">
    <div class="collapsible-header" onclick="toggleCollapsible('collCase1')">
      <span><span class="tag over">Case 1</span> 과감쇠 (Overdamped): \(\Delta > 0\)</span>
      <span class="arrow">&#9660;</span>
    </div>
    <div class="collapsible-body"><div class="collapsible-body-inner">
      <p>감쇠가 매우 강하여 <strong>진동 없이</strong> 평형점으로 느리게 돌아간다.</p>
      <div class="formula-box" id="fCase1"></div>
      <p>\(r_1, r_2\)는 모두 음의 실수이므로 두 지수함수 모두 감소한다. 물리적으로는 점성이 매우 큰 유체 속에서 스프링이 눌렸다 돌아오는 모습이다.</p>
      <p style="margin-top:0.8rem;"><strong>실생활 예:</strong> 매우 묵직한 도어 클로저 — 문이 천천히 닫힌다.</p>
      <canvas id="canvasCase1" width="800" height="220" style="margin-top:1rem; height:220px;"></canvas>
    </div></div>
  </div>

  <div class="collapsible" id="collCase2">
    <div class="collapsible-header" onclick="toggleCollapsible('collCase2')">
      <span><span class="tag critical">Case 2</span> 임계감쇠 (Critically Damped): \(\Delta = 0\)</span>
      <span class="arrow">&#9660;</span>
    </div>
    <div class="collapsible-body"><div class="collapsible-body-inner">
      <p>진동 없이 <strong>가장 빠르게</strong> 평형점으로 복귀하는 경계 조건이다.</p>
      <div class="formula-box" id="fCase2"></div>
      <p>중근이므로 두 번째 해에 \(t\)를 곱해야 선형 독립이 된다 (감소 차수법, Reduction of Order).</p>
      <p style="margin-top:0.8rem;"><strong>실생활 예:</strong> 잘 설계된 자동차 서스펜션 — 충격 후 빠르게 안정.</p>
      <canvas id="canvasCase2" width="800" height="220" style="margin-top:1rem; height:220px;"></canvas>
    </div></div>
  </div>

  <div class="collapsible" id="collCase3">
    <div class="collapsible-header" onclick="toggleCollapsible('collCase3')">
      <span><span class="tag under">Case 3</span> 저감쇠 (Underdamped): \(\Delta < 0\)</span>
      <span class="arrow">&#9660;</span>
    </div>
    <div class="collapsible-body"><div class="collapsible-body-inner">
      <p>감쇠가 약하여 <strong>진동하면서</strong> 점차 평형점으로 돌아간다.</p>
      <div class="formula-box" id="fCase3"></div>
      <p>여기서 \(\alpha = -\frac{b}{2a}\) (감쇠 인자), \(\beta = \frac{\sqrt{|\Delta|}}{2a}\) (감쇠 진동 각진동수, damped frequency \(\omega_d\))이다. \(e^{\alpha t}\)가 감소하는 포락선(envelope)이 되고, 삼각함수가 진동을 만든다.</p>
      <p style="margin-top:0.8rem;"><strong>실생활 예:</strong> 기타 줄을 튕긴 후 — 진동하며 점점 작아진다.</p>
      <canvas id="canvasCase3" width="800" height="220" style="margin-top:1rem; height:220px;"></canvas>
    </div></div>
  </div>
</section>

<!-- ==================== 5. 감쇠 유형 심층 비교 ==================== -->
<section class="section" id="damping">
  <h2 class="section-title">세 가지 감쇠 유형 심층 비교</h2>
  <p class="section-subtitle">같은 방정식이 감쇠 정도에 따라 완전히 다른 행동을 보인다</p>

  <div class="card">
    <h3>동일 조건에서의 비교 그래프</h3>
    <p style="margin-bottom:1rem;">\(m = 1,\; k = 4,\; y(0) = 1,\; y'(0) = 0\) 으로 고정하고, 감쇠계수 \(c\)만 변화시킨 결과:</p>
    <canvas id="compareGraph" width="800" height="320" style="height:320px;"></canvas>
    <div style="display:flex; gap:2rem; justify-content:center; margin-top:1rem; flex-wrap:wrap;">
      <span><span style="display:inline-block;width:30px;height:4px;background:var(--accent);vertical-align:middle;border-radius:2px;margin-right:6px;"></span>과감쇠 (\(c=6\))</span>
      <span><span style="display:inline-block;width:30px;height:4px;background:var(--accent2);vertical-align:middle;border-radius:2px;margin-right:6px;"></span>임계감쇠 (\(c=4\))</span>
      <span><span style="display:inline-block;width:30px;height:4px;background:var(--accent3);vertical-align:middle;border-radius:2px;margin-right:6px;"></span>저감쇠 (\(c=1\))</span>
    </div>
  </div>

  <div class="grid-3" style="margin-top:1.5rem;">
    <div class="card">
      <h3>과감쇠 (Overdamped)</h3>
      <p><strong>감쇠비:</strong> \(\zeta > 1\)</p>
      <p><strong>조건:</strong> \(c^2 > 4mk\)</p>
      <p><strong>특징:</strong></p>
      <ul style="margin-left:1.2rem;">
        <li>진동 없음</li>
        <li>느린 복귀</li>
        <li>에너지가 빠르게 소산</li>
      </ul>
      <p style="margin-top:0.8rem;"><strong>응용:</strong> 방화문, 중장비 서스펜션</p>
    </div>
    <div class="card accent2">
      <h3>임계감쇠 (Critically Damped)</h3>
      <p><strong>감쇠비:</strong> \(\zeta = 1\)</p>
      <p><strong>조건:</strong> \(c^2 = 4mk\)</p>
      <p><strong>특징:</strong></p>
      <ul style="margin-left:1.2rem;">
        <li>진동 없음</li>
        <li>가장 빠른 복귀</li>
        <li>공학적 이상 조건</li>
      </ul>
      <p style="margin-top:0.8rem;"><strong>응용:</strong> 자동차 서스펜션, 계측 장비</p>
    </div>
    <div class="card accent3">
      <h3>저감쇠 (Underdamped)</h3>
      <p><strong>감쇠비:</strong> \(\zeta < 1\)</p>
      <p><strong>조건:</strong> \(c^2 < 4mk\)</p>
      <p><strong>특징:</strong></p>
      <ul style="margin-left:1.2rem;">
        <li>감쇠 진동</li>
        <li>오버슈트 발생</li>
        <li>준주기적 운동 (진폭 감소)</li>
      </ul>
      <p style="margin-top:0.8rem;"><strong>응용:</strong> 시계 진자, 스피커 콘</p>
    </div>
  </div>

  <div class="collapsible" id="collZeta" style="margin-top:1.5rem;">
    <div class="collapsible-header" onclick="toggleCollapsible('collZeta')">
      <span>감쇠비(Damping Ratio) \(\zeta\) 개념 상세</span>
      <span class="arrow">&#9660;</span>
    </div>
    <div class="collapsible-body"><div class="collapsible-body-inner">
      <p><strong>감쇠비</strong>는 시스템의 감쇠 정도를 무차원 수로 나타낸 것이다:</p>
      <div class="formula-box" id="fZeta"></div>
      <p>여기서 \(c_{cr} = 2\sqrt{mk}\)는 <strong>임계 감쇠 계수</strong>이다.</p>
      <table class="comp-table" style="margin-top:1rem;">
        <thead><tr><th>\(\zeta\) 범위</th><th>유형</th><th>의미</th></tr></thead>
        <tbody>
          <tr><td>\(\zeta = 0\)</td><td>비감쇠</td><td>영원히 진동 (에너지 보존)</td></tr>
          <tr><td>\(0 < \zeta < 1\)</td><td>저감쇠</td><td>진동하며 감소</td></tr>
          <tr><td>\(\zeta = 1\)</td><td>임계감쇠</td><td>가장 빠른 비진동 복귀</td></tr>
          <tr><td>\(\zeta > 1\)</td><td>과감쇠</td><td>진동 없이 느리게 복귀</td></tr>
        </tbody>
      </table>
      <p style="margin-top:1rem;"><strong>고유진동수(Natural Frequency):</strong></p>
      <div class="formula-box" id="fOmegaN"></div>
      <p>감쇠가 없을 때의 진동수이며, 저감쇠(\(\zeta < 1\))일 때 실제 진동수는 \(\omega_d = \omega_n\sqrt{1-\zeta^2}\)로 낮아진다. 과감쇠·임계감쇠에서는 진동이 없으므로 \(\omega_d\)가 정의되지 않는다.</p>
    </div></div>
  </div>
</section>

<!-- ==================== 6. 비제차 방정식과 외력 ==================== -->
<section class="section" id="nonhomo">
  <h2 class="section-title">비제차 방정식과 외력</h2>
  <p class="section-subtitle">외부 힘이 작용할 때의 해법</p>

  <div class="card">
    <h3>비제차 방정식의 구조</h3>
    <div class="formula-box" id="fNonHomoEq"></div>
    <p>일반해는 <strong>제차 일반해 + 특수해</strong>로 구성된다. 특수해를 찾는 두 가지 대표적 방법이 있다.</p>
  </div>

  <div class="grid-2">
    <div class="card">
      <h3>미정계수법 (Undetermined Coefficients)</h3>
      <p>\(g(t)\)의 형태에 맞는 특수해를 <strong>가정</strong>하고 계수를 결정한다.</p>
      <table class="comp-table">
        <thead><tr><th>\(g(t)\)</th><th>가정할 \(y_p\)</th></tr></thead>
        <tbody>
          <tr><td>다항식</td><td>같은 차수의 다항식</td></tr>
          <tr><td>\(e^{\alpha t}\)</td><td>\(Ae^{\alpha t}\)</td></tr>
          <tr><td>\(\cos\omega t\) 또는 \(\sin\omega t\)</td><td>\(A\cos\omega t + B\sin\omega t\)</td></tr>
        </tbody>
      </table>
      <p style="margin-top:0.5rem; color:var(--text-dim); font-size:0.9rem;">가정한 해가 제차해와 겹치면 \(t\)를 곱해야 한다.</p>
    </div>
    <div class="card accent2">
      <h3>매개변수 변환법 (Variation of Parameters)</h3>
      <p>제차해 \(y_1, y_2\)를 알고 있을 때, 임의의 \(g(t)\)에 대해 항상 사용 가능한 일반적 방법이다.</p>
      <div class="formula-box" id="fVOP"></div>
      <p style="margin-top:0.5rem;">여기서 \(W\)는 <strong>론스키안(Wronskian)</strong>이다:</p>
      <div class="formula-box" id="fWronsk"></div>
    </div>
  </div>
</section>

<!-- ==================== 7. 공진 ==================== -->
<section class="section" id="resonance">
  <h2 class="section-title">공진 현상 (Resonance)</h2>
  <p class="section-subtitle">외력의 주파수가 고유진동수와 일치할 때 벌어지는 극적인 현상</p>

  <div class="card">
    <h3>공진이란?</h3>
    <p>외부 주기적 힘 \(F(t) = F_0 \cos(\omega t)\)가 가해질 때, 외력의 주파수 \(\omega\)가 시스템의 <strong>고유진동수</strong> \(\omega_n = \sqrt{k/m}\)에 가까워지면 진폭이 급격히 커진다.</p>
    <div class="highlight-box warn">

<section class="section" id="phase">

    <h3>위상 평면이란?</h3>
    <p>위상 평면은 변위 \(y\)를 가로축, 속도 \(y'\)를 세로축으로 하는 2차원 공간이다. 시스템의 상태가 시간에 따라 이 평면 위의 <strong>궤적(trajectory)</strong>으로 나타난다.</p>
    <ul style="margin:1rem 0 0 1.5rem;">
      <li><strong>원점 (0, 0)</strong>: 평형점 — 변위도 속도도 0인 상태</li>
      <li><strong>궤적이 원점으로 수렴</strong>: 안정(stable) 시스템</li>
      <li><strong>궤적이 원점에서 발산</strong>: 불안정(unstable) 시스템</li>
    </ul>

<script>
// ===== Theme =====
function toggleTheme() {
  const html = document.documentElement;
  html.setAttribute('data-theme', html.getAttribute('data-theme') === 'light' ? '' : 'light');
  setTimeout(() => { drawAll(); }, 100);
}

// ===== Nav =====
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const nav = document.getElementById('navbar');
  const cur = window.scrollY;
  if (cur > lastScroll && cur > 100) nav.classList.add('hidden');
  else nav.classList.remove('hidden');
  lastScroll = cur;

  // active link
  document.querySelectorAll('nav a').forEach(a => {
    const sec = document.querySelector(a.getAttribute('href'));
    if (sec) {
      const top = sec.offsetTop - 100;
      const bot = top + sec.offsetHeight;
      if (cur >= top && cur < bot) a.classList.add('active');
      else a.classList.remove('active');
    }
  });
});

// ===== Collapsible =====
function toggleCollapsible(id) {
  document.getElementById(id).classList.toggle('open');
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el.classList.contains('open')) {
      const canvases = el.querySelectorAll('canvas');
      canvases.forEach(c => { if (c.id) drawCaseGraph(c.id); });
    }
  }, 100);
}

// ===== Canvas helpers =====
function getCSS(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

function setupCanvas(canvas) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w: rect.width, h: rect.height };
}

function drawGrid(ctx, w, h, ox, oy, scaleX, scaleY, xLabel, yLabel) {
  const gridColor = getCSS('--canvas-grid');
  const axisColor = getCSS('--canvas-axis');
  const labelColor = getCSS('--canvas-label');

  ctx.strokeStyle = gridColor; ctx.lineWidth = 0.5;
  // vertical
  for (let x = ox; x < w; x += scaleX) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let x = ox; x > 0; x -= scaleX) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  // horizontal
  for (let y = oy; y < h; y += scaleY) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
  for (let y = oy; y > 0; y -= scaleY) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

  // axes
  ctx.strokeStyle = axisColor; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(w, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, h); ctx.stroke();

  // labels
  ctx.fillStyle = labelColor; ctx.font = '12px sans-serif';
  ctx.fillText(xLabel || 't', w - 15, oy - 8);
  ctx.fillText(yLabel || 'y', ox + 8, 15);
}

// ===== ODE solver (RK4) =====
function solveODE(m, c, k, y0, v0, dt, steps, Fext) {
  const ys = [y0], vs = [v0], ts = [0];
  let y = y0, v = v0;
  for (let i = 1; i <= steps; i++) {
    const t = i * dt;
    // f(t, y, v) = (F - c*v - k*y) / m
    const f = (tt, yy, vv) => (( Fext ? Fext(tt) : 0 ) - c * vv - k * yy) / m;
    const k1v = f(t - dt, y, v);
    const k1y = v;
    const k2v = f(t - dt / 2, y + k1y * dt / 2, v + k1v * dt / 2);
    const k2y = v + k1v * dt / 2;
    const k3v = f(t - dt / 2, y + k2y * dt / 2, v + k2v * dt / 2);
    const k3y = v + k2v * dt / 2;
    const k4v = f(t, y + k3y * dt, v + k3v * dt);
    const k4y = v + k3v * dt;
    v += (k1v + 2 * k2v + 2 * k3v + k4v) * dt / 6;
    y += (k1y + 2 * k2y + 2 * k3y + k4y) * dt / 6;
    ys.push(y); vs.push(v); ts.push(t);
  }
  return { ts, ys, vs };
}

function plotCurve(ctx, ox, oy, scaleX, scaleY, ts, ys, color, lineW) {
  ctx.strokeStyle = color; ctx.lineWidth = lineW || 2;
  ctx.beginPath();
  for (let i = 0; i < ts.length; i++) {
    const px = ox + ts[i] * scaleX;
    const py = oy - ys[i] * scaleY;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
}

// ===== KaTeX render =====
function K(id, tex, display) {
  const el = document.getElementById(id);
  if (el) katex.render(tex, el, { displayMode: display !== false, throwOnError: false });
}

// ===== RENDER FORMULAS =====
function renderFormulas() {
  K('heroFormula', 'm\\,y\'\' + c\\,y\' + k\\,y = F(t)');
  K('fMass', 'F_{\\text{inertia}} = m\\,y\'\'');
  K('fDamp', 'F_{\\text{damping}} = -c\\,y\'');
